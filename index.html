<!-- PWA Manifest + Ícone gerados inline -->
<script>
(function(){
  function makeIcon(size){
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const s = size;
    // Fundo arredondado
    ctx.fillStyle = '#0d1117';
    ctx.beginPath();
    ctx.roundRect(0,0,s,s,s*0.2);
    ctx.fill();
    // Corpo da agulha
    const cx = s*0.5;
    ctx.strokeStyle='#c9d1d9';
    ctx.lineWidth=s*0.05;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx, s*0.22);
    ctx.lineTo(cx, s*0.88);
    ctx.stroke();
    // Ponta
    ctx.strokeStyle='#e6edf3';
    ctx.lineWidth=s*0.018;
    ctx.beginPath();
    ctx.moveTo(cx, s*0.88);
    ctx.lineTo(cx, s*0.95);
    ctx.stroke();
    // Cabo dourado (3 listras)
    ctx.strokeStyle='#d4a843';
    ctx.lineWidth=s*0.06;
    ctx.lineCap='round';
    [s*0.08, s*0.13, s*0.18].forEach(y=>{
      ctx.beginPath();
      ctx.moveTo(cx-s*0.07, y);
      ctx.lineTo(cx+s*0.07, y);
      ctx.stroke();
    });
    // Ponto meridiano azul
    ctx.fillStyle='#1f6feb';
    ctx.beginPath();
    ctx.arc(cx, s*0.55, s*0.07, 0, Math.PI*2);
    ctx.fill();
    return c.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  const manifest = {
    name: "Biblioteca de Acupuntura",
    short_name: "AcuBiblioteca",
    description: "Referência clínica completa de acupuntura",
    start_url: "./",
    display: "standalone",
    background_color: "#0d1117",
    theme_color: "#0d1117",
    orientation: "portrait-primary",
    icons: [
      { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);

  // Apple touch icon
  const al = document.createElement('link');
  al.rel = 'apple-touch-icon';
  al.href = icon192;
  document.head.appendChild(al);
})();
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

// ─── PDF / PRINT ENGINE ───────────────────────────────────────────────────────
// Converte Markdown simples para HTML para impressão
function mdToHtml(md){
  if(!md) return "";
  let h = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    // Tables
    .replace(/^\|(.+)\|$/gm, (line)=>{
      const cells = line.split("|").slice(1,-1);
      return "<tr>"+cells.map(c=>`<td>${c.trim()}</td>`).join("")+"</tr>";
    })
    // Headers
    .replace(/^#{4}\s(.+)/gm,"<h4>$1</h4>")
    .replace(/^#{3}\s(.+)/gm,"<h3>$1</h3>")
    .replace(/^#{2}\s(.+)/gm,"<h2>$1</h2>")
    .replace(/^#{1}\s(.+)/gm,"<h1>$1</h1>")
    // HR (separator)
    .replace(/^---+$/gm,"<hr>")
    // Bold + italic
    .replace(/\*\*\*(.+?)\*\*\*/g,"<strong><em>$1</em></strong>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    // Inline code
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    // Lists
    .replace(/^[\-\*]\s(.+)/gm,"<li>$1</li>")
    .replace(/^\d+\.\s(.+)/gm,"<li>$1</li>")
    // Wrap table rows
    .replace(/(<tr>[\s\S]+?<\/tr>(\s*<tr>[\s\S]+?<\/tr>)*)/g, (m)=>"<table>"+m+"</table>");

  // Wrap consecutive <li> in <ul>
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m=>"<ul>"+m+"</ul>");

  // Paragraphs: lines not wrapped by block tags
  const lines = h.split("\n");
  const result = [];
  for(const line of lines){
    const t = line.trim();
    if(!t) continue;
    if(/^<(h[1-4]|ul|ol|li|table|tr|th|td|hr|blockquote)/.test(t)) result.push(t);
    else result.push("<p>"+t+"</p>");
  }
  return result.join("\n");
}

function gerarPDF({ titulo, subtitulo, tipo, conteudo, paciente, data, extra }) {
  const label = TYPE_LABELS[tipo] || tipo || "Relatório";
  const dataStr = data || new Date().toLocaleDateString("pt-BR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const corpo = `
    <div class="pdf-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="pdf-badge">${label}</div>
          <h1 style="margin:6px 0 2px;">${titulo||label}</h1>
          ${subtitulo?`<div style="font-size:10pt;color:#555;">${subtitulo}</div>`:""}
          ${paciente?`<div style="font-size:10pt;margin-top:4px;"><strong>Paciente:</strong> ${paciente}</div>`:""}
        </div>
        <div style="text-align:right;font-size:9pt;color:#555;">
          <div>🗓 ${dataStr}</div>
          <div style="margin-top:4px;">AcuPonto — MTC Clínica</div>
        </div>
      </div>
    </div>
    <div class="pdf-body">
      ${typeof conteudo === "string" ? mdToHtml(conteudo) : conteudo}
    </div>
    ${extra?`<div style="margin-top:12px;border-top:1px solid #ccc;padding-top:8px;font-size:9.5pt;">${extra}</div>`:""}
    <div class="pdf-footer">
      AcuPonto · Gerado em ${dataStr} · Uso clínico exclusivo
    </div>
  `;

  // Abre nova janela com documento completo — única abordagem confiável no Android Chrome
  const pw = window.open("", "_blank");
  if (!pw) {
    // Popup bloqueado: fallback para impressão na mesma janela
    const el = document.getElementById("acu-print-area");
    if (el) {
      el.innerHTML = corpo;
      el.style.cssText = "display:block;position:static;width:100%;background:#fff;color:#111;padding:20px;box-sizing:border-box;";
      const root = document.getElementById("root");
      if (root) root.style.display = "none";
      function restoreFallback() {
        window.removeEventListener("afterprint", restoreFallback);
        el.innerHTML = "";
        el.style.cssText = "";
        el.style.display = "none";
        if (root) root.style.display = "";
      }
      window.addEventListener("afterprint", restoreFallback);
      setTimeout(restoreFallback, 30000);
      setTimeout(() => window.print(), 300);
    }
    return;
  }

  pw.document.write(`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${titulo || label} — AcuPonto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 12pt; color: #111; background: #fff; padding: 1.5cm; }
  .pdf-header { border-bottom: 2px solid #333; margin-bottom: 16px; padding-bottom: 8px; }
  .pdf-badge { display: inline-block; border: 1px solid #555; border-radius: 4px; padding: 2px 8px; font-size: 9pt; font-weight: 700; margin: 2px; }
  h1 { font-size: 16pt; margin: 6px 0 2px; }
  h2 { font-size: 13pt; margin: 12px 0 4px; border-bottom: 1px solid #ccc; padding-bottom: 3px; }
  h3 { font-size: 11pt; margin: 8px 0 3px; }
  p, li { font-size: 10.5pt; line-height: 1.5; margin: 4px 0; }
  ul, ol { padding-left: 20px; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  th, td { border: 1px solid #999; padding: 4px 7px; font-size: 10pt; }
  th { background: #eee; font-weight: 700; }
  blockquote { border-left: 3px solid #666; padding-left: 10px; margin: 6px 0; }
  .pdf-footer { border-top: 1px solid #ccc; margin-top: 20px; padding-top: 6px; font-size: 9pt; color: #555; }
  @page { margin: 1.5cm; size: A4 portrait; }
</style>
</head>
<body>
${corpo}
</body>
</html>`);
  pw.document.close();
  // Aguarda carregamento completo do documento na nova janela antes de imprimir
  pw.onload = function() { pw.focus(); pw.print(); };
  // Fallback caso onload não dispare (alguns Android WebViews)
  setTimeout(function() { try { pw.focus(); pw.print(); } catch(e){} }, 800);
}

// Modal de PDF — permite escolher paciente antes de salvar no prontuário
function SalvarProntuarioModal({ titulo, conteudo, tipo, onClose }) {
  const [pacientes, setPacientes] = React.useState(()=>{
    const fn = window._loadProntuario;
    return fn ? fn() : [];
  });
  // Recarrega quando IndexedDB terminar de inicializar (se ainda não estava pronto)
  React.useEffect(()=>{
    if (typeof _memCache !== "undefined" && _memCache !== null) return;
    function onReady() { setPacientes(window._loadProntuario ? window._loadProntuario() : []); }
    window.addEventListener("prontuarioReady", onReady, {once:true});
    return ()=> window.removeEventListener("prontuarioReady", onReady);
  },[]);
  const [pacId, setPacId] = React.useState("");
  const [novoNome, setNovoNome] = React.useState("");
  const [modo, setModo] = React.useState("existente"); // "existente"|"novo"
  const [ok, setOk] = React.useState(false);

  function salvar() {
    const loadFn = window._loadProntuario || (()=>[]);
    const saveFn = window._saveProntuario || (()=>{});
    let lista = loadFn();
    let pac;
    if(modo==="novo"){
      if(!novoNome.trim()) return;
      pac = { id:Date.now(), nome:novoNome.trim(), dob:"", sexo:"", obs:"", sessoes:[], criado:new Date().toISOString() };
      lista.unshift(pac);
    } else {
      pac = lista.find(p=>String(p.id)===String(pacId));
      if(!pac) return;
    }
    // Adiciona como sessão especial
    const sess = {
      id: Date.now(),
      data: new Date().toISOString().slice(0,16),
      queixa: titulo,
      sintomas:"",lingua:"",pulso:"",outros:"",
      diagResult: conteudo,
      diagTipo: tipo,
      soapResult:"",
      pontosSel:"",tecnica:"",
      criadoEm: new Date().toISOString()
    };
    pac.sessoes = pac.sessoes || [];
    pac.sessoes.push(sess);
    const idx = lista.findIndex(p=>p.id===pac.id);
    if(idx>=0) lista[idx]=pac; else lista.unshift(pac);
    saveFn(lista);
    setOk(true);
    setTimeout(onClose, 1200);
  }

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg1)",border:"1px solid var(--bg3)",
        borderRadius:14,padding:"18px 16px",width:"min(380px,96vw)",maxHeight:"80vh",overflowY:"auto"}}>
        {ok ? (
          <div style={{textAlign:"center",padding:"20px 0",color:"#3fb950",fontSize:14,fontWeight:700}}>
            ✅ Salvo no prontuário!
          </div>
        ) : (
          <>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>📋 Salvar no Prontuário</div>
            <div style={{color:"var(--t4)",fontSize:11,marginBottom:12}}>
              "{titulo?.slice(0,60)}"
            </div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {["existente","novo"].map(m=>(
                <button key={m} onClick={()=>setModo(m)}
                  style={{flex:1,background:modo===m?"var(--acc)":"var(--bg2)",border:"1px solid "+(modo===m?"var(--acc)":"var(--bg3)"),
                    borderRadius:8,color:modo===m?"#fff":"var(--t2)",padding:"7px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  {m==="existente"?"Paciente existente":"Novo paciente"}
                </button>
              ))}
            </div>
            {modo==="existente"?(
              pacientes.length>0?(
                <select value={pacId} onChange={e=>setPacId(e.target.value)}
                  style={{width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:8,
                    color:"var(--t1)",padding:"8px 10px",fontSize:13,marginBottom:12}}>
                  <option value="">— Selecione o paciente —</option>
                  {pacientes.map(p=>(
                    <option key={p.id} value={p.id}>{p.nome}</option>
                  ))}
                </select>
              ):(
                <div style={{color:"var(--t4)",fontSize:12,marginBottom:12,textAlign:"center",padding:"10px 0"}}>
                  Nenhum paciente cadastrado.<br/>Crie um abaixo.
                </div>
              )
            ):(
              <input value={novoNome} onChange={e=>setNovoNome(e.target.value)}
                placeholder="Nome do paciente..."
                style={{width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:8,
                  color:"var(--t1)",padding:"8px 10px",fontSize:13,marginBottom:12,outline:"none"}}/>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={onClose}
                style={{flex:1,background:"var(--bg2)",border:"none",borderRadius:8,
                  color:"var(--t3)",padding:"9px",fontSize:12,cursor:"pointer"}}>
                Cancelar
              </button>
              <button onClick={salvar}
                disabled={(modo==="existente"&&!pacId)||(modo==="novo"&&!novoNome.trim())}
                style={{flex:2,background:"#238636",border:"none",borderRadius:8,
                  color:"#fff",padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                💾 Salvar
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// Botão compacto para PDF + salvar prontuário
function PdfProntButtons({ titulo, conteudo, tipo, subtitulo, paciente, extra, compact }) {
  const [showModal, setShowModal] = React.useState(false);
  const btnStyle = compact
    ? {background:"var(--bg2)",border:"1px solid var(--bg3)",borderRadius:6,color:"var(--t3)",padding:"3px 8px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:3}
    : {background:"var(--bg2)",border:"1px solid var(--bg3)",borderRadius:8,color:"var(--t2)",padding:"6px 11px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontWeight:600};
  return(
    <>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={()=>gerarPDF({titulo,subtitulo,tipo,conteudo,paciente,extra})} style={btnStyle}
          title="Gerar PDF / Imprimir">
          🖨️ {compact?"":"PDF"}
        </button>
        <button onClick={()=>setShowModal(true)} style={{...btnStyle,borderColor:"#238636",color:"#3fb950"}}
          title="Salvar resultado no prontuário do paciente">
          📋 {compact?"":"Prontuário"}
        </button>
      </div>
      {showModal && <SalvarProntuarioModal titulo={titulo} conteudo={conteudo} tipo={tipo} onClose={()=>setShowModal(false)}/>}
    </>
  );
}

// ─── FAVORITES ───────────────────────────────────────────────────────────────
const FAV_KEY = "acu_favorites";
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)||"[]"); } catch { return []; }
}
function saveFavs(list) {
  localStorage.setItem(FAV_KEY, JSON.stringify(list));
}
function addFav(title, content, type) {
  const list = loadFavs();
  const id = Date.now();
  list.unshift({ id, title, content, type, date: new Date().toLocaleDateString("pt-BR") });
  if (list.length > 50) list.splice(50);
  saveFavs(list);
  return id;
}
function removeFav(id) {
  saveFavs(loadFavs().filter(f=>f.id!==id));
}
function isFaved(content) {
  return loadFavs().some(f=>f.content===content);
}
function getFavId(content) {
  const f = loadFavs().find(f=>f.content===content);
  return f ? f.id : null;
}

// ─── COMPONENTE TUNG TAB ──────────────────────────────────────────────────────
function TungTab({onSendToChat,onOpenPdf,hasTungPdf,onGoToAtlas}){
  const [zona,setZona]=useState(null);
  const [ponto,setPonto]=useState(null);
  const [busca,setBusca]=useState("");
  const [subAba,setSubAba]=useState("pontos"); // pontos | principios | grupos

  const pontosFiltrados = useMemo(()=>{
    if(busca.trim()){
      const v=busca.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      return PONTOS_TUNG.filter(p=>{
        const hay=[p.id,p.pinyin,p.hanzi,p.nome_pt,p.indicacoes.join(" "),p.area_reacao||"",p.canal_mtc||"",p.notas||""].join(" ")
          .toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        return hay.includes(v);
      });
    }
    if(zona) return PONTOS_TUNG.filter(p=>p.zona===zona);
    return PONTOS_TUNG;
  },[zona,busca]);

  const zonaInfo = TUNG_ZONAS.find(z=>z.id===zona);

  function enviarChat(p){
    const msg=`Explique detalhadamente o ponto Tung ${p.id} — ${p.pinyin} (${p.hanzi}) "${p.nome_pt}":
- Localização precisa
- Indicações clínicas
- Mecanismo de ação (Espelhos e Imagens, Teoria Holográfica)
- Combinações recomendadas
- Comparação com pontos da MTC clássica próximos
- Dicas clínicas práticas`;
    onSendToChat(msg);
  }

  return(
    <div style={{display:"flex",flex:1,minHeight:0,flexDirection:"column",overflow:"hidden"}}>
      {/* Header Tung */}
      <div style={{background:"linear-gradient(135deg,#1a0a2e 0%,#0d1a35 100%)",borderBottom:"1px solid #7c3aed44",
        padding:"10px 12px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>董</span>
          <div style={{flex:1}}>
            <div style={{color:"#c4b5fd",fontWeight:700,fontSize:14}}>Acupuntura Tung</div>
            <div style={{color:"#7c3aed",fontSize:10}}>Mestre Ching-Chang Tung · 46 Pontos · CC BY 4.0 — Alex Costa</div>
          </div>
          {hasTungPdf?(
            <button onClick={()=>onOpenPdf&&onOpenPdf("11.06")}
              style={{background:"#0d3a1f",border:"1px solid #2ea043",borderRadius:6,
                color:"#3fb950",fontSize:10,fontWeight:700,padding:"4px 9px",cursor:"pointer"}}>
              📄 PDF ✓
            </button>
          ):(
            <button onClick={()=>onGoToAtlas&&onGoToAtlas()}
              style={{background:"#2d1f4a",border:"1px solid #7c3aed",borderRadius:6,
                color:"#a78bfa",fontSize:10,fontWeight:700,padding:"4px 9px",cursor:"pointer"}}>
              📄 + PDF
            </button>
          )}
        </div>
        {/* Sub-tabs */}
        <div style={{display:"flex",gap:4,marginTop:8}}>
          {[["pontos","📍 Pontos"],["principios","📖 Princípios"],["grupos","🐎 Dao Ma"]].map(([k,l])=>(
            <button key={k} onClick={()=>setSubAba(k)}
              style={{flex:1,background:subAba===k?"#7c3aed":"rgba(124,58,237,0.15)",border:"1px solid "+(subAba===k?"#7c3aed":"#7c3aed44"),
                borderRadius:6,color:subAba===k?"#fff":"#a78bfa",padding:"5px 4px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* SUB-ABA: PONTOS */}
      {subAba==="pontos"&&(
        <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
          {/* Sidebar zonas */}
          <div style={{width:54,borderRight:"1px solid var(--bg2)",display:"flex",flexDirection:"column",
            background:"var(--bg1)",flexShrink:0,overflowY:"auto"}}>
            <button onClick={()=>{setZona(null);setPonto(null);setBusca("");}}
              style={{background:!zona&&!busca?"#7c3aed22":"transparent",border:"none",
                borderBottom:"1px solid var(--bg2)",padding:"8px 4px",cursor:"pointer",
                color:!zona&&!busca?"#a78bfa":"var(--t3)",fontSize:10,fontWeight:700}}>
              ALL
            </button>
            {TUNG_ZONAS.map(z=>(
              <button key={z.id} onClick={()=>{setZona(z.id);setPonto(null);setBusca("");}}
                title={z.nome}
                style={{background:zona===z.id?z.cor+"33":"transparent",border:"none",
                  borderBottom:"1px solid var(--bg2)",padding:"8px 4px",cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                <span style={{fontSize:14}}>{z.emoji}</span>
                <span style={{color:zona===z.id?z.cor:"var(--t4)",fontSize:9,fontWeight:700,
                  textAlign:"center",lineHeight:1.1}}>{z.id}</span>
              </button>
            ))}
          </div>

          {/* Lista de pontos */}
          <div style={{width:160,borderRight:"1px solid var(--bg2)",display:"flex",flexDirection:"column",
            background:"var(--bg1)",flexShrink:0}}>
            {/* Busca */}
            <div style={{padding:"6px",borderBottom:"1px solid var(--bg2)"}}>
              <input value={busca} onChange={e=>{setBusca(e.target.value);setZona(null);setPonto(null);}}
                placeholder="🔍 buscar ponto..."
                style={{width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:6,
                  padding:"5px 7px",fontSize:11,outline:"none",color:"var(--t1)"}}/>
              {busca&&<button onClick={()=>setBusca("")}
                style={{position:"absolute",marginLeft:-18,marginTop:1,background:"none",border:"none",
                  color:"var(--t4)",fontSize:12,cursor:"pointer"}}>✕</button>}
            </div>
            {/* Zona header */}
            {zonaInfo&&!busca&&(
              <div style={{padding:"5px 8px",background:zonaInfo.cor+"22",borderBottom:"1px solid var(--bg2)"}}>
                <div style={{color:zonaInfo.cor,fontSize:11,fontWeight:700}}>{zonaInfo.emoji} Zona {zonaInfo.id}</div>
                <div style={{color:"var(--t4)",fontSize:10}}>{zonaInfo.nome}</div>
              </div>
            )}
            {busca&&<div style={{padding:"5px 8px",color:"var(--t4)",fontSize:10,borderBottom:"1px solid var(--bg2)"}}>
              {pontosFiltrados.length} resultado(s)
            </div>}
            {/* Lista */}
            <div style={{flex:1,overflowY:"auto"}}>
              {pontosFiltrados.map(p=>{
                const z=TUNG_ZONAS.find(z=>z.id===p.zona);
                const cor=z?.cor||"#7c3aed";
                const sel=ponto?.id===p.id;
                return(
                  <button key={p.id} onClick={()=>setPonto(p)}
                    style={{width:"100%",background:sel?cor+"22":"transparent",
                      border:"none",borderBottom:"1px solid var(--bg2)",padding:"7px 8px",
                      textAlign:"left",cursor:"pointer",
                      borderLeft:sel?"3px solid "+cor:"3px solid transparent"}}>
                    <div style={{color:sel?cor:"var(--t3)",fontSize:10,fontWeight:700,fontFamily:"monospace"}}>{p.id}</div>
                    <div style={{color:sel?"var(--t1)":"var(--t2)",fontSize:11,lineHeight:1.2}}>{p.nome_pt}</div>
                    <div style={{color:"var(--t4)",fontSize:9,marginTop:1}}>{p.pinyin}</div>
                  </button>
                );
              })}
              {pontosFiltrados.length===0&&(
                <div style={{padding:16,color:"var(--t4)",fontSize:11,textAlign:"center"}}>Nenhum ponto encontrado</div>
              )}
            </div>
          </div>

          {/* Detalhe do ponto */}
          <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
            {ponto?(
              <TungPontoDetalhe ponto={ponto} onChat={()=>enviarChat(ponto)} onOpenPdf={onOpenPdf}/>
            ):(
              <TungPontoVazio zona={zonaInfo}/>
            )}
          </div>
        </div>
      )}

      {/* SUB-ABA: PRINCÍPIOS */}
      {subAba==="principios"&&(
        <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
          <div style={{color:"#c4b5fd",fontSize:12,fontWeight:700,marginBottom:12}}>
            Lì Gān Jiàn Yǐng (立竿見影) — "Coloque uma estaca sob o Sol e veja sua sombra imediatamente" — Resultados imediatos
          </div>
          {TUNG_PRINCIPIOS.map((pr,i)=>(
            <div key={i} style={{background:"var(--bg1)",border:"1px solid #7c3aed33",borderRadius:10,
              padding:"10px 12px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{fontSize:16}}>{pr.icon}</span>
                <div style={{color:"#c4b5fd",fontSize:12,fontWeight:700}}>{pr.titulo}</div>
              </div>
              <div style={{color:"var(--t2)",fontSize:11,lineHeight:1.7}}>{pr.texto}</div>
            </div>
          ))}
          <div style={{background:"#12082e",border:"1px solid #7c3aed44",borderRadius:10,padding:"10px 12px",marginTop:4}}>
            <div style={{color:"#9d7eed",fontSize:11,fontWeight:700,marginBottom:4}}>📚 Fonte</div>
            <div style={{color:"var(--t3)",fontSize:11,lineHeight:1.6}}>
              Alex Costa — "Acupuntura Tung: Notas de Estudo sobre a Acupuntura do Mestre Tung" (1ª ed., 2016).
              Licença Creative Commons Attribution 4.0 International. acupuntura.online
            </div>
          </div>
        </div>
      )}

      {/* SUB-ABA: GRUPOS / DAO MA */}
      {subAba==="grupos"&&(
        <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
          <div style={{color:"var(--t3)",fontSize:11,marginBottom:12,lineHeight:1.6}}>
            A Técnica <strong style={{color:"#c4b5fd"}}>Dao Ma (倒馬)</strong> — "cavalo invertido" — combina 2 ou 3 pontos em linha para amplificar a estimulação e obter resultados mais rápidos.
          </div>
          {Object.entries(TUNG_GRUPOS).map(([gid,g])=>{
            const pts=PONTOS_TUNG.filter(p=>p.grupo===gid);
            return(
              <div key={gid} style={{background:"var(--bg1)",border:"1px solid "+g.cor+"44",borderRadius:10,
                padding:"10px 12px",marginBottom:8}}>
                <div style={{color:g.cor,fontSize:12,fontWeight:700,marginBottom:8}}>{g.nome}</div>
                {pts.map(p=>(
                  <div key={p.id} onClick={()=>{setSubAba("pontos");setZona(p.zona);setPonto(p);}}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",
                      background:"var(--bg2)",borderRadius:7,marginBottom:5,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
                    onMouseLeave={e=>e.currentTarget.style.background="var(--bg2)"}>
                    <span style={{color:g.cor,fontSize:11,fontWeight:700,fontFamily:"monospace",
                      minWidth:40}}>{p.id}</span>
                    <div style={{flex:1}}>
                      <div style={{color:"var(--t1)",fontSize:11,fontWeight:600}}>{p.nome_pt}</div>
                      <div style={{color:"var(--t4)",fontSize:10}}>{p.pinyin} · {p.hanzi}</div>
                    </div>
                    <span style={{color:"var(--t4)",fontSize:10}}>→</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function TungPontoVazio({zona}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      height:"100%",opacity:0.5,gap:10}}>
      <span style={{fontSize:40}}>{zona?zona.emoji:"董"}</span>
      <div style={{color:"var(--t3)",fontSize:13,fontWeight:700,textAlign:"center"}}>
        {zona?`Zona ${zona.id} — ${zona.nome}`:"Selecione um ponto"}
      </div>
      <div style={{color:"var(--t4)",fontSize:11,textAlign:"center",maxWidth:200}}>
        {zona?"Toque em um ponto à esquerda para ver seus detalhes.":"Escolha uma zona ou busque por ponto, indicação ou pinyin."}
      </div>
    </div>
  );
}

  {nome:"Infertilidade (Deficiência)",cat:"Ginecológico",pontos:"VC4+BP6+R3+B23+F3+E36",indicacoes:"Infertilidade por deficiência de Yang do Rim, ciclos anovulatórios, insuficiência lútea, amenorreia secundária",nota:"VC4=Portão da Essência. B23=Shu do Rim. Moxa em VC4 e B23 indicada em padrão de Frio-Deficiência. Tratamento mínimo de 3 ciclos menstruais."},

  // CARDIOVASCULAR
  {nome:"Hipertensão Arterial (Adjuvante)",cat:"Cardiovascular",pontos:"VG20+F3+IG4+E36+BP6+VG14",indicacoes:"Hipertensão arterial sistêmica, cefaleia hipertensiva, hipertensão por Yang do Fígado elevado, vertigem hipertensiva",nota:"F3+VG20=dupla clássica para baixar Yang do Fígado. IG4 atua na cabeça e face, auxilia na vasodilatação. Dispersão em IG4 e F3. Adjuvante ao tratamento medicamentoso — nunca substituir a medicação anti-hipertensiva."},

  {nome:"Angina / Dor Precordial (Adjuvante)",cat:"Cardiovascular",pontos:"PC4+PC6+C7+VC17+B15+B17",indicacoes:"Angina estável (adjuvante), dor precordial funcional, opressão torácica, estagnação de Sangue no Coração",nota:"PC4=Ponto Xi do Pericárdio — usar em quadros agudos e dolorosos. B17=Reunião do Sangue — move a Estase. VC17=Mar do Qi, alivia opressão. ATENÇÃO: uso como adjuvante apenas; encaminhar para avaliação cardíaca em qualquer suspeita de síndrome coronariana aguda."},
  {nome:"Insuficiência Cardíaca / Edema Cardíaco (Adjuvante)",cat:"Cardiovascular",pontos:"VC17+PC6+E36+BP9+B15+VC6",indicacoes:"Dispneia por insuficiência cardíaca (adjuvante), edema por Qi deficiente do Coração, fadiga cardíaca, palpitações por deficiência",nota:"VC17 regula o Qi do peito. BP9 drena Umidade-Edema. B15 tonifica o Coração. E36 fortalece o Qi geral. Uso exclusivamente adjuvante ao tratamento cardiológico convencional. Monitorizar sinais de descompensação."},
  {nome:"Colesterol / Aterosclerose (Adjuvante)",cat:"Cardiovascular",pontos:"E36+E40+BP6+BP9+PC6+B17",indicacoes:"Hipercolesterolemia, aterosclerose (adjuvante), obesidade com dislipidemia, Fleuma-Umidade em excesso",nota:"E40=Fenglong, o 'ponto da Fleuma' — principal para dissolver Fleuma e reduzir lipídios. BP9 drena Umidade. B17 move o Sangue. Tratamento de longo prazo, ao menos 20 sessões para efeito metabólico."},
  // NEUROLÓGICO
  {nome:"Vertigem / Tontura",cat:"Neurológico",pontos:"VB20+VG20+F3+E36+BP9+R3+TA5",indicacoes:"Vertigem postural, labirintite, tontura por deficiência de Sangue, doença de Ménière, vertigem por Yang do Fígado elevado",nota:"VB20+VG20=dupla essencial para a cabeça. F3 baixa o Yang do Fígado. E40 transforma Fleuma (tontura rotatória com náusea). R3 nutre Yin e Medula (tontura crônica, zumbido associado). Diferenciar padrão de Excesso (Vento-Fígado) vs Deficiência (Sangue/Rim)."},
  {nome:"Paralisia Facial (Bell)",cat:"Neurológico",pontos:"E6+E4+E7+IG4+IG20+VG26+VB14",indicacoes:"Paralisia de Bell, paresia facial periférica, desvio da comissura labial, lagoftalmo por paralisia, sequelas de paralisia facial",nota:"Fase aguda (1ª semana): pontos distais apenas (IG4, VG26)+agulhamento suave. Fase subaguda/crônica: adicionar pontos locais da face. E6 e E4 são locais para boca. VB14 para testa e olho. IG4=grande ponto distal para face."},
  {nome:"Pós-AVC / Sequelas Neurológicas",cat:"Neurológico",pontos:"VG20+VG26+E36+BP6+IG4+VG14+B10",indicacoes:"Hemiplegia pós-AVC, afasia, disfagia neurológica, fraqueza dos membros por AVC, recuperação neurológica",nota:"VG20 e VG26=pontos do cérebro — usar na fase aguda para restaurar consciência (sangria VG26 em emergência). E36 e BP6 tonificam Qi e Sangue para a recuperação. Protocolo de scalp (acupuntura craniana de Zhu Mingqing) potencializa resultados em hemiplegia. Tratar precocemente."},
  {nome:"Epilepsia / Convulsões (Adjuvante)",cat:"Neurológico",pontos:"VG26+VG14+VG20+PC6+C7+E40+F3",indicacoes:"Epilepsia idiopática (adjuvante), convulsões febris, ausências epilépticas, espasmos, síndrome de Fleuma obstruindo os orifícios",nota:"VG26 usado em emergência convulsiva (sangria ou pressão forte). VG20+VG14 regulam o Du Mai — acalmam Vento interno. E40 dissolve Fleuma que obscurece os orifícios. PC6+C7 acalmam o Shen. Uso exclusivamente adjuvante; não suspender antiepilépticos."},
  {nome:"Zumbido / Tinnitus",cat:"Neurológico",pontos:"R3+TA17+VB2+TA21+ID19+R6+VB34",indicacoes:"Tinnitus crônico, zumbido por deficiência de Rim, zumbido por Fogo do Fígado/Vesícula Biliar, surdez súbita, hipoacusia neurossensorial",nota:"TA17, VB2, TA21, ID19=pontos locais ao redor do ouvido — essenciais. R3 e R6 nutrem o Yin do Rim (tinnitus crônico, tom baixo). VB34 e F3 para Fogo do Fígado/VB (tinnitus agudo, tom alto). Diferenciar padrão de Excesso vs Deficiência."},
  {nome:"Neuropatia Periférica / Parestesia",cat:"Neurológico",pontos:"E36+BP6+B17+IG4+IG11+VB34+R3",indicacoes:"Neuropatia diabética, parestesia dos membros, formigamento crônico, neuropatia periférica, síndrome do túnel do carpo",nota:"B17=Reunião do Sangue — nutre e move Sangue nos canais periféricos. E36+BP6 tonificam Qi e Sangue. IG4+IG11 para membros superiores. VB34 para membros inferiores. Em neuropatia diabética: incluir E40 (Fleuma). Eletroestimulação de baixa frequência (2 Hz) potencializa a regeneração nervosa."},
  // ── DERMATOLÓGICO ──
  {nome:"Dermatite Atópica / Eczema Crônico",cat:"Dermatológico",pontos:"BP10+B17+IG11+IG4+E36+B13+BP6",indicacoes:"Dermatite atópica, eczema crônico, pele seca com prurido, neurodermatite, psoríase com lesões ressecadas",nota:"BP10+B17=dupla clássica para Calor no Sangue e nutrição da pele. B13=Shu do Pulmão (o Pulmão governa a pele). Em fase aguda inflamatória: dispersar IG11 sem moxa. Em fase crônica ressecada: adicionar moxa suave em E36+BP6 para nutrir Sangue. Evitar ventosa na pele lesionada."},
  {nome:"Urticária Aguda (Vento-Calor)",cat:"Dermatológico",pontos:"IG11+BP10+IG4+VG14+TA5+BP6",indicacoes:"Urticária aguda, angioedema, erupção por alimentos, urticária por Vento-Calor, prurido agudo generalizado",nota:"IG11+VG14=dupla antifebril e anti-inflamatória. BP10 resfria o Sangue e alivia prurido. IG4+TA5 expelem o Vento da superfície. Sangria em BP1 ou IG11 em casos intensos. SEM moxa. Dispersão forte. IG4 contraindicado na gravidez."},
  {nome:"Urticária Crônica / Prurido Crônico (Def. Sangue)",cat:"Dermatológico",pontos:"B17+BP10+E36+BP6+IG4+VB20+B13",indicacoes:"Urticária crônica recorrente, prurido crônico por deficiência de Sangue, coceira noturna, xeroderma, prurido senil",nota:"Princípio: 'nutrir o Sangue para extinguir o Vento' — Sangue deficiente gera Vento interno (prurido). B17=Reunião do Sangue — fundamental. VB20 extingue o Vento. Moxa em E36 e B17 para tonificar o Sangue. Tratamento de longo prazo (10–20 sessões mínimo)."},
  {nome:"Psoríase (Calor no Sangue / Estase)",cat:"Dermatológico",pontos:"B17+BP10+IG11+F2+B18+BP6+E36",indicacoes:"Psoríase em placas, psoríase gutata, psoríase inversa, dermatose eritematosa descamativa crônica",nota:"Fase ativa (eritema intenso): B17+BP10+F2 resfriam o Sangue — sem moxa. Fase crônica (descamação sem eritema): adicionar B17+E36 para nutrir Sangue. B18=Shu do Fígado (psoríase frequentemente tem componente de Fígado/estresse). Tratamento prolongado — mínimo 20 sessões. Sangria em pontos locais."},
  {nome:"Acne Inflamatória (Calor-Umidade no Pulmão/Estômago)",cat:"Dermatológico",pontos:"IG11+VG14+E44+BP6+P7+B13+IG4",indicacoes:"Acne vulgar inflamatória, acne cística, rosácea, lesões pustulosas na face e costas, seborréia inflamatória",nota:"A face é território do Pulmão e Estômago — acne = Calor-Umidade nestes órgãos. IG11+VG14 dispersam Calor. E44=ponto Ying do Estômago, drena Fogo do Estômago para a face. P7 regula a superfície do Pulmão. Sangria em IG11 e pontos locais dolorosos. Dieta: evitar laticínios, açúcar e alimentos picantes."},
  {nome:"Herpes Zóster (Cobreiro) — Fase Aguda",cat:"Dermatológico",pontos:"BP6+IG11+VG14+B17+BP10+TA5+pontos locais do trajeto",indicacoes:"Herpes zóster agudo, varicela (suporte), neuralgia pós-herpética precoce, erupção dolorosa no trajeto do nervo",nota:"BP6+B17+BP10 resfriam o Sangue e resolução das vesículas. IG11+VG14 dispersam Calor e Umidade. TA5 move o Qi do Triplo Aquecedor — excelente para herpes torácico (trajeto intercostal=SJ). Agulhamento em torno das lesões (não diretamente nas vesículas). Iniciar o mais precoce possível."},
  {nome:"Neuralgia Pós-Herpética",cat:"Dermatológico",pontos:"B17+BP10+IG4+E36+BP6+R3+pontos locais",indicacoes:"Dor residual pós-herpes zóster, neuralgia crônica no trajeto afetado, alodínia, dor em queimação persistente após cicatrização",nota:"Padrão de Estase de Sangue residual nos canais após a resolução do Calor-Umidade. B17 move o Sangue Estagnado. R3 nutre o Yin (cuida da cicatrização profunda). Eletroestimulação 2/100 Hz nos pontos locais. Ventosa deslizante na área cicatrizada (sem lesão ativa). Tratamento prolongado."},
  {nome:"Vitiligo / Leucodermia",cat:"Dermatológico",pontos:"B17+B20+B23+E36+BP6+VG14+pontos locais",indicacoes:"Vitiligo idiopático, leucodermia, manchas brancas por deficiência de Qi e Sangue nos canais cutâneos",nota:"TCM: vitiligo = vento frio nos canais (bloqueia circulação do Qi e Sangue na pele) + deficiência de Qi e Sangue. B20+B23 tonificam a raiz (Baço e Rim). Moxa nos pontos locais (sobre as manchas) é fundamental — aumenta circulação local. Tratamento muito longo prazo (6 meses–1 ano). Exposição solar moderada complementa."},
  {nome:"Queda de Cabelo / Alopecia (TCM)",cat:"Dermatológico",pontos:"VG20+B17+B23+BP6+E36+F8+R3",indicacoes:"Alopecia androgenética, effluvio telógeno, alopecia por estresse, calvície precoce por deficiência de Jing/Sangue, queda pós-parto",nota:"'O cabelo é a floração do Sangue' (TCM) — Def. Sangue e Def. Jing do Rim causam alopecia. VG20 ativa a circulação no couro cabeludo. B17 nutre o Sangue. B23+R3 tonificam o Jing do Rim. F8 tonifica Sangue do Fígado. Dermaroller ou agulhamento do couro cabeludo no VG20 e 4 pontos ao redor. Moxa indireta no VG20."},
  {nome:"Seborréia / Dermatite Seborreica",cat:"Dermatológico",pontos:"VG20+IG11+E44+BP6+B17+B20+TA6",indicacoes:"Dermatite seborreica do couro cabeludo e face, seborreia, caspa intensa com oleosidade, pele oleosa com irritação",nota:"TCM: seborreia = Umidade-Calor no Baço sobe para a cabeça e face. E44 drena Calor do Estômago (a face é território do Estômago). B20 fortalece o Baço para resolver Umidade. VG20 ativa circulação no couro cabeludo. TA6 move o Qi e seca Umidade. Dieta: evitar gorduras, laticínios e álcool."},
  // ── ENDÓCRINO/METABÓLICO ──
  {nome:"Diabetes Mellitus (Adjuvante — Xião Kè)",cat:"Endócrino",pontos:"E36+BP6+R3+B20+B23+VC12+VC4",indicacoes:"Diabetes tipo 2 (adjuvante), hiperglicemia leve, polidipsia, poliúria, fadiga com sede, síndrome de Xião Kè (consumo-sede)",nota:"TCM: Xião Kè = Calor secando os fluidos por deficiência de Yin do Pulmão, Estômago e Rim. Pulmonar (sede intensa): B13+P9. Estomacal (fome excessiva): E44+E36. Renal (urina turva frequente): R3+B23. Ponto auricular Pâncreas+Endócrino como complemento. Adjuvante obrigatório ao tratamento médico convencional; não substituir insulina/hipoglicemiantes."},
  {nome:"Síndrome Metabólica / Resistência Insulínica",cat:"Endócrino",pontos:"E36+E40+BP6+BP9+B20+B23+VC12+F3",indicacoes:"Síndrome metabólica, resistência à insulina, obesidade central, dislipidemia, hipertensão leve associada, pré-diabetes",nota:"TCM: Fleuma-Umidade por deficiência do Baço + estagnação do Fígado. E40 dissolve Fleuma e reduz lipídios. BP9 drena Umidade. B20 fortalece o Baço (metabolismo). F3 move o Qi do Fígado. Auriculoterapia (Endócrino, Fome, Baço) como adjuvante. Tratar ao menos 20 sessões."},
  {nome:"Hipotireoidismo (Adjuvante)",cat:"Endócrino",pontos:"VC17+VC22+E36+B23+VG4+BP6+R3",indicacoes:"Hipotireoidismo (adjuvante), tireoidite de Hashimoto, fadiga com frio, ganho de peso, mixedema leve, queda de cabelo por hipotireoidismo",nota:"TCM: Yang do Rim e Baço deficiente + Fleuma no Qi da garganta. VC22=local para garganta e tireoide. VG4+B23=Yang do Rim (base energética). E36+BP6=Qi geral. Moxa em VG4, B23 e VC4. Adjuvante ao tratamento endocrinológico; não substituir levotiroxina."},
  {nome:"Gota / Artrite Úrica (Crise e Crônica)",cat:"Endócrino",pontos:"BP6+BP9+IG11+E36+F3+B20+VC9",indicacoes:"Gota aguda, artrite gotosa, hiperuricemia, depósitos de ácido úrico, tophi, artralgia metatarsofalangeana",nota:"TCM: Umidade-Calor acumulada nas articulações (Bi Síndrome por Calor-Umidade). Fase aguda: IG11+VG14+BP6 sem moxa — resfria e drena Umidade-Calor. Fase crônica: E36+B20+BP9+F3 para fortalecer o Baço e drenar Umidade residual. Pontos locais na articulação afetada. Evitar álcool, vísceras e frutos do mar. IG4 em fase aguda para analgesia (contraindicado na gravidez)."},
  // ── HEPÁTICO/BILIAR ──
  {nome:"Hepatite / Insuficiência Hepática (Adjuvante)",cat:"Hepático",pontos:"B18+B19+F3+F14+VB24+E36+BP6",indicacoes:"Hepatite viral (adjuvante), esteatose hepática, hepatite alcoólica, insuficiência hepática leve, icterícia por Umidade-Calor, hepatomegalia funcional",nota:"TCM: Umidade-Calor no Fígado e Vesícula Biliar. B18=Shu do Fígado, B19=Shu da VB — dupla dorsal essencial. F14=Mu do Fígado. VB24=Mu da VB. F3 move o Qi do Fígado. E36+BP6 fortalecem o Baço (previnem Fígado invadindo Baço). Adjuvante ao acompanhamento hepatológico. Evitar moxa em padrão de Calor intenso."},
  {nome:"Colecistite / Cálculo Biliar (Adjuvante)",cat:"Hepático",pontos:"VB34+VB24+B19+F3+TA6+E36",indicacoes:"Colecistite crônica, litíase biliar (adjuvante para dor), dor no hipocôndrio direito, náusea pós-gordurosa, intolerância a gorduras",nota:"VB34=ponto He da VB e ponto de influência dos tendões — essencial para colecistite. VB24=Mu da VB. B19=Shu da VB. TA6 move o Qi da VB. F3 resolve a estagnação do Fígado. EX-B4 (Dan Nang Xue, 1–2 cun abaixo de VB34) é ponto extra específico para cálculo biliar — adicionar obrigatoriamente. Adjuvante; casos agudos encaminhar para cirurgia."},
  // ── MUSCULOESQUELÉTICO ──
  {nome:"Osteoporose / Saúde Óssea (Preventivo)",cat:"Dor",pontos:"B23+VG4+R3+E36+BP6+B11+VG14",indicacoes:"Osteoporose, osteopenia, fragilidade óssea no idoso, dor óssea difusa, prevenção de perda de massa óssea, fracturas de repetição",nota:"TCM: 'O Rim governa os ossos' — osteoporose = deficiência profunda de Jing e Yang do Rim. B11=ponto de influência dos ossos — fundamental. B23+VG4=dupla do Rim. E36+BP6=pós-natal. Moxa em B23, VG4 e VC4 — aquece e tonifica o Yang do Rim. Tratamento de manutenção de longo prazo. Adjuvante à suplementação de cálcio/vitamina D."},
  {nome:"Tendinite / Tendinopatia",cat:"Dor",pontos:"VB34+E36+B17+IG4+pontos locais do tendão",indicacoes:"Tendinite de Aquiles, tendinopatia do manguito rotador, tendinite patelar (joelho do saltador), tendinite dos flexores, tenossinovite",nota:"VB34=ponto de influência dos tendões — OBRIGATÓRIO em toda tendinopatia. B17 nutre o Sangue que alimenta os tendões. E36+IG4 para Qi e analgesia. Pontos locais na inserção do tendão afetado (agulhamento ao redor da área dolorosa). Eletroestimulação 2 Hz nos locais estimula reparo tecidual. 'O Fígado governa os tendões' — F3 e B18 quando há componente do Fígado (estresse, tensão)."},

   pontos:"TA5+VB41+VB20+VG14+PC6+E36",nota:"Maciocia: o Shao Yang é o 'pivô' entre Wei (exterior) e interior — o patógeno está preso entre os dois níveis. TA5+VB41 abrem o Yang Wei Mai e drenam o Shao Yang. VG14 drena Calor geral. A tríade clássica de Shao Yang no Shang Han Lun: amargor na boca + garganta seca + tontura = usar o par TA5+VB41. Clínico: febre ondulante pós-gripe, febre de origem indeterminada.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},

  // ── PERICÁRDIO ──
  {nome:"Calor no Pericárdio / Perturbação do Shen por Calor",orgao:"Pericárdio",tipo:"exc",
   lingua:"Vermelha escarlate, ponta muito vermelha, rachada",pulso:"Rápido, cheio, forte no Cun esquerdo",
   sintomas:"Febre alta com agitação e delirium, inconsciência ou confusão mental, falar incoerente, rir ou chorar sem motivo, comportamento bizarro, insônia intensa com terror noturno — padrão de Calor penetrando no Pericárdio (nível Ying)",
   pontos:"PC8+PC7+VG26+C9+IG11+VG14",nota:"PC8=ponto Ying do PC — dispersa Calor do Pericárdio. VG26+C9=sangria de emergência para restaurar consciência. Padrão de Wen Bing (doenças febris) — urgência clínica. Sem moxa. Equivalente ocidental: encefalite, meningite, psicose febril.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},
  {nome:"Deficiência de Yin do Pericárdio",orgao:"Pericárdio",tipo:"def",
   lingua:"Vermelha, seca, ponta vermelha",pulso:"Fino, rápido no Cun esquerdo",
   sintomas:"Palpitações crônicas com sensação de calor no peito, ansiedade com inquietação (não agitação intensa), suores noturnos, calor nas palmas, dificuldade de se relacionar intimamente, sensação de vazio emocional",
   pontos:"PC6+PC7+R3+BP6+B14+C7",nota:"B14=Shu do Pericárdio. PC7=Yuan do PC. O Pericárdio protege o Coração — sua deficiência deixa o Shen vulnerável. Distinguir de Def. Yin do Coração (mais severa, com rachadura central na língua). Sem moxa direta.",etiologia:"Fatores geradores de Deficiência: excesso de trabalho, dieta inadequada, envelhecimento, doença crônica, emoções prolongadas.",prog:"Moderado. Tratamento de 8–16 sessões. Moxa indicada para padrões de Deficiência de Yang ou Qi."},

  // ── BAÇO — PADRÕES FALTANTES ──
  {nome:"Deficiência de Yang do Baço com Umidade (Maciocia)",orgao:"Baço",tipo:"misto",
   lingua:"Pálida, muito inchada, úmida, marcas de dentes profundas, saburra branca espessa",pulso:"Fraco, lento, escorregadio",
   sintomas:"Fadiga com sensação de peso corporal intenso, fezes muito moles ou diarreia com alimentos não digeridos, edema de MMII, náusea, falta de apetite, distensão abdominal permanente, muco abundante, obesidade com retenção",
   pontos:"E36+B20+VC12+BP9+VC9+VG4+BP3",nota:"Maciocia: distinção importante — Yang do Baço deficiente GERA Umidade (padrão misto). BP9+VC9 drenam a Umidade resultante. VG4+B20+VC12 tonificam o Yang. Moxa obrigatória. Evitar alimentos frios e crus.",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"Sangramento por Deficiência do Baço (Maciocia)",orgao:"Baço",tipo:"def",
   lingua:"Pálida, levemente inchada",pulso:"Fraco, especialmente na Guan direita",
   sintomas:"Sangramento com sangue claro e diluído — menorragia, metrorragia, sangramento retal, hematúria, equimoses fáceis, petéquias, sangramento gengival crônico, prolapso retal ou uterino associado",
   pontos:"BP1+BP10+E36+B20+VC12+VG20+VC6",nota:"Maciocia: o Baço 'governa o Sangue' — mantém o sangue nos vasos. Quando deficiente, o sangue 'escapa'. BP1=ponto de emergência para sangramento agudo (moxa direta). VG20 eleva o Yang do Baço. B20+VC12 tonificam a raiz. Moxa em todos.",etiologia:"Fatores geradores de Deficiência: excesso de trabalho, dieta inadequada, envelhecimento, doença crônica, emoções prolongadas.",prog:"Moderado. Tratamento de 8–16 sessões. Moxa indicada para padrões de Deficiência de Yang ou Qi."},

  // ══════════════════════════════════════════════════════════════
  // SEIS FATORES PATOGÊNICOS EXTERNOS (LIU YIN) COMPLETOS
  // ══════════════════════════════════════════════════════════════

  {nome:"Frio Externo Invadindo (Han Xie)",orgao:"Pulmão",tipo:"exc",
   lingua:"Pálida ou normal, saburra branca fina",pulso:"Flutuante, tenso (Fu Jin)",
   sintomas:"Calafrios intensos com febre baixa ou sem febre, ausência total de suor, dor na nuca e costas, dor nas articulações, mialgia generalizada, nariz entupido com muco claro, aversão ao frio",
   pontos:"VG14+B12+IG4+P7+VB20+TA5",nota:"B12=ponto específico para expelir Frio externo — essencial. Moxa obrigatória em VG14 e B12. Agulhamento superficial. Distinguir de Vento-Frio: o Frio puro tem calafrios mais intensos, sem vento (sem cefaleia occipital proeminente).",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},
  {nome:"Calor Externo Invadindo (Re Xie)",orgao:"Pulmão",tipo:"exc",
   lingua:"Vermelha na ponta, saburra amarela fina",pulso:"Flutuante, rápido",
   sintomas:"Febre alta com pouco ou nenhum calafrio, sede intensa de bebidas frias, suor presente, dor de garganta, urina amarela, face vermelha, cefaleia frontal",
   pontos:"VG14+IG11+IG4+P11+TA5+VB20",nota:"Distinguir de Vento-Calor: o Calor puro tem febre mais alta sem componente de vento (sem rigidez de nuca). P11=sangria para dor de garganta aguda intensa. Sem moxa. Dispersão forte.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},
  {nome:"Umidade Externa Invadindo (Shi Xie)",orgao:"Baço",tipo:"exc",
   lingua:"Inchada, saburra branca ou amarela espessa e gordurosa",pulso:"Escorregadio, lento, moderado (Huan)",
   sintomas:"Sensação de peso e rigidez nas articulações e músculos (piora em dias úmidos), cefaleia com sensação de cabeça pesada (como amarrada), distensão abdominal, fezes pastosas, cansaço após comer, piora com tempo úmido ou frio-úmido",
   pontos:"BP9+E36+B20+VC12+TA6+VB34",nota:"Umidade externa invade preferencialmente o Baço. BP9 é o ponto principal de drenagem de Umidade. VB34=influência dos Tendões e músculos (rigidez). TA6 move o Qi e transforma Umidade. Moxa em E36 e B20 se padrão frio.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},
  {nome:"Umidade-Frio Invadindo (Han-Shi Bi — Artralgia Fria-Úmida)",orgao:"Canais · Articulações",tipo:"exc",
   lingua:"Pálida, úmida, saburra branca escorregadia",pulso:"Tenso, lento, escorregadio",
   sintomas:"Dor articular fixa ou migratória que piora intensamente com frio e umidade, melhora com calor, articulações frias ao toque, edema articular sem calor local, rigidez matinal prolongada, melhora em dias secos e quentes",
   pontos:"IG4+VB34+B17+E36+B23+Pontos locais+moxa",nota:"Bi Zheng (síndrome de obstrução) fria-úmida. Moxa direta ou indireta nos pontos locais é obrigatória. IG4 move o Qi nos canais. VB34=tendões. B17 move o Sangue para desbloquear. Eletroestimulação + moxa potencializa muito.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},
  {nome:"Calor de Verão Invadindo (Shu Re)",orgao:"Coração · Pulmão",tipo:"exc",
   lingua:"Vermelha, seca, saburra amarela fina",pulso:"Rápido, grande (Hong) ou vazio (Xu) se com Def. de Qi",
   sintomas:"Febre súbita no verão, sudorese profusa, sede intensa, fadiga extrema com fraqueza dos membros, possível perda de consciência (insolação), náusea, urina escassa e amarela, palpitações, falta de ar",
   pontos:"VG26+PC6+IG4+IG11+VG14+VG25",nota:"VG26=emergência para insolação com perda de consciência (sangria ou pressão forte). VG25 (ponta do nariz) para ressuscitação. PC6 protege o Coração do Calor de Verão. Reidratação obrigatória. Sem moxa. Retirar do sol imediatamente.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},
  {nome:"Secura Invadindo o Pulmão (Zao Xie)",orgao:"Pulmão",tipo:"exc",
   lingua:"Vermelha nas bordas e ponta, seca, saburra fina amarela ou branca seca",pulso:"Flutuante, fino ou rápido",
   sintomas:"Tosse seca sem muco ou com muco muito escasso e difícil de expectorar, dor de garganta seca, lábios e nariz ressecados, pele seca, sede, rouquidão, epistaxe, piora no outono (estação da Secura)",
   pontos:"P7+R6+P9+B13+VC22+E36",nota:"P7+R6=par clássico Ren/Yin Qiao — nutre o Yin e umidifica o Pulmão. VC22 umidifica a garganta. B13=Shu do Pulmão. Secura-Fria: adicionar moxa suave. Secura-Quente: sem moxa, adicionar R3. Umidificar o ambiente.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},

  // ══════════════════════════════════════════════════════════════
  // DIAGNÓSTICO DE LÍNGUA — COMPLETO (MACIOCIA)
  // ══════════════════════════════════════════════════════════════

  {nome:"[LÍNGUA] Pálida — Diferencial Completo",orgao:"Diagnóstico · Língua",tipo:"def",
   lingua:"Pálida (mais clara que o normal)",pulso:"Fraco, fino ou lento",
   sintomas:"Indicador de Deficiência de Yang OU Deficiência de Sangue. DIFERENCIAR: Pálida+úmida+inchada = Def. Yang (Baço ou Rim). Pálida+seca+fina = Def. Sangue. Pálida+marcas de dentes = Def. Yang do Baço especificamente. Pálida total = Def. grave de Yang e Sangue.",
   pontos:"Def. Yang: E36+VG4+VC4+moxa | Def. Sangue: B17+E36+BP6",nota:"Maciocia: a palidez da língua é o sinal mais confiável de Deficiência de Yang ou Sangue. Quanto mais pálida, mais grave a deficiência. Língua quase branca = deficiência grave de Yang. A umidade da língua diferencia Yang (úmida) de Sangue (seca).",etiologia:"Fatores geradores de Deficiência: excesso de trabalho, dieta inadequada, envelhecimento, doença crônica, emoções prolongadas.",prog:"Moderado. Tratamento de 8–16 sessões. Moxa indicada para padrões de Deficiência de Yang ou Qi."},
  {nome:"[LÍNGUA] Inchada — Diferencial",orgao:"Diagnóstico · Língua",tipo:"misto",
   lingua:"Inchada (maior que o normal, preenche a boca)",pulso:"Escorregadio ou lento",
   sintomas:"Indicador de Umidade ou Fleuma ou Def. Yang. DIFERENCIAR: Inchada+pálida+marcas de dentes = Def. Yang do Baço com Umidade. Inchada+vermelha = Calor com Umidade. Inchada+saburra gordurosa = Fleuma. Inchado só nas bordas = Umidade no Fígado/VB.",
   pontos:"BP9+E36+B20+VC12 base — refinar conforme causa",nota:"Maciocia: as marcas de dentes nas bordas indicam que a língua está inchada e pressiona os dentes — sinal quase patognomônico de Def. de Yang do Baço. Língua toda inchada+vermelha = Calor-Umidade intensa.",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"[LÍNGUA] Rachada — Diferencial por Localização",orgao:"Diagnóstico · Língua",tipo:"def",
   lingua:"Com fissuras/rachaduras",pulso:"Fino ou rápido",
   sintomas:"LOCALIZAÇÃO das fissuras: Centro longitudinal profundo = Def. Yin do Estômago (crônica) ou constitucional. Rachaduras transversais no centro = Def. Yin do Estômago. Ponta rachada = Def. Yin do Coração. Bordas rachadas = Def. Yin do Fígado. Toda língua rachada = Yin gravemente esgotado.",
   pontos:"Centro: R3+BP6+E36 | Ponta: C7+R3 | Bordas: F8+B18+R3",nota:"Maciocia: fissura central profunda desde a raiz até a ponta é frequentemente constitucional (não patológica se isolada). Quando acompanhada de língua vermelha e seca, confirma Def. Yin grave. Fissuras múltiplas em língua vermelha = Yin muito esgotado.",etiologia:"Fatores geradores de Deficiência: excesso de trabalho, dieta inadequada, envelhecimento, doença crônica, emoções prolongadas.",prog:"Moderado. Tratamento de 8–16 sessões. Moxa indicada para padrões de Deficiência de Yang ou Qi."},
  {nome:"[LÍNGUA] Saburra Preta ou Cinza — Diferencial",orgao:"Diagnóstico · Língua",tipo:"misto",
   lingua:"Saburra preta ou cinza escura",pulso:"Variável — rápido (Calor) ou lento (Frio)",
   sintomas:"Sinal de condição grave. DIFERENCIAR: Saburra preta+seca+língua vermelha = Calor extremo consumindo Yin (estado grave). Saburra preta+úmida+língua pálida = Frio extremo com Yang colapso (emergência). Saburra cinza+seca = Calor moderado grave. Saburra cinza+úmida = Frio-Umidade profundo.",
   pontos:"Calor: IG11+VG14+R3+BP6 | Frio: VG4+VC4+E36+moxa urgente",nota:"Maciocia: saburra preta é sempre sinal de condição grave — avaliar contexto clínico completo. Saburra enegrecida em idoso crônico pode ser menos urgente. Em quadro agudo febril com saburra preta seca = emergência hospitalar.",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"[LÍNGUA] Roxa — Diferencial Completo (Maciocia)",orgao:"Diagnóstico · Língua",tipo:"exc",
   lingua:"Roxa (total ou parcial — bordas, ponta, manchas)",pulso:"Rugoso (Se) ou em corda",
   sintomas:"TONS: Roxa avermelhada = Calor+Estase (dispersão, sem moxa). Roxa azulada/arroxeada = Frio+Estase (moxa, mover Sangue+aquecer). Manchas roxas na ponta = Estase no Coração. Manchas nas bordas = Estase no Fígado. Toda língua roxa escura = Estase grave generalizada.",
   pontos:"Calor+Estase: B17+BP10+IG4+F2 | Frio+Estase: B17+IG4+VG4+moxa",nota:"Maciocia: a distinção entre roxa quente e roxa fria é fundamental — o tratamento é oposto. Verificar temperatura da língua ao toque (fria=Frio, quente=Calor). Veias sublinguais dilatadas e escuras confirmam Estase intensa.",etiologia:"Fatores geradores de Excesso: invasão de patógenos externos (Vento, Frio, Calor, Umidade); emoções agudas; dieta inadequada.",prog:"Bom. 6–12 sessões. Técnica dispersiva. Eliminar o fator etiológico é fundamental."},

  // ══════════════════════════════════════════════════════════════
  // DIAGNÓSTICO DE PULSO — COMPLETO (MACIOCIA / DEADMAN)
  // ══════════════════════════════════════════════════════════════

  {nome:"[PULSO] Profundo (Chen) — Diferencial",orgao:"Diagnóstico · Pulso",tipo:"misto",
   lingua:"Variável",pulso:"Profundo — só palpável com pressão forte",
   sintomas:"Indica patologia no Interior. DIFERENCIAR: Profundo+forte = patógeno interior (Frio interno, Calor interno, Fleuma). Profundo+fraco = Deficiência do interior (Yang, Yin ou Qi dos órgãos). Profundo+lento = Frio interno. Profundo+rápido = Calor interno. Profundo+escorregadio = Fleuma interior.",
   pontos:"Refinar conforme qualidade associada",nota:"Maciocia: pulso profundo não indica necessariamente frio — a força associada é decisiva. Profundo+fraco = tratar com tonificação+moxa. Profundo+forte = tratar com dispersão. Posição onde é mais profundo indica o órgão afetado.",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"[PULSO] Fino (Xi) — Diferencial",orgao:"Diagnóstico · Pulso",tipo:"def",
   lingua:"Pálida ou vermelha seca",pulso:"Fino como fio — difícil de palpar, mas presente",
   sintomas:"Indica Deficiência de Sangue ou Yin. DIFERENCIAR: Fino+rápido = Def. Yin com Calor Vazio. Fino+lento = Def. Sangue com Frio. Fino+fraco = Def. grave de Qi e Sangue. Fino bilateral = esgotamento geral. Fino só no Chi = Def. Yin do Rim especificamente.",
   pontos:"Def. Sangue: B17+E36+BP6 | Def. Yin: R3+R6+BP6",nota:"Maciocia: pulso fino é o sinal mais confiável de Deficiência de Sangue ou Yin. Quanto mais fino, mais grave. Fino em mulher jovem com amenorreia = Def. Sangue clássica. Fino+rápido em menopausa = Def. Yin do Rim-Fígado.",etiologia:"Fatores geradores de Deficiência: excesso de trabalho, dieta inadequada, envelhecimento, doença crônica, emoções prolongadas.",prog:"Moderado. Tratamento de 8–16 sessões. Moxa indicada para padrões de Deficiência de Yang ou Qi."},
  {nome:"[PULSO] Lento (Chi) — Diferencial",orgao:"Diagnóstico · Pulso",tipo:"misto",
   lingua:"Pálida ou normal",pulso:"Lento — menos de 4 batimentos por respiração",
   sintomas:"Indica Frio (interno ou externo) OU Deficiência de Yang. DIFERENCIAR: Lento+tenso = Frio externo com dor. Lento+profundo+fraco = Def. Yang do Rim (frio interno). Lento+escorregadio = Frio com Umidade. Lento+moderado (Huan) = Umidade obstruindo. Lento só no Chi = Def. Yang do Rim.",
   pontos:"Def. Yang: VG4+VC4+E36+moxa | Frio externo: B12+VG14+moxa",nota:"Deadman: pulso lento é frequentemente associado a frio, mas o pulso moderado (Huan — 'relaxado como corda de arco') é diferente: indica Umidade, não frio. Não confundir: lento=frio/Yang Def.; moderado/relaxado=Umidade.",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"[PULSO] Rápido (Shu) — Diferencial",orgao:"Diagnóstico · Pulso",tipo:"misto",
   lingua:"Vermelha ou pálida",pulso:"Rápido — mais de 5 batimentos por respiração",
   sintomas:"Indica Calor. DIFERENCIAR: Rápido+forte+cheio = Calor de Excesso (febre, infecção). Rápido+fino = Calor Vazio por Def. Yin. Rápido+vazio/flutuante = Calor Vazio por Def. Qi com febre. Rápido+escorregadio = Fleuma-Calor. Rápido+em corda = Calor do Fígado.",
   pontos:"Calor de Exc.: IG11+VG14 | Calor Vazio: R3+BP6+C7 | Fleuma-Calor: E40+IG11",nota:"Maciocia: a distinção Calor de Excesso vs Calor Vazio é crucial — o tratamento é oposto. Calor de Excesso: dispersar, sem moxa. Calor Vazio (def. Yin): nutrir o Yin, jamais dispersar excessivamente. Pulso rápido em idoso quase sempre = Def. Yin.",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"[PULSO] Flutuante (Fu) — Diferencial",orgao:"Diagnóstico · Pulso",tipo:"misto",
   lingua:"Variável",pulso:"Flutuante — palpável com pressão leve, desaparece com pressão forte",
   sintomas:"Indica patologia na Superfície (exterior) OU Deficiência de Yin extrema. DIFERENCIAR: Flutuante+tenso = Vento-Frio exterior. Flutuante+rápido = Vento-Calor exterior. Flutuante+vazio = Def. Yin grave (Yang sem raiz flutuando). Flutuante+grande+vazio = Def. Qi grave com Calor.",
   pontos:"Exterior: VG14+IG4+P7 | Def. Yin com Yang flutuante: R3+R6+VC4",nota:"Deadman: pulso flutuante em doença crônica (não aguda) é sinal preocupante — indica que o Yang perdeu a raiz no Yin e está 'flutuando'. Distinguir do flutuante agudo da invasão exterior (contexto clínico é decisivo).",etiologia:"Fator combinado: deficiência prévia com sobreposição de patógeno externo ou interno; emoções crônicas com fadiga.",prog:"Moderado. 10–16 sessões. Tratar tanto a Deficiência quanto o Excesso simultaneamente."},
  {nome:"[PULSO] Vazio (Xu) vs Cheio (Shi) — Diferencial",orgao:"Diagnóstico · Pulso",tipo:"misto",
   lingua:"Variável",pulso:"Vazio: mole, sem força em todos os níveis | Cheio: forte, resistente em todos os níveis",
   sintomas:"VAZIO (Xu): Indica Deficiência geral de Qi e Sangue. Cede à pressão. Fadiga, voz fraca, suor espontâneo. CHEIO (Shi): Indica Excesso — patógeno interior forte. Resiste à pressão. Dor intensa, febre, agitação. Sinal diagnóstico mais básico da MTC: Xu=tonificar, Shi=dispersar.",

// ─── DERIVAÇÃO DE TÉCNICA A PARTIR DO PADRÃO ────────────────────────────────
// Gera objeto estruturado {geral, moxa, eletro, sangria, urgencia} com base no tipo e nota
function getTecnica(padrao){
  const nota = (padrao.nota||"").toLowerCase();
  const tipo = padrao.tipo;
  const nome = padrao.nome.toLowerCase();

  // Técnica geral de agulhamento
  let geral = tipo==="def" ? "Tonificação" : tipo==="exc" ? "Dispersão" : "Neutro/Misto";
  // Exceções específicas pela nota
  if(nota.includes("dispersão em") && tipo==="def") geral="Tonificação (dispersão em pontos locais específicos)";
  if(nota.includes("tonificação") && tipo==="exc")  geral="Dispersão (tonificação em pontos específicos)";

  // Moxa
  let moxa = null;
  if(nota.includes("moxa obrigatori")) moxa = {nivel:"obrigatória", cor:"#da3633"};
  else if(nota.includes("sem moxa") || nota.includes("contraindicado moxa") || nota.includes("contraindicada moxa")) moxa = {nivel:"contraindicada", cor:"#7d8590"};
  else if(nota.includes("moxa suave") || nota.includes("moxa indireta")) moxa = {nivel:"suave/indireta", cor:"#9e6a03"};
  else if(nota.includes("moxa em") || nota.includes("moxa direta") || nota.includes("moxa em vc") || nota.includes("moxa em e36") || nota.includes("moxa em vg")) moxa = {nivel:"indicada", cor:"#238636"};
  else if(tipo==="def" && (nome.includes("yang") || nome.includes("frio") || nome.includes("qi"))) moxa = {nivel:"considerar", cor:"#484f58"};

  // Urgência
  const urgencia = nota.includes("emergênci") || nota.includes("urgênci") || nota.includes("hospital") || nota.includes("iam") || nota.includes("avc");

  // Eletroestimulação
  let eletro = null;
  if(nota.includes("eletroestimul")) {
    if(nota.includes("2 hz")) eletro = "2 Hz (move Sangue/Estase)";
    else if(nota.includes("100 hz") || nota.includes("80 hz")) eletro = "80–100 Hz (dor aguda/analgesia)";
    else if(nota.includes("4 hz") || nota.includes("2/100")) eletro = "2–4 Hz ou Dense-Disperse";
    else eletro = "indicada (ver protocolo)";
  }

  // Sangria
  const sangria = nota.includes("sangria") || nota.includes("sangrar");

  // Retenção
  let retencao = tipo==="def" ? "30–45 min" : tipo==="exc" ? "15–20 min" : "20–30 min";
  if(nota.includes("agulhamento rápido") || nome.includes("pediatria")) retencao = "5–15 min";

  return { geral, moxa, eletro, sangria, urgencia, retencao };
}

function getDosimetriaTxt(){
  const d = DOSIMETRIA;
  const L = [];
  L.push("=== AGULHAMENTO: TEMPO DE RETENÇÃO ===");
  for(const [k,v] of Object.entries(d.agulhamento.retencao))
    L.push(`[ret_${k}] ${v.min}–${v.max} min | ${v.nota}`);
  L.push("\n=== AGULHAMENTO: TÉCNICA ===");
  for(const [k,v] of Object.entries(d.agulhamento.tecnica))
    L.push(`[tec_${k}] ${v}`);
  L.push("\n=== AGULHAMENTO: FREQUÊNCIA DE SESSÕES ===");
  for(const [k,v] of Object.entries(d.agulhamento.frequencia))
    L.push(`[freq_${k}] ${v.sessoes} | Ciclo: ${v.ciclo} | ${v.nota}`);
  L.push("\n=== MOXABUSTÃO POR PADRÃO ===");
  L.push("Indicações gerais: "+d.moxa.indicacoes_gerais);
  for(const [k,v] of Object.entries(d.moxa.por_padrao))
    L.push(`[moxa_${k}] Pontos: ${v.pontos} | ${v.duracao} | ${v.metodo} | ${v.obs}`);
  L.push("Contraindicações: "+d.moxa.contraindicacoes.join("; "));
  L.push("\n=== MOXABUSTÃO: TIPOS ===");
  for(const [k,v] of Object.entries(d.moxa.tipos))
    L.push(`[moxa_${k}] ${v.desc} | Duração: ${v.duracao||"—"} | Uso: ${v.uso}`);
  L.push("\n=== ELETROESTIMULAÇÃO: FREQUÊNCIAS ===");
  L.push("Indicações gerais: "+d.eletro.indicacoes_gerais);
  for(const [k,v] of Object.entries(d.eletro.frequencias))
    L.push(`[eletro_${k}] ${v.freq} | Efeito: ${v.efeito} | Uso: ${v.uso} | Duração: ${v.duracao}`);
  L.push("Pares clássicos: "+Object.entries(d.eletro.pares_classicos).map(([p,u])=>p+": "+u).join("; "));
  L.push("Contraindicações: "+d.eletro.contraindicacoes.join("; "));
  L.push("\n=== VENTOSA ===");
  for(const [k,v] of Object.entries(d.ventosa.tecnicas))
    L.push(`[ventosa_${k}] ${v.desc} | Uso: ${v.uso}`);
  L.push("Diagnóstico por cor: "+Object.entries(d.ventosa.cores_diagnosticas).map(([c,s])=>c+"="+s).join("; "));
  return L.join("\n");
}

// ─── AI ENGINE ───────────────────────────────────────────────────────────────
async function callAI(messages, system, onChunk) {
  const m = getModel();
  if (m.provider==="gemini") {
    if (!cfg.gKey) {
      // sem chave Gemini — tenta Claude se disponível
      if (cfg.aKey) return callClaude(messages,system,onChunk,MODELS.haiku.id);
      throw new Error("NO_KEY");
    }
    try {
      return await callGemini(messages,system,onChunk,m.id);
    } catch(e) {
      // Gemini sobrecarregado/indisponível → tenta Claude automaticamente
      const isOverload = /sobrecarregado|indisponível|503|429|UNAVAILABLE/i.test(e.message);
      if (isOverload && cfg.aKey) {
        return callClaude(messages,system,onChunk,MODELS.haiku.id);
      }
      throw e;
    }
  }
  return callClaude(messages,system,onChunk,m.id);
}

async function callClaude(messages,system,onChunk,modelId) {
  const key = cfg.aKey;
  if (!key) throw new Error("NO_KEY");
  // ── PROMPT CACHING ──────────────────────────────────────────────────────
  // O system contém o banco estático (padrões + combinações + dosimetria),
  // grande e idêntico entre chamadas. Marcá-lo como cacheável faz as chamadas
  // seguintes (até ~5 min) lerem esse trecho a ~10% do preço de input.
  // Economia típica de ~90% no system em conversas com várias mensagens.
  const sys = (typeof system === "string" && system.length > 4000)
    ? [{ type:"text", text:system, cache_control:{type:"ephemeral"} }]
    : system;
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:modelId,max_tokens:8000,stream:true,system:sys,messages}),
  });
  if (!r.ok) { const e=await r.text(); throw new Error("Claude "+r.status+": "+e.slice(0,200)); }
  return readSSE(r, obj => obj.delta?.text||"", onChunk);
}

async function callGemini(messages,system,onChunk,modelId) {
  const key = cfg.gKey;
  if (!key) throw new Error("NO_KEY");
  const contents = messages.map((msg,i)=>{
    const isUser = msg.role!=="assistant";
    let text = typeof msg.content==="string" ? msg.content : JSON.stringify(msg.content);
    if (i===0 && isUser && system) text="[INSTRUÇÕES]\n"+system+"\n\n[PEDIDO]\n"+text;
    return {role:isUser?"user":"model",parts:[{text}]};
  });

  // Fallback chain: modelo solicitado → 2.0-flash (estável) → 2.5-flash → 2.0-flash-lite
  const GEMINI_FALLBACKS = [
    modelId,
    "gemini-2.0-flash",
    "gemini-2.5-flash",
    "gemini-2.0-flash-lite",
  ].filter((v,i,a)=>a.indexOf(v)===i); // deduplica

  let lastErr = "";
  for (let attempt = 0; attempt < GEMINI_FALLBACKS.length; attempt++) {
    const mid = GEMINI_FALLBACKS[attempt];
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${mid}:streamGenerateContent?alt=sse&key=${key}`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({system_instruction:{parts:[{text:system||""}]},contents,generationConfig:{maxOutputTokens:8000}}),
      });
      if (r.status===503 || r.status===429 || r.status===404) {
        const e = await r.text();
        lastErr = `${mid} indisponível (${r.status})`;
        // pequeno delay antes do próximo fallback
        await new Promise(res=>setTimeout(res, 800));
        continue;
      }
      if (!r.ok) { const e=await r.text(); throw new Error("Gemini "+r.status+": "+e.slice(0,200)); }
      return readSSE(r, obj => obj.candidates?.[0]?.content?.parts?.[0]?.text||"", onChunk);
    } catch(e) {
      // 404 já tratado acima; outros erros de rede tentam fallback
      if (e.message.startsWith("Gemini ") && !e.message.includes("404")) throw e; // erro definitivo
      lastErr = e.message;
      await new Promise(res=>setTimeout(res, 800));
    }
  }
  throw new Error(`Gemini indisponível no momento (todos os modelos sobrecarregados). Tente novamente em instantes.`);
}

async function readSSE(response, extract, onChunk) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let full="";
  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    for(const line of dec.decode(value).split("\n")){
      if(!line.startsWith("data: ")) continue;
      const d=line.slice(6).trim();
      if(!d||d==="[DONE]") continue;
      try{ const t=extract(JSON.parse(d)); if(t){full+=t;onChunk&&onChunk(full);} }catch(e){}
    }
  }
  return full;
}

// ─── PDF.js ──────────────────────────────────────────────────────────────────
function usePdfJs(){
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    if(window.pdfjsLib){setReady(true);return;}
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{
      window.pdfjsLib.GlobalWorkerOptions.workerSrc=
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      setReady(true);
    };
    document.head.appendChild(s);
  },[]);
  return ready;
}
async function loadPdfDoc(file){const buf=await file.arrayBuffer();return window.pdfjsLib.getDocument({data:buf}).promise;}
async function renderPage(pdfDoc,pageNum,scale=1.5){
  const page=await pdfDoc.getPage(pageNum);
  const vp=page.getViewport({scale});
  const canvas=document.createElement("canvas");
  canvas.width=vp.width;canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
  return canvas.toDataURL("image/jpeg",0.82);
}

// ─── MARKDOWN RENDERER ───────────────────────────────────────────────────────
function Md({text,onChipClick}){
  const html = useMemo(()=>{
    if(!text) return "";
    let s = text
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      // Tables
      .replace(/^\|(.+)\|$/gm, row=>"<tr>"+row.slice(1,-1).split("|").map((c,i)=>`<${i===0&&row.includes("---")?"th":"td"}>${c.trim()}</${i===0&&row.includes("---")?"th":"td"}>`).join("")+"</tr>")
      // Headings
      .replace(/^#### (.+)$/gm,"<h4>$1</h4>")
      .replace(/^### (.+)$/gm,"<h3>$1</h3>")
      .replace(/^## (.+)$/gm,"<h2>$1</h2>")
      .replace(/^# (.+)$/gm,"<h1>$1</h1>")
      // Bold/italic
      .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
      .replace(/\*(.+?)\*/g,"<em>$1</em>")
      // Code
      .replace(/`(.+?)`/g,"<code>$1</code>")
      // HR
      .replace(/^---$/gm,"<hr>")
      // Lists
      .replace(/^[-*] (.+)$/gm,"<li>$1</li>")
      .replace(/^(\d+)\. (.+)$/gm,"<li>$2</li>")
      // Points chips: E-36 / E36 / VC12 / BP6 / B20 / DU-14 / Ren-17 etc
      // First pass: with hyphen (E-36, IG-4, VB-34, VC-12, BP-6, B-20, Du-14...)
      .replace(/\b(VC|VG|IG|ID|VB|SJ|PC|TR|TW|BP|SP|Ren|Du|EX|HN|LE|UE|CA|BA|E|P|C|R|F|B)-(\d{1,3})\b/gi,
        (m,sig,num)=>`<span class="chip" data-pt="${sig.toUpperCase()}-${num}">${sig.toUpperCase()}-${num}</span>`)
      // Second pass: without hyphen (E36, VC12, BP6, B20...)
      .replace(/\b(VC|VG|IG|ID|VB|SJ|PC|TR|TW|BP|SP|Ren|Du|EX)(\d{1,3})\b/gi,
        (m,sig,num)=>`<span class="chip" data-pt="${sig.toUpperCase()}-${num}">${sig.toUpperCase()}-${num}</span>`)
      .replace(/\b([EPCRFB])(\d{1,3})\b(?![A-Za-z])/g,
        (m,sig,num)=>`<span class="chip" data-pt="${sig}-${num}">${sig}-${num}</span>`)
      // Paragraphs
      .replace(/\n\n/g,"</p><p>")
      .replace(/\n/g,"<br>");
    // Wrap lists
    s = s.replace(/(<li>.*?<\/li>)+/gs, m=>"<ul>"+m+"</ul>");
    // Wrap table rows
    s = s.replace(/(<tr>.*?<\/tr>)+/gs, m=>"<table>"+m+"</table>");
    return "<p>"+s+"</p>";
  },[text]);

  function handleClick(e){
    const chip=e.target.closest(".chip");
    if(chip&&onChipClick){
      const pt=chip.dataset.pt;
      const m=pt.match(/^(.+)-(\d+)$/);
      if(m) onChipClick(m[1],parseInt(m[2]));
    }
  }

  return <div className="md" onClick={handleClick} dangerouslySetInnerHTML={{__html:html}}/>;
}

// Transforma "E36+BP6+VC12" ou texto com pontos em chips clicáveis
function PontosChips({texto, onChipClick, style={}}){
  if(!texto) return null;
  const handleClick = typeof onChipClick==="function" ? onChipClick : function(){};
  const RE = /(VC|VG|IG|ID|VB|SJ|PC|TR|TW|BP|SP|Ren|Du|EX|HN|LE|UE|P|E|C|R|F|B)(\d{1,3})/gi;
  const parts = [];
  let last = 0, m;
  RE.lastIndex = 0;
  while((m = RE.exec(texto)) !== null){
    if(m.index > last) parts.push(<span key={"t"+last} style={{color:"var(--t3)",fontSize:12}}>{texto.slice(last,m.index)}</span>);
    const sig = m[1].toUpperCase();
    const num = parseInt(m[2]);
    parts.push(
      <span key={m.index}
        onClick={e=>{e.stopPropagation();handleClick(sig,num);}}
        style={{display:"inline-flex",alignItems:"center",gap:3,
          background:"#1f6feb33",border:"1px solid #1f6feb99",
          borderRadius:7,padding:"5px 11px",fontSize:13,color:"#58a6ff",
          cursor:"pointer",fontWeight:800,margin:"3px 3px",
          minHeight:32,touchAction:"manipulation",userSelect:"none"}}>
        📍 {sig}-{num}
      </span>
    );
    last = m.index + m[0].length;
  }
  if(last < texto.length) parts.push(<span key={"t"+last} style={{color:"var(--t3)",fontSize:12}}>{texto.slice(last)}</span>);
  return parts.length > 0
    ? <span style={{lineHeight:2.4,...style}}>{parts}</span>
    : <span style={{color:"#58a6ff",fontSize:12,...style}}>{texto}</span>;
}
