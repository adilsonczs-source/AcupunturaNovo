// ─── DEZ PERGUNTAS TAB ───────────────────────────────────────────────────────
function DezPerguntasTab({onSendToChat, onGoToPront}){
  const [pacAtivo] = usePacAtivo();
  const [step,setStep]=useState(-1); // -1 = tela inicial, 0-9 = pergunta ativa, 10 = resumo
  const [respostas,setRespostas]=useState({}); // {id: {qIdx: valor}}
  const [sexo,setSexo]=useState(""); // "M" | "F" | ""
  const [queixa,setQueixa]=useState("");
  const [expanded,setExpanded]=useState(null); // para o resumo

  const pAtual = step>=0&&step<10 ? DEZ_PERGUNTAS[step] : null;

  function setResp(pergId, qIdx, valor, tipo){
    setRespostas(prev=>{
      const cur = {...(prev[pergId]||{})};
      if(tipo==="checkbox"){
        const set = new Set(cur[qIdx]||[]);
        set.has(valor)?set.delete(valor):set.add(valor);
        cur[qIdx]=[...set];
      } else {
        cur[qIdx] = valor;
      }
      return {...prev,[pergId]:cur};
    });
  }

  function getRespCount(id){
    const r = respostas[id]||{};
    return Object.values(r).filter(v=>Array.isArray(v)?v.length>0:!!v).length;
  }

  function buildResumo(){
    const lines=[];
    if(queixa) lines.push(`**Queixa principal:** ${queixa}`);
    if(sexo) lines.push(`**Sexo:** ${sexo==="M"?"Masculino":"Feminino"}`);
    lines.push("");
    for(const p of DEZ_PERGUNTAS){
      const r=respostas[p.id]||{};
      const hasData=Object.values(r).some(v=>Array.isArray(v)?v.length>0:!!v);
      if(!hasData) continue;
      lines.push(`### ${p.emoji} ${p.num}. ${p.titulo}`);
      p.perguntas.forEach((pq,qi)=>{
        const v=r[qi];
        if(!v||(Array.isArray(v)&&v.length===0)) return;
        const resp=Array.isArray(v)?v.join(", "):v;
        lines.push(`- **${pq.q}** ${resp}`);
      });
    }
    return lines.join("\n");
  }

  function enviarChat(){
    const resumo=buildResumo();
    if(!resumo.trim()) return;
    const prompt=`# Anamnese MTC — Dez Perguntas (十問歌)\n\n${resumo}\n\n---\nCom base nestes dados coletados pelas Dez Perguntas da MTC, realize:\n1. **Diagnóstico diferencial em MTC**: identifique os padrões energéticos mais prováveis cruzando os achados de cada pergunta (órgãos afetados, natureza — Def./Exc./Frio/Calor/Umidade/Estase/Vento)\n2. **Língua e Pulso esperados**: descreva o que provavelmente encontraremos para confirmar o diagnóstico\n3. **Protocolo de acupuntura**: pontos principais e auxiliares com técnica e moxa quando indicado\n4. **Combinações clínicas prioritárias**: cite as combinações validadas mais relevantes\n5. **Perguntas complementares** (se necessário para refinar o diagnóstico)`;
    onSendToChat(prompt);
  }

  // ── TELA INICIAL ──
  if(step===-1) return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
      <PacAtivoBanner onGoToPront={onGoToPront}/>
      <div style={{padding:"10px 14px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>十</span>
          <div>
            <div style={{color:"var(--t1)",fontWeight:700,fontSize:14}}>Dez Perguntas</div>
            <div style={{color:"var(--t4)",fontSize:10}}>十問歌 · Anamnese em MTC</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px"}}>
        {/* Queixa e sexo */}
        <div style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{color:"var(--t2)",fontSize:12,fontWeight:700,marginBottom:8}}>Dados iniciais</div>
          <div style={{color:"var(--t3)",fontSize:11,marginBottom:4}}>Queixa principal / motivo da consulta</div>
          <input value={queixa} onChange={e=>setQueixa(e.target.value)}
            placeholder="Ex: lombalgia crônica, insônia, ansiedade..."
            style={{width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:7,
              padding:"8px 10px",fontSize:13,color:"var(--t1)",outline:"none",marginBottom:10}}/>
          <div style={{color:"var(--t3)",fontSize:11,marginBottom:6}}>Sexo biológico</div>
          <div style={{display:"flex",gap:8}}>
            {[["M","♂ Masculino"],["F","♀ Feminino"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSexo(sexo===v?"":v)}
                style={{flex:1,background:sexo===v?"var(--acc)":"var(--bg2)",
                  border:"1px solid "+(sexo===v?"var(--acc)":"var(--bg3)"),
                  borderRadius:8,color:sexo===v?"#fff":"var(--t2)",
                  padding:"7px",fontSize:13,fontWeight:600}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* Grid das 10 perguntas */}
        <div style={{color:"var(--t3)",fontSize:11,fontWeight:600,marginBottom:8}}>Selecione por onde começar ou siga a ordem</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {DEZ_PERGUNTAS.map((p,i)=>{
            const count=getRespCount(p.id);
            return(
              <button key={p.id} onClick={()=>setStep(i)}
                style={{background:count>0?"#0d2a1a":"var(--bg1)",
                  border:"1px solid "+(count>0?"#238636":"var(--bg2)"),
                  borderRadius:10,padding:"10px 10px",textAlign:"left",cursor:"pointer",
                  position:"relative",transition:"all .15s"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:18}}>{p.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:count>0?"#3fb950":"var(--t1)",fontSize:12,fontWeight:700,lineHeight:1.2}}>{p.num}. {p.titulo}</div>
                    <div style={{color:"var(--t4)",fontSize:10,marginTop:1}}>{p.subtitulo}</div>
                  </div>
                  {count>0&&<span style={{background:"#238636",color:"#fff",borderRadius:10,fontSize:10,padding:"1px 6px",fontWeight:700,flexShrink:0}}>✓{count}</span>}
                </div>
              </button>
            );
          })}
        </div>

        {/* Botão resumo */}
        <button onClick={()=>setStep(10)}
          style={{width:"100%",background:"var(--acc)",border:"none",borderRadius:10,
            color:"#fff",padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:6}}>
          📋 Ver Resumo e Enviar para Chat
        </button>
        <div style={{color:"var(--t4)",fontSize:10,textAlign:"center"}}>
          Você pode preencher apenas as perguntas relevantes ao caso
        </div>
      </div>
    </div>
  );

  // ── TELA RESUMO ──
  if(step===10){
    const totalPreench=DEZ_PERGUNTAS.filter(p=>getRespCount(p.id)>0).length;
    return(
      <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
        <div style={{padding:"8px 14px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",
          display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <button onClick={()=>setStep(-1)}
            style={{background:"var(--bg2)",border:"none",borderRadius:6,color:"var(--t2)",padding:"4px 10px",fontSize:13}}>
            ← Voltar
          </button>
          <span style={{color:"var(--t1)",fontWeight:700,fontSize:13}}>📋 Resumo da Anamnese</span>
          <span style={{background:"var(--bg2)",borderRadius:10,color:"var(--t3)",fontSize:11,padding:"1px 7px"}}>{totalPreench}/10</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}}>
          {queixa&&<div style={{background:"#0a1f35",border:"1px solid #1f6feb",borderRadius:8,padding:"8px 12px"}}>
            <span style={{color:"#58a6ff",fontSize:12,fontWeight:700}}>Queixa principal: </span>
            <span style={{color:"var(--t1)",fontSize:12}}>{queixa}</span>
            {sexo&&<span style={{color:"var(--t3)",fontSize:11,marginLeft:8}}>{sexo==="M"?"♂":"♀"}</span>}
          </div>}
          {DEZ_PERGUNTAS.map((p,i)=>{
            const r=respostas[p.id]||{};
            const hasData=Object.values(r).some(v=>Array.isArray(v)?v.length>0:!!v);
            return(
              <div key={p.id} style={{background:hasData?"var(--bg1)":"var(--bg0)",
                border:"1px solid "+(hasData?"var(--bg2)":"transparent"),borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
                  background:hasData?"var(--bg2)":"transparent",cursor:"pointer"}}
                  onClick={()=>setExpanded(expanded===p.id?null:p.id)}>
                  <span style={{fontSize:15}}>{p.emoji}</span>
                  <span style={{color:hasData?"var(--t1)":"var(--t4)",fontSize:12,fontWeight:700,flex:1}}>
                    {p.num}. {p.titulo}
                  </span>
                  {hasData
                    ?<span style={{color:"#3fb950",fontSize:11}}>✓ preenchido {expanded===p.id?"▲":"▼"}</span>
                    :<button onClick={e=>{e.stopPropagation();setStep(i);}}
                      style={{background:"var(--bg3)",border:"none",borderRadius:5,color:"var(--t3)",
                        fontSize:10,padding:"2px 7px",cursor:"pointer"}}>+ Preencher</button>
                  }
                </div>
                {hasData&&expanded===p.id&&(
                  <div style={{padding:"8px 12px",borderTop:"1px solid var(--bg2)"}}>
                    {p.perguntas.map((pq,qi)=>{
                      const v=r[qi];
                      if(!v||(Array.isArray(v)&&v.length===0)) return null;
                      return(
                        <div key={qi} style={{marginBottom:4}}>
                          <span style={{color:"var(--t3)",fontSize:11}}>{pq.q} </span>
                          <span style={{color:"var(--t1)",fontSize:11,fontWeight:600}}>
                            {Array.isArray(v)?v.join(", "):v}
                          </span>
                        </div>
                      );
                    })}
                    <button onClick={()=>setStep(i)}
                      style={{marginTop:4,background:"transparent",border:"1px solid var(--bg3)",
                        borderRadius:5,color:"var(--t3)",fontSize:10,padding:"2px 8px",cursor:"pointer"}}>
                      ✏️ Editar
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{padding:"10px 14px",background:"var(--bg1)",borderTop:"1px solid var(--bg2)",flexShrink:0}}>
          {totalPreench===0
            ?<div style={{color:"var(--t4)",fontSize:12,textAlign:"center",padding:4}}>Preencha pelo menos uma pergunta para enviar</div>
            :<button onClick={enviarChat}
              style={{width:"100%",background:"#1f6feb",border:"none",borderRadius:10,
                color:"#fff",padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              🤖 Enviar para Chat IA — Diagnóstico MTC
            </button>
          }
          {/* Salvar resumo da Anamnese no Prontuário */}
          <div style={{marginTop:6}}>
            <BtnSalvarProntuario
              queixa={queixa} sintomas={buildResumo()}
              diagnostico={buildResumo() ? `# Anamnese MTC — Dez Perguntas (十問歌)

${buildResumo()}` : null}
              fonte="Anamnese 10 Perguntas"
              onGoToPront={onGoToPront}
            />
          </div>
          <button onClick={()=>{setRespostas({});setQueixa("");setSexo("");setStep(-1);}}
            style={{width:"100%",marginTop:6,background:"transparent",border:"1px solid var(--bg3)",
              borderRadius:8,color:"var(--t4)",padding:"7px",fontSize:12,cursor:"pointer"}}>
            🗑 Limpar tudo
          </button>
        </div>
      </div>
    );
  }

  // ── TELA DE PERGUNTA ──
  const r = respostas[pAtual.id]||{};
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <button onClick={()=>setStep(-1)}
            style={{background:"var(--bg2)",border:"none",borderRadius:6,color:"var(--t2)",padding:"4px 8px",fontSize:12}}>
            ←
          </button>
          <span style={{fontSize:18}}>{pAtual.emoji}</span>
          <div style={{flex:1}}>
            <div style={{color:"var(--t1)",fontWeight:700,fontSize:13}}>{pAtual.num}. {pAtual.titulo}</div>
            <div style={{color:"var(--t4)",fontSize:10}}>{pAtual.subtitulo}</div>
          </div>
          <span style={{color:"var(--t4)",fontSize:11}}>{step+1}/10</span>
        </div>
        {/* Progress dots */}
        <div style={{display:"flex",gap:4,paddingTop:2}}>
          {DEZ_PERGUNTAS.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{flex:1,height:3,borderRadius:2,cursor:"pointer",
              background:i===step?"var(--acc)":getRespCount(DEZ_PERGUNTAS[i].id)>0?"#238636":"var(--bg3)",
              transition:"background .2s"}}/>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
        {pAtual.perguntas.map((pq,qi)=>(
          <div key={qi} style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:10,
            padding:"10px 12px",marginBottom:10}}>
            <div style={{color:"var(--t2)",fontSize:12,fontWeight:600,marginBottom:8}}>
              {pq.q}
              {pq.tipo==="checkbox"&&<span style={{color:"var(--t4)",fontWeight:400,fontSize:10,marginLeft:4}}>(múltipla escolha)</span>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pq.opts.map(opt=>{
                const isRadioSel = pq.tipo==="radio" && r[qi]===opt;
                const isCheckSel = pq.tipo==="checkbox" && (r[qi]||[]).includes(opt);
                const isSel = isRadioSel||isCheckSel;
                return(
                  <button key={opt} onClick={()=>setResp(pAtual.id,qi,opt,pq.tipo)}
                    style={{textAlign:"left",background:isSel?"var(--acc)":"var(--bg2)",
                      border:"1px solid "+(isSel?"var(--acc)":"var(--bg3)"),
                      borderRadius:8,color:isSel?"#fff":"var(--t2)",
                      padding:"8px 12px",fontSize:12,cursor:"pointer",
                      display:"flex",alignItems:"center",gap:8,transition:"all .12s"}}>
                    <span style={{fontSize:13,flexShrink:0,opacity:isSel?1:0.4}}>
                      {pq.tipo==="checkbox"?(isSel?"☑":"☐"):(isSel?"●":"○")}
                    </span>
                    {opt}
                  </button>
                );
              })}
            </div>
          </div>
        ))}

        {/* Nota clínica */}
        <div style={{background:"#12082e",border:"1px solid #7c3aed22",borderRadius:8,
          padding:"8px 12px",marginTop:4,marginBottom:10}}>
          <div style={{color:"#9d7eed",fontSize:10,fontWeight:700,marginBottom:2}}>📚 Referência diagnóstica</div>
          <div style={{color:"#c4b5fd",fontSize:11,lineHeight:1.5}}>{pAtual.nota}</div>
        </div>
      </div>

      {/* Footer nav */}
      <div style={{padding:"8px 12px",background:"var(--bg1)",borderTop:"1px solid var(--bg2)",
        display:"flex",gap:8,flexShrink:0}}>
        <button onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0}
          style={{background:"var(--bg2)",border:"none",borderRadius:8,color:step===0?"var(--t4)":"var(--t1)",
            padding:"9px 16px",fontSize:13,fontWeight:700,cursor:step===0?"default":"pointer"}}>
          ← Ant.
        </button>
        <button onClick={()=>step<9?setStep(step+1):setStep(10)}
          style={{flex:1,background:"var(--acc)",border:"none",borderRadius:8,
            color:"#fff",padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          {step<9?"Próxima →":"Ver Resumo →"}
        </button>
      </div>
    </div>
  );
}

// ─── PROTOCOLOS DE TRATAMENTO TAB ────────────────────────────────────────────
function ProtocolosTab({onChipClick,onSendToChat,onGoToPront}){
  const [pacAtivo] = usePacAtivo();
  const CATS=[
    {v:"todos",l:"Todos"},
    {v:"Clássica",l:"Clássicos"},
    {v:"Mental",l:"Mental"},
    {v:"Dor",l:"Dor"},
    {v:"Digestivo",l:"Digestivo"},
    {v:"Respiratório",l:"Respiratório"},
    {v:"Ginecológico",l:"Ginecológico"},
    {v:"Urológico",l:"Urológico"},
    {v:"Cardiovascular",l:"Cardiovasc."},
    {v:"Neurológico",l:"Neurológico"},
    {v:"Tonificação",l:"Tonificação"},
    {v:"Dermatológico",l:"Dermato"},
  ];
  const [cat,setCat]=useState("todos");
  const [busca,setBusca]=useState("");
  const [aberto,setAberto]=useState(null);

  const filtrados=COMBINACOES_CLINICAS.filter(c=>{
    const matchCat=cat==="todos"||c.cat.includes(cat);
    const q=busca.toLowerCase().trim();
    const matchBusca=!q||
      c.nome.toLowerCase().includes(q)||
      c.indicacoes.toLowerCase().includes(q)||
      c.pontos.toLowerCase().includes(q)||
      (c.nota&&c.nota.toLowerCase().includes(q));
    // Filtro inteligente: com texto de busca, categoria é opcional (OR); sem busca, categoria é obrigatória (AND)
    return q ? matchBusca : (matchCat&&matchBusca);
  });

  const CAT_COR={
    "Clássica":"#7c3aed","Mental":"#3b82f6","Dor":"#ef4444",
    "Digestivo":"#f59e0b","Respiratório":"#06b6d4","Ginecológico":"#ec4899",
    "Urológico":"#8b5cf6","Cardiovascular":"#f43f5e","Neurológico":"#14b8a6",
    "Tonificação":"#22c55e","Dermatológico":"#f97316",
  };
  function getColor(cat){
    for(const[k,v] of Object.entries(CAT_COR)){if(cat.includes(k))return v;}
    return "#6b7280";
  }

  function enviarChat(c){
    const txt=`Protocolo: **${c.nome}** (${c.cat})\n\n**Pontos:** ${c.pontos}\n**Indicações:** ${c.indicacoes}\n**Nota clínica:** ${c.nota}\n\nElabore um protocolo de sessão completo com técnica de inserção, profundidade, tempo de retenção, eletroestimulação se indicada, e observações clínicas adicionais.`;
    onSendToChat(txt);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{background:"#0d2d1a",border:"1px solid #238636",color:"#3fb950",
            borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>💊 Protocolos</span>
          <span style={{color:"var(--t3)",fontSize:11}}>{filtrados.length} protocolo{filtrados.length!==1?"s":""}</span>
          {busca.trim()&&cat!=="todos"&&(
            <span style={{background:"#1e3a5f",border:"1px solid #1f6feb",color:"#79c0ff",
              borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>🔍 busca global</span>
          )}
        </div>
        <input value={busca} onChange={e=>setBusca(e.target.value)}
          placeholder="Buscar por nome, indicação, ponto ou nota clínica..."
          style={{width:"100%",background:"var(--bg0)",border:"1px solid "+(busca.trim()?"var(--acc)":"var(--bg3)"),borderRadius:8,
            padding:"7px 10px",fontSize:12,color:"var(--t1)",outline:"none",boxSizing:"border-box",transition:"border-color .2s"}}/>
      </div>
      {/* Categorias */}
      <div style={{padding:"6px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",
        flexShrink:0,overflowX:"auto",whiteSpace:"nowrap"}}>
        <div style={{display:"inline-flex",gap:5}}>
          {CATS.map(c=>{
            const cor=c.v==="todos"?"#22c55e":getColor(c.v);
            const ativo=cat===c.v;
            return(
              <button key={c.v} onClick={()=>setCat(c.v)}
                style={{background:ativo?cor+"22":"var(--bg2)",
                  border:"1px solid "+(ativo?cor:"var(--bg3)"),
                  borderRadius:6,color:ativo?cor:"var(--t3)",
                  padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
                {c.l}
              </button>
            );
          })}
        </div>
      </div>
      {/* Lista */}
      <div style={{flex:1,overflowY:"auto",padding:"8px 12px",display:"flex",flexDirection:"column",gap:6}}>
        <PacAtivoBanner onGoToPront={onGoToPront}/>
        {filtrados.length===0&&(
          <div style={{color:"var(--t4)",fontSize:12,textAlign:"center",padding:20}}>
            <div style={{fontSize:24,marginBottom:8}}>🔍</div>
            <div>Nenhum protocolo encontrado</div>
            {busca.trim()&&cat!=="todos"&&(
              <div style={{marginTop:6,color:"var(--t3)",fontSize:11}}>
                Dica: a busca por texto já pesquisa em todas as categorias.<br/>
                Tente limpar o filtro de categoria para ver mais resultados.
              </div>
            )}
          </div>
        )}
        {filtrados.map((c,i)=>{
          const cor=getColor(c.cat);
          const isOpen=aberto===i;
          return(
            <div key={i}
              style={{background:isOpen?cor+"11":"var(--bg1)",
                border:"1px solid "+(isOpen?cor:"var(--bg2)"),
                borderRadius:10,padding:"10px 12px",transition:"all .15s"}}>
              {/* Header clicável para expandir/fechar */}
              <div style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer"}}
                onClick={()=>setAberto(isOpen?null:i)}>
                <div style={{flex:1}}>
                  <div style={{color:"var(--t1)",fontSize:13,fontWeight:700,marginBottom:4}}>{c.nome}</div>
                  {/* Chips sempre visíveis, mesmo fechado */}
                  <div onClick={e=>e.stopPropagation()} style={{lineHeight:2}}>
                    <PontosChips texto={c.pontos} onChipClick={onChipClick}/>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"flex-start",gap:5,flexShrink:0,paddingTop:2}}>
                  <span style={{background:cor+"22",border:"1px solid "+cor+"55",color:cor,
                    borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700,whiteSpace:"nowrap"}}>
                    {c.cat.split("/")[0]}
                  </span>
                  <span style={{color:"var(--t4)",fontSize:10}}>{isOpen?"▲":"▼"}</span>
                </div>
              </div>
              {isOpen&&(
                <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:7}}>
                  <div style={{background:"var(--bg2)",borderRadius:7,padding:"8px 10px"}}>
                    <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:4}}>📍 PONTOS</div>
                    <PontosChips texto={c.pontos} onChipClick={onChipClick}/>
                  </div>
                  <div style={{background:"var(--bg2)",borderRadius:7,padding:"8px 10px",fontSize:11}}>
                    <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:3}}>✅ INDICAÇÕES</div>
                    <div style={{color:"var(--t2)",lineHeight:1.5}}>{c.indicacoes}</div>
                  </div>
                  <div style={{background:cor+"0d",border:"1px solid "+cor+"22",borderRadius:7,padding:"8px 10px",fontSize:11}}>
                    <div style={{color:cor,fontSize:10,fontWeight:700,marginBottom:3}}>📚 NOTA CLÍNICA</div>
                    <div style={{color:"var(--t2)",lineHeight:1.5}}>{c.nota}</div>
                  </div>
                  {/* ── INDICAÇÃO DE TRATAR ── */}
                  {(()=>{
                    const pseudo={nome:c.nome,tipo:c.tipo||"misto",nota:c.nota||c.indicacoes||""};
                    const tec=getTecnica(pseudo);
                    return(
                      <div style={{background:"#0a1a0a",border:"1px solid #238636",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                        <div style={{color:"#3fb950",fontSize:10,fontWeight:700,marginBottom:6}}>⚙️ INDICAÇÃO DE TRATAR</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>

function DxOcidentalTab({onSendToChat, onChipClick, onGoToPront}){
  const [pacAtivo] = usePacAtivo();
  const SISTEMAS=[
    {v:"todos",l:"Todos"},
    {v:"Respiratório",l:"🫁 Resp."},
    {v:"Digestivo",l:"🍽️ Digest."},
    {v:"Mental/Emocional",l:"🧠 Mental"},
    {v:"Dor",l:"🦴 Dor"},
    {v:"Ginecológico",l:"👩 Gineco."},
    {v:"Cardiovascular",l:"❤️ Cardio."},
    {v:"Neurológico",l:"🧬 Neuro."},
    {v:"Urológico",l:"💧 Urol."},
    {v:"Dermatológico",l:"🧴 Derma."},
    {v:"Metabólico",l:"⚗️ Metab."},
    {v:"Reumatológico",l:"🦴 Reuma."},
    {v:"ORL",l:"👂 ORL"},
    {v:"Oftalmológico",l:"👁️ Oftalmo."},
    {v:"Estomatológico",l:"🦷 Estom."},
    {v:"Digestivo/Hepático",l:"🫀 Hepático"},
    {v:"ORL/Audiológico",l:"🔊 Audiol."},
    {v:"ORL/Psicossomático",l:"🗣️ ORL/Psico."},
  ];
  const TIPO_COR={def:"#3b82f6",exc:"#ef4444",misto:"#f59e0b"};
  const TIPO_L={def:"Deficiência",exc:"Excesso",misto:"Misto"};
  const PG=10; // itens por página

  const [sistema,setSistema]=useState("todos");
  const [busca,setBusca]=useState("");
  const [aberto,setAberto]=useState(null);
  const [viewDiff,setViewDiff]=useState(null);
  const [pagina,setPagina]=useState(0);
  const listaRef=useRef(null);

  // Normaliza string: remove acentos, lowercase, trim
  function norm(s){
    if(!s) return "";
    return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
  }

  const filtrados=useMemo(()=>{
    const matchArr=DX_OCIDENTAL.filter(c=>{
      const matchSist=sistema==="todos"||c.sistema===sistema;
      if(!matchSist) return false;
      const q=norm(busca);
      if(!q) return true;
      // Busca por múltiplos termos (AND): cada palavra deve estar em algum campo
      const termos=q.split(/\s+/).filter(Boolean);
      // Texto completo indexado da condição
      const haystack=[
        c.condicao,
        c.cid,
        c.sistema,
        c.diferencial||"",
        c.nota_maciocia||"",
        ...(c.padroes||[]).flatMap(p=>[
          p.nome||"", p.tipo||"", p.sintomas||"",
          p.pontos||"", p.lingua||"", p.pulso||"",
          p.prog||"", p.orientacoes||"", p.etiologia||"", p.nota||""
        ])
      ].map(norm).join(" ");
      return termos.every(t=>haystack.includes(t));
    });
    // Ordenação por relevância: correspondências no nome da condição primeiro
    if(norm(busca)){
      const q=norm(busca);
      matchArr.sort((a,b)=>{
        const aName=norm(a.condicao).includes(q)?0:1;
        const bName=norm(b.condicao).includes(q)?0:1;
        return aName-bName;
      });
    }
    return matchArr;
  },[sistema,busca]);

  const totalPags=Math.ceil(filtrados.length/PG);

  useEffect(()=>{
    setAberto(null);
    setViewDiff(null);

// ─── MODAL: PLANO DE SESSÃO ────────────────────────────────────────────────────
function PlanoSessaoModal({ padrao, onClose, onSendToChat, onChipClick }) {
  const tec = getTecnica(padrao);
  const exList = getEXSugeridos(padrao);
  const tungList = getTungSugeridos(padrao);

  // Parse pontos do padrão + EX sugeridos numa tabela editável
  const parsePontos = (str) => str.split(/[+,;\s]+/).map(s=>s.trim()).filter(s=>s.length>=2);

  const getTecDefault = (pt, padrao, tec) => {
    const n = pt.toLowerCase();
    if (padrao.tipo === "def") return "Tonificação";
    if (padrao.tipo === "exc") return "Dispersão";
    // pontos de drenagem/sangria
    if (n.includes("ig11")||n.includes("vg14")||n.includes("f2")) return "Dispersão";
    if (n.includes("e36")||n.includes("vc4")||n.includes("r3")) return padrao.tipo==="def"?"Tonificação":"Neutro";
    return "Neutro";
  };

  const [pontosTbl, setPontosTbl] = useState(()=>{
    const base = parsePontos(padrao.pontos).map(pt=>({
      pt, tecnica: getTecDefault(pt, padrao, tec), incl: true, obs:""
    }));
    const exExtra = exList.slice(0,3).map(ex=>({
      pt: ex.pt, tecnica:"Neutro", incl: false, obs: ex.nome
    }));
    return [...base, ...exExtra];
  });

  const [iaResult, setIaResult] = useState(null);
  const [iaLoading, setIaLoading] = useState(false);
  const [showSalvar, setShowSalvar] = useState(false);
  const [moxaObs, setMoxaObs] = useState(tec.moxa ? `${tec.moxa.nivel} — conforme nota clínica` : "Não indicada");
  const [eaObs, setEaObs] = useState(tec.eletro || "Avaliar pertinência");
  const [nSessoes, setNSessoes] = useState(
    padrao.prog ? padrao.prog.match(/(\d+)[–-]?(\d+)?\s*sess/i)?.[0] || "8–12 sessões" : "8–12 sessões"
  );

  function toggleIncl(i) {
    setPontosTbl(t=>t.map((r,ri)=>ri===i?{...r,incl:!r.incl}:r));
  }
  function setTec(i, val) {
    setPontosTbl(t=>t.map((r,ri)=>ri===i?{...r,tecnica:val}:r));
  }
  function setObs(i, val) {
    setPontosTbl(t=>t.map((r,ri)=>ri===i?{...r,obs:val}:r));
  }

  const pontosIncluidos = pontosTbl.filter(r=>r.incl);

  async function gerarComIA() {
    if (!cfg.hasKey()) {
      setIaResult("⚠️ Configure a chave API primeiro (botão 🔑 no topo).");
      return;
    }
    setIaLoading(true); setIaResult(null);
    const tabelaStr = pontosIncluidos.map(r=>`${r.pt} (${r.tecnica})${r.obs?" — "+r.obs:""}`).join("\n");
    const prompt = `Diagnóstico TCM confirmado: **${padrao.nome}** (${padrao.orgao} — ${padrao.tipo==="def"?"Deficiência":padrao.tipo==="exc"?"Excesso":"Misto"})

        // Penalidade se contraditório
        const contra=COR_CONTRADICT[linguaCor]||[];
        if(contra.some(k=>lng.includes(norm(k)))) pts-=2;
      }
    }

    // ── SABURRA (peso 3) ─────────────────────────────────────────────────────
    if(linguaSaburra){
      max+=3;
      const kws=SABURRA_MAP[linguaSaburra]||[];
      if(kws.some(k=>lng.includes(norm(k)))) pts+=3;
    }

    // ── UMIDADE DA LÍNGUA (peso 1) ────────────────────────────────────────────
    if(linguaUmidade){
      max+=1;
      const kws=UMID_MAP[linguaUmidade]||[];
      if(kws.some(k=>lng.includes(norm(k)))) pts+=1;
    }

    // ── FORMA DA LÍNGUA (peso 2 cada) ────────────────────────────────────────
    linguaForma.forEach(f=>{
      max+=2;
      const kws=FORMA_MAP[f]||[];
      if(kws.some(k=>lng.includes(norm(k)))) pts+=2;
    });

    // ── PULSO (peso 3 cada, com penalidade por contradição) ──────────────────
    pulsoQual.forEach(q=>{
      max+=3;
      const kws=PULSO_MAP[q]||[];
      const hit=kws.some(k=>pls.includes(norm(k)));
      if(hit) pts+=3;
      else {
        const contra=PULSO_CONTRADICT[q]||[];
        if(contra.some(k=>pls.includes(norm(k)))) pts-=1;
      }
    });

    // ── SINTOMAS LIVRES (normalizado, peso 1 por palavra) ────────────────────
    if(sintomasQuery.trim()){
      const words=norm(sintomasQuery).split(/[\s,;]+/).filter(w=>w.length>3);
      words.forEach(w=>{
        max+=1;
        if(sint.includes(w)||norm(padrao.nome).includes(w)||norm(padrao.orgao).includes(w)) pts+=1;
      });
    }

    // ── FILTROS HARD (exclusão) ───────────────────────────────────────────────
    if(orgaoFiltro&&!padrao.orgao.includes(orgaoFiltro)) return -1;
    if(tipoFiltro&&padrao.tipo!==tipoFiltro) return -1;
    // ── FILTRO POR PONTOS ────────────────────────────────────────────────────
    if(pontosFiltro.trim()){
      const pts=norm(pontosFiltro).split(/[\s,;+]+/).filter(p=>p.length>=2);
      const pontosPadrao=norm(padrao.pontos);
      const allMatch=pts.every(pt=>pontosPadrao.includes(pt));
      if(!allMatch) return -1;
    }

    if(max===0) return 0;
    // Clamp entre 0–100
    return Math.max(0, Math.min(100, Math.round((pts/max)*100)));
  }

  function buscar(){
    const hasClinical = linguaCor||linguaSaburra||linguaUmidade||linguaForma.length||pulsoQual.length||sintomasQuery.trim();
    const hasFilter   = hasClinical||orgaoFiltro||tipoFiltro||pontosFiltro.trim();
    if(!hasFilter){setResultados([]);return;}
    const scored=PADROES_TCM
      .map(p=>({...p,score:score(p)}))
      .filter(p=>{
        if(p.score<0) return false;           // filtro hard excluiu
        if(hasClinical && p.score===0 && !pontosFiltro.trim()) return false; // sem nenhum match clínico — omite
        return true;
      })
      .sort((a,b)=>b.score-a.score);
    setResultados(scored);
    setSelecionado(null);
  }

  // ── FUSÃO DE PONTOS: une dois padrões sem duplicatas ─────────────────────────
  function fundirPontos(pontos1, pontos2){
    // Normaliza cada ponto: remove espaços e hifens extras, uppercase
    const norm2 = s => s.trim().toUpperCase().replace(/[\s\-]+/g,"").replace(/[ÃA]O/g,"AO");
    const parse = str => str.split(/[+,;\/\s]+/).map(s=>s.trim()).filter(s=>s.length>=2);
    const p1 = parse(pontos1);
    const p2 = parse(pontos2);
    const vistos = new Set(p1.map(norm2));
    const novos = p2.filter(p=>!vistos.has(norm2(p)));
    // Retorna: pontos do 1º + pontos exclusivos do 2º (marcados)
    return {base: p1, adicionais: novos, todos: [...p1, ...novos]};
  }

                        <span key={"a"+i} onClick={()=>onChipClick&&onChipClick(pt)}
                          style={{background:"#12082e",border:"1px solid #7c3aed",color:"#c4b5fd",
                            borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                          {pt} <span style={{fontSize:9,opacity:.7}}>②</span>
                        </span>
                      ))}
                    </div>
                    <div style={{color:"var(--t4)",fontSize:9}}>
                      Azul = padrão principal · Roxo = adicionados do padrão secundário · Toque para ver o ponto
                    </div>
                  </div>
                  {/* Botões de ação */}
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={e=>{
                      e.stopPropagation();
                      const fus2=fundirPontos(selecionado.pontos,segundoPadrao.pontos);
                      const content=`# Diagnóstico Combinado TCM\n\n**① Padrão Principal (${selecionado.score}%):** ${selecionado.nome} — ${selecionado.orgao}\n**② Padrão Secundário (${segundoPadrao.score}%):** ${segundoPadrao.nome} — ${segundoPadrao.orgao}\n\n**Prescrição fundida:** ${fus2.todos.join("+")}\n- Pontos base (①): ${fus2.base.join("+")}\n- Adicionais de ②: ${fus2.adicionais.length>0?fus2.adicionais.join("+"):"—"}\n\n**Nota clínica ①:** ${selecionado.nota}\n**Nota clínica ②:** ${segundoPadrao.nota}`;
                      addFav("Comb: "+selecionado.nome+" + "+segundoPadrao.nome, content, "diag");
                      setCombSaved(true);
                      setTimeout(()=>setCombSaved(false),2000);
                    }}
                      style={{flex:"0 0 auto",background:combSaved?"#1a3a1a":"#0d2d1a",
                        border:"1px solid "+(combSaved?"#3fb950":"#238636"),
                        borderRadius:8,color:combSaved?"#3fb950":"#7ee787",
                        padding:"9px 14px",fontSize:12,fontWeight:700,cursor:"pointer",
                        transition:"all .2s",whiteSpace:"nowrap"}}>
                      {combSaved?"✓ Salvo":"⭐ Salvar"}
                    </button>
                    <button onClick={e=>{e.stopPropagation();enviarCombinado();}}
                      style={{flex:1,background:"linear-gradient(135deg,#7c3aed,#1f6feb)",border:"none",
                        borderRadius:8,color:"#fff",padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      🤖 Elaborar Protocolo Combinado
                    </button>
                  </div>
                </div>
              );
            })()}
            {!showCombinado&&(
              <button onClick={()=>setShowCombinado(true)}
                style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#1f6feb)",border:"none",
                  borderRadius:8,color:"#fff",padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                🤖 Ver Prescrição Fundida e Elaborar Protocolo
              </button>
            )}
          </div>
        )}

        {/* RESULTADOS */}
        {resultados!==null&&(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{color:"var(--t3)",fontSize:11,fontWeight:600}}>
              {resultados.length===0?"Nenhum padrão encontrado — tente menos filtros":
               `${resultados.length} padrão(s) encontrado(s) ${resultados[0]?.score>0?"— ordenado por compatibilidade":""}`}
              {selecionado&&!segundoPadrao&&<span style={{color:"#9d7eed",marginLeft:8}}>
                · toque em ＋ em outro padrão para combinar
              </span>}
            </div>
            {resultados.map((p,i)=>{
              const isSel=selecionado?.nome===p.nome;
              const isSeg=segundoPadrao?.nome===p.nome;
              const cor=tipoCor[p.tipo]||"var(--t3)";
              const bg=tipoBg[p.tipo]||"var(--bg1)";
              const bd=tipoBd[p.tipo]||"var(--bg2)";
              return(
                <div key={i} onClick={()=>{
                    if(!isSel) setSelecionado(p);
                    else if(!isSeg) setSelecionado(null);
                  }}
                  style={{background:isSeg?"#12082e":isSel?bg:"var(--bg1)",
                    border:"1px solid "+(isSeg?"#7c3aed":isSel?cor:"var(--bg2)"),
                    borderRadius:10,padding:"10px 12px",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:isSel?8:0}}>
                    {p.score>0&&<div style={{background:p.score>=70?"#238636":p.score>=40?"#9e6a03":"var(--bg3)",
                      color:p.score>=70?"#3fb950":p.score>=40?"#d29922":"var(--t4)",
                      borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700,minWidth:32,textAlign:"center"}}>
                      {p.score}%
                    </div>}
                    {/* Badge ① ou ② */}
                    {isSel&&<span style={{background:"#1f6feb",color:"#fff",borderRadius:4,
                      padding:"1px 5px",fontSize:10,fontWeight:700}}>①</span>}
                    {isSeg&&<span style={{background:"#7c3aed",color:"#fff",borderRadius:4,
                      padding:"1px 5px",fontSize:10,fontWeight:700}}>②</span>}
                    <span style={{color:"var(--t1)",fontSize:12,fontWeight:700,flex:1}}>{p.nome}</span>
                    {/* Botão combinar — só aparece se há um principal selecionado e este não é o principal/secundário */}
                    {selecionado&&!isSel&&!isSeg&&(
                      <button onClick={e=>{
                        e.stopPropagation();
                        setSegundoPadrao(p);
                        setShowCombinado(false);
                        // scroll para o painel combinado
                        setTimeout(()=>document.getElementById("painel-combinado")?.scrollIntoView({behavior:"smooth"}),100);
                      }}
                        style={{background:"#12082e",border:"1px solid #7c3aed",
                          borderRadius:6,color:"#c4b5fd",padding:"3px 8px",fontSize:11,
                          fontWeight:700,cursor:"pointer",flexShrink:0}}>
                        ＋ Combinar
                      </button>
                    )}
                    {isSeg&&(
                      <button onClick={e=>{e.stopPropagation();setSegundoPadrao(null);setShowCombinado(false);}}
                        style={{background:"#3d0a0a",border:"1px solid #da3633",
                          borderRadius:6,color:"#ff7b72",padding:"3px 8px",fontSize:11,
                          fontWeight:700,cursor:"pointer",flexShrink:0}}>
                        ✕ Remover
                      </button>
                    )}
                    <span style={{background:bd,border:"1px solid "+cor,color:cor,
                      borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600}}>
                      {p.tipo==="def"?"Def":p.tipo==="exc"?"Exc":"Misto"}
                    </span>
                    <span style={{color:"var(--t4)",fontSize:10}}>{isSel?"▲":"▼"}</span>
                  </div>
                  {!isSel&&<div style={{color:"var(--t4)",fontSize:11,marginTop:3}}>{p.orgao}</div>}
                  {isSel&&(
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      <div style={{color:"var(--t4)",fontSize:11,fontWeight:600}}>{p.orgao}</div>
                      <div style={{background:"var(--bg2)",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                        <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>👅 LÍNGUA</div>
                        <div style={{color:"var(--t2)"}}>{p.lingua}</div>
                      </div>
                      <div style={{background:"var(--bg2)",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                        <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>💓 PULSO</div>
                        <div style={{color:"var(--t2)"}}>{p.pulso}</div>
                      </div>
                      <div style={{background:"var(--bg2)",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                        <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>🩺 SINTOMAS-CHAVE</div>
                        <div style={{color:"var(--t2)"}}>{p.sintomas}</div>
                      </div>
                      <div style={{background:"var(--bg2)",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                        <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>📍 PONTOS-BASE</div>
                        <PontosChips texto={p.pontos} onChipClick={onChipClick}/>
                      </div>
                      {/* ── PONTOS EXTRAS SUGERIDOS ── */}
                      {(()=>{
                        const exList=getEXSugeridos(p);
                        if(!exList.length) return null;
                        return(
                          <div style={{background:"#0a1f1a",border:"1px solid #238636",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                            <div style={{color:"#3fb950",fontSize:10,fontWeight:700,marginBottom:6}}>✳️ PONTOS EXTRAS (EX) SUGERIDOS</div>
                            <div style={{display:"flex",flexDirection:"column",gap:4}}>
                              {exList.map((ex,ei)=>(
                                <div key={ei} style={{display:"flex",alignItems:"flex-start",gap:6}}>
                                  <span style={{background:"#238636",color:"#fff",borderRadius:4,padding:"1px 6px",
                                    fontSize:10,fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{ex.pt}</span>
                                  <span style={{color:"#86efac",fontSize:10,fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>{ex.nome}</span>
                                  <span style={{color:"var(--t3)",fontSize:10,flex:1}}>{ex.ind}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })()}
                      {/* ── SUGESTÕES TUNG ── */}
                      {(()=>{
                        const tungList=getTungSugeridos(p);
                        if(!tungList.length) return null;
                        return(
                          <div style={{background:"#1a0a2e",border:"1px solid #7c3aed",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                            <div style={{color:"#c4b5fd",fontSize:10,fontWeight:700,marginBottom:6}}>董 ACUPUNTURA TUNG — SUGESTÕES</div>
                            <div style={{display:"flex",flexDirection:"column",gap:4}}>
                              {tungList.map((t,ti)=>(
                                <div key={ti} style={{display:"flex",alignItems:"flex-start",gap:6}}>
                                  <span style={{background:"#7c3aed",color:"#fff",borderRadius:4,padding:"1px 6px",
                                    fontSize:10,fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{t.id}</span>
                                  <span style={{color:"#a78bfa",fontSize:10,fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>{t.n}</span>
                                  <span style={{color:"#ddd6fe",fontSize:10,flex:1}}>{t.r}</span>
                                </div>
                              ))}
                            </div>
                            <div style={{color:"#6d28d9",fontSize:9,marginTop:6}}>
                              ↔️ Inserção contralateral · Técnica Dòng Qì (paciente move a área afetada) · Reter 30 min
                            </div>
                          </div>
                        );
                      })()}
                      {/* ── TÉCNICA ESTRUTURADA ── */}
                      {(()=>{
                        const tec=getTecnica(p);
                        return(
                          <div style={{background:"#0a1a0a",border:"1px solid #238636",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                            <div style={{color:"#3fb950",fontSize:10,fontWeight:700,marginBottom:6}}>⚙️ INDICAÇÃO DE TRATAR</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                              {/* Agulhamento */}
                              <span style={{background:"#0d2d4f",border:"1px solid #1f6feb",color:"#58a6ff",
                                borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700}}>
                                🪡 {tec.geral}
                              </span>
                              {/* Retenção */}
                              <span style={{background:"var(--bg2)",border:"1px solid var(--bg3)",color:"var(--t3)",
                                borderRadius:5,padding:"3px 8px",fontSize:10}}>
                                ⏱ {tec.retencao}
                              </span>
                              {/* Moxa */}
                              {tec.moxa&&(
                                <span style={{background:tec.moxa.nivel==="contraindicada"?"#1a0808":"#1a1000",
                                  border:"1px solid "+tec.moxa.cor,color:tec.moxa.cor,
                                  borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700}}>
                                  🔥 Moxa {tec.moxa.nivel}
                                </span>
                              )}
                              {/* Eletroestimulação */}
                              {tec.eletro&&(
                                <span style={{background:"#0d1a2e",border:"1px solid #58a6ff55",color:"#79c0ff",
                                  borderRadius:5,padding:"3px 8px",fontSize:10}}>
                                  ⚡ {tec.eletro}
                                </span>
                              )}
                              {/* Sangria */}
                              {tec.sangria&&(
                                <span style={{background:"#2d0000",border:"1px solid #da3633",color:"#f85149",
                                  borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700}}>
                                  🩸 Sangria indicada
                                </span>
                              )}
                              {/* Urgência */}
                              {tec.urgencia&&(
                                <span style={{background:"#3d0000",border:"1px solid #ff7b72",color:"#ff7b72",
                                  borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700,animation:"pulse 1s infinite"}}>
                                  ⚠️ URGÊNCIA MÉDICA
                                </span>
                              )}
                            </div>
                          </div>
                        );
                      })()}
                      <div style={{background:"#12082e",border:"1px solid #7c3aed22",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                        <div style={{color:"#9d7eed",fontSize:10,fontWeight:700,marginBottom:2}}>📚 NOTA CLÍNICA</div>
                        <div style={{color:"#c4b5fd",lineHeight:1.5}}>{p.nota}</div>
                      </div>
                      {p.etiologia&&(
                        <div style={{background:"#1a1500",border:"1px solid #d2992244",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                          <div style={{color:"#d29922",fontSize:10,fontWeight:700,marginBottom:2}}>🌱 ETIOLOGIA E FATORES DESENCADEANTES</div>
                          <div style={{color:"#e3b341",lineHeight:1.5}}>{p.etiologia}</div>
                        </div>
                      )}
                      {p.prog&&(
                        <div style={{background:"#0d1a2e",border:"1px solid #1f6feb44",borderRadius:7,padding:"7px 10px",fontSize:11}}>
                          <div style={{color:"#58a6ff",fontSize:10,fontWeight:700,marginBottom:2}}>📈 PROGNÓSTICO E CONDUTA</div>
                          <div style={{color:"#79c0ff",lineHeight:1.5}}>{p.prog}</div>
                        </div>
                      )}
                      <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                        <button onClick={e=>{
                          e.stopPropagation();
                          const tec=getTecnica(p);
                          const exList=getEXSugeridos(p);
                          const tungList=getTungSugeridos(p);
                          const exStr=exList.length?exList.map(ex=>ex.pt+" "+ex.nome+": "+ex.ind).join("; "):"—";
                          const tungStr=tungList.length?tungList.map(t=>t.id+" "+t.n+": "+t.r).join("; "):"—";
                          const diagContent=`# Diagnóstico TCM — ${p.nome}\n\n**Órgão:** ${p.orgao}  \n**Tipo:** ${p.tipo==="def"?"Deficiência":p.tipo==="exc"?"Excesso":"Misto"}\n\n**Língua:** ${p.lingua}\n**Pulso:** ${p.pulso}\n**Sintomas-chave:** ${p.sintomas}\n\n**Pontos-base:** ${p.pontos}\n\n**Indicação de tratar:**\n- Agulhamento: ${tec.geral}\n- Retenção: ${tec.retencao}${tec.moxa?("\n- Moxa: "+tec.moxa.nivel):""}${tec.eletro?("\n- Eletro: "+tec.eletro):""}${tec.sangria?"\n- Sangria: indicada":""}\n\n**Pontos EX sugeridos:** ${exStr}\n**Tung sugerido:** ${tungStr}\\n\\n**Nota clínica:** ${p.nota}${p.etiologia?("\\n\\n**Etiologia:** "+p.etiologia):""}${p.prog?("\\n\\n**Prognóstico:** "+p.prog):""}`;;
                          addFav("Diag: "+p.nome, diagContent, "diag");
                          setDiagSaved(true);
                          setTimeout(()=>setDiagSaved(false),2000);
                        }}
                          style={{flex:"0 0 auto",background:diagSaved?"#1a3a1a":"#0d2d1a",
                            border:"1px solid "+(diagSaved?"#3fb950":"#238636"),
                            borderRadius:8,color:diagSaved?"#3fb950":"#7ee787",
                            padding:"9px 12px",fontSize:12,fontWeight:700,cursor:"pointer",
                            transition:"all .2s",whiteSpace:"nowrap"}}>
                          {diagSaved?"✓ Salvo":"⭐"}
                        </button>
                        <button onClick={e=>{e.stopPropagation();setShowPlanoSessao(true);}}
                          style={{flex:1,background:"linear-gradient(135deg,#0d2d1a,#0d2d4f)",
                            border:"1px solid #238636",
                            borderRadius:8,color:"#3fb950",padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer",
                            whiteSpace:"nowrap",minWidth:0}}>
                          🗒️ Plano de Sessão
                        </button>
                        <button onClick={e=>{e.stopPropagation();enviarChat();}}
                          style={{flex:"0 0 auto",background:"var(--bg2)",border:"1px solid var(--bg3)",borderRadius:8,
                            color:"var(--t2)",padding:"9px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                          💬
                        </button>
                      </div>
                      {/* Salvar no Prontuário */}
                      <div style={{marginTop:6}} onClick={e=>e.stopPropagation()}>
                        <BtnSalvarProntuario
                          queixa={queixa||""}
                          sintomas={sintomas.join(", ")}
                          lingua={`${linguaCor} ${linguaSaburra} ${linguaUmidade} ${linguaForma.join(", ")}`}
                          pulso={JSON.stringify(pulsoPos)}
                          diagnostico={`# ${p.nome} (${p.score}%)

**Órgão:** ${p.orgao} · **Tipo:** ${p.tipo}

**Pontos:** ${p.pontos}

**Língua:** ${p.lingua}

**Pulso:** ${p.pulso}

**Sintomas:** ${p.sintomas}

**Nota:** ${p.nota}`}
                          pontos={p.pontos}
                          fonte="Diagnose"
                          onGoToPront={onGoToPront}
                        />
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Banner Constitucional — quando vem do ConstitTab */}
        {constitCtx && (
          <div style={{background:"#0d2818",border:"1px solid #3fb950",borderRadius:10,
            padding:"10px 12px",marginBottom:10,display:"flex",alignItems:"flex-start",gap:10}}>
            <span style={{fontSize:18,flexShrink:0}}>🧬</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:"#3fb950",marginBottom:3}}>
                Contexto Constitucional TCM
              </div>
              <div style={{fontSize:11,color:"#7ee787",lineHeight:1.5}}>{constitCtx}</div>
              <div style={{fontSize:10,color:"var(--t4)",marginTop:4}}>
                Este contexto será incluído automaticamente no prompt da IA ao enviar ao Chat.
              </div>
            </div>
            <button onClick={()=>setConstitCtx(null)}
              style={{background:"none",border:"none",color:"var(--t4)",fontSize:16,cursor:"pointer",padding:"0 2px",flexShrink:0}}>✕</button>
          </div>
        )}

        {/* Estado inicial */}
        {resultados===null&&(
          <div style={{background:"#12082e",border:"1px solid #7c3aed22",borderRadius:10,padding:"14px 14px"}}>
            <div style={{color:"#9d7eed",fontSize:12,fontWeight:700,marginBottom:6}}>📖 Como usar</div>
            <div style={{color:"#c4b5fd",fontSize:11,lineHeight:1.7}}>
              1. Selecione os achados da língua e pulso do paciente{"\n"}
              2. Digite sintomas-chave (opcional){"\n"}
              3. Use filtros de órgão e tipo (opcional){"\n"}
              4. Clique em Buscar — os padrões são ordenados por compatibilidade{"\n"}
              5. Clique no padrão principal para ver detalhes{"\n"}
              6. Toque em <strong style={{color:"#c4b5fd"}}>＋ Combinar</strong> em um 2º padrão para fusão de prescrições{"\n"}
              7. Toque em <strong style={{color:"#3fb950"}}>🗒️ Plano de Sessão</strong> para gerar prescrição completa com técnica ponto a ponto
            </div>
          </div>
        )}
      </div>

      {/* Modal Plano de Sessão */}
      {showPlanoSessao&&selecionado&&(
        <PlanoSessaoModal
          padrao={selecionado}
          onClose={()=>setShowPlanoSessao(false)}
          onSendToChat={q=>{onSendToChat(q);setShowPlanoSessao(false);}}
          onChipClick={onChipClick}
        />
      )}
    </div>
  );
}

  {g:"🌿 Pele/Cabelo", s:["Prurido generalizado","Prurido noturno","Erupção vermelha","Erupção pálida","Pele seca","Pele oleosa","Acne inflamatória","Psoríase","Eczema com secreção","Urticária","Herpes zóster","Manchas brancas","Queda de cabelo","Caspa e seborréia"]},
];

const SYS_SINT = `Você é especialista em Medicina Tradicional Chinesa (MTC). Analise os dados clínicos informados (sintomas + achados objetivos de língua e pulso quando presentes) e retorne SOMENTE um JSON válido, sem texto antes ou depois, sem markdown, no formato:
{"padroes":[{"nome":"Nome do Padrão","orgao":"Órgão","natureza":"Deficiência|Excesso|Misto","compatibilidade":85,"sintomas_match":["sintoma1","sintoma2"],"lingua_esperada":"desc","pulso_esperado":"desc","pontos_principais":"E36+BP6+...","explicacao":"Raciocínio clínico em 2-3 frases incluindo como língua/pulso confirmam ou refutam o padrão."}]}
Quando língua e/ou pulso forem informados, use-os como critério de confirmação ou exclusão de padrões — eles devem pesar bastante na compatibilidade. Retorne 3 a 5 padrões ordenados por compatibilidade decrescente. APENAS O JSON.`;

function SintomasTab({onSendToChat, onChipClick, onRefinarDiag, onGoToPront}){
  const [pacAtivo] = usePacAtivo();
  const [chips,setChips]=useState([]);
  const [texto,setTexto]=useState("");
  const [resultado,setResultado]=useState(null);
  const [loading,setLoading]=useState(false);
  const [erro,setErro]=useState("");
  const [expandido,setExpandido]=useState(null);
  const [grupoAberto,setGrupoAberto]=useState(null);
  // Achados objetivos (Item 5)
  const [linguaCor,setLinguaCor]=useState("");
  const [linguaSaburra,setLinguaSaburra]=useState("");
  const [linguaForma,setLinguaForma]=useState([]);
  const [pulsoQual,setPulsoQual]=useState([]);
  const [showObjetivos,setShowObjetivos]=useState(false);

  const SINT_COR_L=[
    {v:"pálida",l:"Pálida",c:"#94a3b8"},{v:"normal/rosa",l:"Normal",c:"#f9a8d4"},
    {v:"vermelha",l:"Vermelha",c:"#ef4444"},{v:"escarlate",l:"Escarlate",c:"#dc2626"},
    {v:"roxa",l:"Roxa",c:"#a855f7"},{v:"azulada",l:"Azulada",c:"#3b82f6"},
  ];
  const SINT_SAB_L=[
    {v:"branca fina",l:"Branca fina"},{v:"branca espessa",l:"Branca espessa"},
    {v:"amarela fina",l:"Amarela fina"},{v:"amarela espessa",l:"Amarela espessa"},
    {v:"gordurosa/pegajosa",l:"Gordurosa"},{v:"sem saburra",l:"Sem saburra"},
    {v:"rachada/fissuras",l:"Rachada"},
  ];
  const SINT_FORMA_L=[
    {v:"marcas de dentes",l:"Marcas dentes"},{v:"inchada",l:"Inchada"},
    {v:"fina/pequena",l:"Fina"},{v:"ponta vermelha",l:"Ponta ↑"},
    {v:"bordas vermelhas",l:"Bordas ↑"},{v:"trêmula",l:"Trêmula"},
    {v:"rígida",l:"Rígida"},
  ];
  const SINT_PULSO_L=[
    {v:"fraco/vazio",l:"Fraco"},{v:"forte/cheio",l:"Forte"},{v:"fino",l:"Fino"},
    {v:"em corda",l:"Corda"},{v:"escorregadio",l:"Escorr."},{v:"rápido",l:"Rápido"},
    {v:"lento",l:"Lento"},{v:"profundo",l:"Profundo"},{v:"flutuante",l:"Flutuante"},
    {v:"rugoso",l:"Rugoso"},{v:"irregular",l:"Irregular"},
  ];

  function toggleArr2(arr,setArr,v){setArr(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);}
  const temObjetivos = linguaCor||linguaSaburra||linguaForma.length>0||pulsoQual.length>0;

  function toggleChip(s){setChips(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);}

  function limpar(){
    setChips([]);setTexto("");setResultado(null);setErro("");setExpandido(null);
    setLinguaCor("");setLinguaSaburra("");setLinguaForma([]);setPulsoQual([]);
  }

  // Mapeia valores do SintomasTab para chaves do DiagTab
  const SINT_TO_DIAG_COR={"pálida":"palida","normal/rosa":"normal","vermelha":"vermelha","escarlate":"vermelha_escarlate","roxa":"roxa","azulada":"azulada"};
  const SINT_TO_DIAG_SAB={"branca fina":"branca_fina","branca espessa":"branca_espessa","amarela fina":"amarela_fina","amarela espessa":"amarela_espessa","gordurosa/pegajosa":"gordurosa","sem saburra":"sem_saburra","rachada/fissuras":"rachada"};
  const SINT_TO_DIAG_FORMA={"marcas de dentes":"marcas_dentes","inchada":"inchada","fina/pequena":"fina_pequena","ponta vermelha":"ponta_vermelha","bordas vermelhas":"bordas_vermelhas","trêmula":"tremula","rígida":"rigida"};
  const SINT_TO_DIAG_PULSO={"fraco/vazio":"fraco","forte/cheio":"forte","fino":"fino","em corda":"corda","escorregadio":"escorregadio","rápido":"rapido","lento":"lento","profundo":"profundo","flutuante":"flutuante","rugoso":"rugoso","irregular":"irregular"};

  function refinarNoDiag(){
    if(!temObjetivos){return;}
    const prefill={
      linguaCor: SINT_TO_DIAG_COR[linguaCor]||"",
      linguaSaburra: SINT_TO_DIAG_SAB[linguaSaburra]||"",
      linguaForma: linguaForma.map(f=>SINT_TO_DIAG_FORMA[f]).filter(Boolean),
      pulsoQual: pulsoQual.map(p=>SINT_TO_DIAG_PULSO[p]).filter(Boolean),
    };
    onRefinarDiag(prefill);
  }

  async function analisar(){
    const todos=[...chips];
    if(texto.trim()) todos.push(...texto.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean));
    if(todos.length===0&&!temObjetivos){setErro("Informe pelo menos um sintoma ou achado objetivo.");return;}
    setErro("");setLoading(true);setResultado(null);setExpandido(null);
    try{
      let prompt="";
      if(todos.length>0) prompt+="Sintomas do paciente:\n"+todos.map(s=>"- "+s).join("\n");
      const linguaParts=[];
      if(linguaCor) linguaParts.push("Cor do corpo: "+linguaCor);
      if(linguaSaburra) linguaParts.push("Saburra: "+linguaSaburra);
      if(linguaForma.length>0) linguaParts.push("Forma/características: "+linguaForma.join(", "));
      if(linguaParts.length>0) prompt+="\n\nAchados objetivos — Língua:\n"+linguaParts.map(p=>"- "+p).join("\n");
      if(pulsoQual.length>0) prompt+="\n\nAchados objetivos — Pulso:\n- Qualidades: "+pulsoQual.join(", ");
      prompt+="\n\nAnalise todos os dados clínicos e retorne o JSON conforme instruído.";
      const raw=await callAI([{role:"user",content:prompt}],SYS_SINT,null);
      const clean=raw.replace(/```json|```/g,"").trim();
      const data=JSON.parse(clean);
      if(!data.padroes) throw new Error("Resposta inválida");
      setResultado(data.padroes);
    }catch(e){setErro("Erro: "+e.message);}
    setLoading(false);
  }

  function enviarChat(p){
    const linguaObs=[];
    if(linguaCor) linguaObs.push("cor: "+linguaCor);
    if(linguaSaburra) linguaObs.push("saburra: "+linguaSaburra);
    if(linguaForma.length) linguaObs.push(linguaForma.join(", "));
    const linguaTxt=linguaObs.length?"Língua observada: "+linguaObs.join("; ")+"\n":"";
    const pulsoTxt=pulsoQual.length?"Pulso observado: "+pulsoQual.join(", ")+"\n":"";
    const constitPart = constitCtx ? `\n**Contexto Constitucional TCM:** ${constitCtx}\n` : "";
    const txt="Diagnóstico MTC por análise clínica:\n\n**"+p.nome+"** ("+p.orgao+" — "+p.natureza+") — Compatibilidade: "+p.compatibilidade+"%\n\n**Sintomas correspondentes:** "+(p.sintomas_match||[]).join(", ")+"\n"+linguaTxt+pulsoTxt+"**Língua esperada para o padrão:** "+p.lingua_esperada+"\n**Pulso esperado para o padrão:** "+p.pulso_esperado+"\n**Pontos-base:** "+p.pontos_principais+"\n**Raciocínio:** "+p.explicacao+constitPart+"\n\nCom base neste padrão, elabore protocolo completo com pontos principais e auxiliares, técnica (tonificação/dispersão), moxa se indicada, dosimetria e observações clínicas.";
    onSendToChat(txt);
  }

  const natCor={Deficiência:"#1f6feb",Excesso:"#da3633",Misto:"#9e6a03"};
  const natBg ={Deficiência:"#0d2d4f",Excesso:"#3d0a0a",Misto:"#2a1f05"};
  const natBd ={Deficiência:"#1f6feb44",Excesso:"#da363344",Misto:"#9e6a0344"};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"10px 10px 80px"}}>
        <PacAtivoBanner onGoToPront={onGoToPront}/>
        <div style={{marginBottom:10}}>
          <div style={{color:"var(--t1)",fontWeight:700,fontSize:14}}>🔎 Busca por Sintomas</div>
          <div style={{color:"var(--t4)",fontSize:11,marginTop:2}}>Selecione ou digite sintomas → IA identifica os padrões MTC mais prováveis</div>
        </div>

        <div style={{marginBottom:10}}>
          <div style={{color:"var(--t3)",fontSize:11,fontWeight:700,marginBottom:4}}>✏️ Digite sintomas (separados por vírgula)</div>
          <textarea value={texto} onChange={e=>setTexto(e.target.value)}
            placeholder="Ex: insônia, ansiedade, boca seca, lombalgia..."
            rows={2}
            style={{width:"100%",background:"var(--bg2)",border:"1px solid var(--bg3)",
              borderRadius:8,color:"var(--t1)",padding:"8px 10px",fontSize:12,
              resize:"none",outline:"none",boxSizing:"border-box"}}/>
        </div>

        {/* ── ACHADOS OBJETIVOS (língua + pulso) ── */}
        <div style={{marginBottom:10}}>
          <button onClick={()=>setShowObjetivos(!showObjetivos)}
            style={{width:"100%",background:temObjetivos?"#0a1f35":"var(--bg1)",
              border:"1px solid "+(temObjetivos?"#1f6feb":"var(--bg3)"),
              borderRadius:showObjetivos?"7px 7px 0 0":7,color:temObjetivos?"#58a6ff":"var(--t2)",
              padding:"7px 10px",fontSize:12,cursor:"pointer",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>
              👅💓 Achados objetivos — Língua &amp; Pulso
              {temObjetivos&&<span style={{background:"#1f6feb",color:"#fff",borderRadius:10,
                padding:"1px 6px",fontSize:10,marginLeft:6}}>
                {[linguaCor,linguaSaburra,...linguaForma,...pulsoQual].filter(Boolean).length}
              </span>}
            </span>
            <span style={{opacity:0.5,fontSize:10}}>{showObjetivos?"▲":"▼"} opcional</span>
          </button>
          {showObjetivos&&(
            <div style={{background:"var(--bg1)",border:"1px solid var(--bg3)",
              borderTop:"none",borderRadius:"0 0 7px 7px",padding:"10px"}}>
              {/* Língua — cor */}
              <div style={{marginBottom:8}}>
                <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:5}}>👅 Cor do corpo da língua</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {SINT_COR_L.map(c=>(
                    <button key={c.v} onClick={()=>setLinguaCor(linguaCor===c.v?"":c.v)}
                      style={{background:linguaCor===c.v?c.c+"33":"var(--bg2)",
                        border:"1px solid "+(linguaCor===c.v?c.c:"var(--bg3)"),
                        borderRadius:6,color:linguaCor===c.v?c.c:"var(--t2)",
                        padding:"4px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                      {c.l}
                    </button>
                  ))}
                </div>
              </div>
              {/* Saburra */}
              <div style={{marginBottom:8}}>
                <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:5}}>Saburra</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {SINT_SAB_L.map(c=>(
                    <button key={c.v} onClick={()=>setLinguaSaburra(linguaSaburra===c.v?"":c.v)}
                      style={{background:linguaSaburra===c.v?"#1a3a6e":"var(--bg2)",
                        border:"1px solid "+(linguaSaburra===c.v?"#3b82f6":"var(--bg3)"),
                        borderRadius:6,color:linguaSaburra===c.v?"#93c5fd":"var(--t2)",
                        padding:"4px 9px",fontSize:11,cursor:"pointer"}}>
                      {c.l}
                    </button>
                  ))}
                </div>
              </div>
              {/* Forma */}
              <div style={{marginBottom:10}}>
                <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:5}}>Forma/características (múltipla)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {SINT_FORMA_L.map(c=>(
                    <button key={c.v} onClick={()=>toggleArr2(linguaForma,setLinguaForma,c.v)}
                      style={{background:linguaForma.includes(c.v)?"#2a1f05":"var(--bg2)",
                        border:"1px solid "+(linguaForma.includes(c.v)?"#9e6a03":"var(--bg3)"),
                        borderRadius:6,color:linguaForma.includes(c.v)?"#d29922":"var(--t2)",
                        padding:"4px 9px",fontSize:11,cursor:"pointer"}}>
                      {c.l}
                    </button>
                  ))}
                </div>
              </div>
              {/* Pulso */}
              <div>
                <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:5}}>💓 Qualidades do pulso (múltipla)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {SINT_PULSO_L.map(p=>(
                    <button key={p.v} onClick={()=>toggleArr2(pulsoQual,setPulsoQual,p.v)}
                      style={{background:pulsoQual.includes(p.v)?"#3d0a0a":"var(--bg2)",
                        border:"1px solid "+(pulsoQual.includes(p.v)?"#da3633":"var(--bg3)"),
                        borderRadius:6,color:pulsoQual.includes(p.v)?"#ff7b72":"var(--t2)",
                        padding:"4px 9px",fontSize:11,cursor:"pointer"}}>
                      {p.l}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        {chips.length>0&&(
          <div style={{marginBottom:10,background:"#0d2d4f",border:"1px solid #1f6feb33",borderRadius:8,padding:"8px 10px"}}>
            <div style={{color:"#58a6ff",fontSize:11,fontWeight:700,marginBottom:6}}>✅ Selecionados ({chips.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {chips.map(s=>(
                <button key={s} onClick={()=>toggleChip(s)}
                  style={{background:"#1f6feb",border:"none",borderRadius:20,color:"#fff",
                    padding:"3px 10px",fontSize:11,cursor:"pointer"}}>
                  {s} ✕
                </button>
              ))}
            </div>
          </div>
        )}

        <div style={{marginBottom:12}}>
          <div style={{color:"var(--t3)",fontSize:11,fontWeight:700,marginBottom:6}}>🏷️ Selecionar por categoria</div>
          {SINTOMAS_CHIPS.map(grupo=>{
            const count=chips.filter(c=>grupo.s.includes(c)).length;
            const aberto=grupoAberto===grupo.g;
            return(
              <div key={grupo.g} style={{marginBottom:5}}>
                <button onClick={()=>setGrupoAberto(aberto?null:grupo.g)}
                  style={{width:"100%",background:"var(--bg2)",border:"1px solid var(--bg3)",
                    borderRadius:aberto?"7px 7px 0 0":7,color:"var(--t2)",padding:"7px 10px",fontSize:12,
                    textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{grupo.g}{count>0&&<span style={{background:"#1f6feb",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,marginLeft:6}}>{count}</span>}</span>
                  <span style={{opacity:0.5}}>{aberto?"▲":"▼"}</span>
                </button>
                {aberto&&(
                  <div style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderTop:"none",
                    borderRadius:"0 0 7px 7px",padding:"8px",display:"flex",flexWrap:"wrap",gap:5}}>
                    {grupo.s.map(s=>{
                      const sel=chips.includes(s);
                      return(
                        <button key={s} onClick={()=>toggleChip(s)}
                          style={{background:sel?"#1f6feb":"var(--bg2)",border:"1px solid "+(sel?"#1f6feb":"var(--bg3)"),
                            borderRadius:20,color:sel?"#fff":"var(--t2)",padding:"4px 10px",fontSize:11,cursor:"pointer"}}>
                          {s}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {erro&&<div style={{color:"#f85149",fontSize:12,marginBottom:8,padding:"8px 10px",
          background:"#3d0a0a",borderRadius:8,border:"1px solid #da363344"}}>{erro}</div>}

        {loading&&(
          <div style={{textAlign:"center",padding:"30px 0",color:"var(--t3)"}}>
            <div style={{fontSize:24,marginBottom:8}}>🔄</div>
            <div style={{fontSize:12}}>Analisando sintomas com IA...</div>
          </div>
        )}

        {resultado&&(
          <div>
            <div style={{color:"var(--t2)",fontSize:12,fontWeight:700,marginBottom:8}}>
              📊 {resultado.length} padrões identificados
            </div>
            {resultado.map((p,i)=>{
              const cor=natCor[p.natureza]||"#58a6ff";
              const bg=natBg[p.natureza]||"#0d2d4f";
              const bd=natBd[p.natureza]||"#1f6feb44";
              const exp=expandido===i;
              return(
                <div key={i} onClick={()=>setExpandido(exp?null:i)}
                  style={{background:bg,border:"1px solid "+bd,borderRadius:10,
                    padding:"10px 12px",marginBottom:8,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:exp?8:0}}>
                    <div style={{minWidth:44,height:44,borderRadius:"50%",background:cor+"22",
                      border:"2px solid "+cor,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{color:cor,fontWeight:700,fontSize:12}}>{p.compatibilidade}%</span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:"var(--t1)",fontWeight:700,fontSize:13,marginBottom:2}}>{p.nome}</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        <span style={{background:cor+"22",color:cor,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>{p.orgao}</span>
                        <span style={{background:cor+"22",color:cor,borderRadius:10,padding:"2px 8px",fontSize:10}}>{p.natureza}</span>
                      </div>
                    </div>
                    <span style={{color:"var(--t4)",fontSize:14}}>{exp?"▲":"▼"}</span>
                  </div>
                  {exp&&(
                    <div style={{display:"flex",flexDirection:"column",gap:7,marginTop:4}}>
                      {p.sintomas_match&&p.sintomas_match.length>0&&(
                        <div style={{background:"var(--bg2)",borderRadius:7,padding:"7px 10px"}}>
                          <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:4}}>✅ SINTOMAS CORRESPONDENTES</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                            {p.sintomas_match.map(s=>(
                              <span key={s} style={{background:cor+"22",color:cor,borderRadius:10,padding:"2px 8px",fontSize:10}}>{s}</span>
                            ))}
                          </div>
                        </div>
                      )}
                      <div style={{display:"flex",gap:6}}>
                        <div style={{flex:1,background:"var(--bg2)",borderRadius:7,padding:"7px 10px"}}>
                          <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>👅 LÍNGUA</div>
                          <div style={{color:"var(--t2)",fontSize:11}}>{p.lingua_esperada}</div>
                        </div>
                        <div style={{flex:1,background:"var(--bg2)",borderRadius:7,padding:"7px 10px"}}>
                          <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>🫀 PULSO</div>
                          <div style={{color:"var(--t2)",fontSize:11}}>{p.pulso_esperado}</div>
                        </div>
                      </div>
                      <div style={{background:"var(--bg2)",borderRadius:7,padding:"7px 10px"}}>
                        <div style={{color:"var(--t4)",fontSize:10,fontWeight:700,marginBottom:2}}>📍 PONTOS-BASE</div>
                        <PontosChips texto={p.pontos_principais} onChipClick={onChipClick}/>
                      </div>
                      <div style={{background:"#12082e",border:"1px solid #7c3aed22",borderRadius:7,padding:"7px 10px"}}>
                        <div style={{color:"#9d7eed",fontSize:10,fontWeight:700,marginBottom:2}}>🧠 RACIOCÍNIO CLÍNICO</div>
                        <div style={{color:"#c4b5fd",fontSize:11,lineHeight:1.5}}>{p.explicacao}</div>
                      </div>
                      <button onClick={e=>{e.stopPropagation();enviarChat(p);}}
                        style={{width:"100%",background:"var(--acc)",border:"none",borderRadius:8,
                          color:"#fff",padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                        🤖 Enviar para Chat — Elaborar Protocolo
                      </button>
                      {pacAtivo&&(
                        <BtnSalvarProntuario
                          titulo={`Sintomas → ${p.nome}`}
                          diagnostico={p.nome+" ("+p.orgao+" — "+p.natureza+") — "+p.compatibilidade+"%"}
                          pontos={p.pontos_principais}
                          sintomas={[...chips,texto].filter(Boolean).join(", ")}
                          lingua={linguaCor+(linguaSaburra?" / "+linguaSaburra:"")+(linguaForma.length?" / "+linguaForma.join(", "):"") }
                          pulso={pulsoQual.join(", ")}
                          fonte="AcuPonto — Sintomas"
                          onGoToPront={onGoToPront}
                        />
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {!resultado&&!loading&&(
          <div style={{background:"#12082e",border:"1px solid #7c3aed22",borderRadius:10,padding:"14px"}}>
            <div style={{color:"#9d7eed",fontSize:12,fontWeight:700,marginBottom:6}}>📖 Como usar</div>
            <div style={{color:"#c4b5fd",fontSize:11,lineHeight:1.7}}>
              {"1. Digite sintomas e/ou selecione pelos chips\n2. Toque em Analisar — a IA identifica os padrões MTC mais prováveis\n3. Toque no padrão para ver língua, pulso e pontos esperados\n4. Envie para o Chat para elaborar o protocolo completo"}
            </div>
          </div>

Analise a foto da língua fornecida e retorne APENAS um JSON válido (sem markdown, sem texto extra) no formato:
{
  "cor": "palida|normal|vermelha|vermelha_escarlate|roxa|azulada",
  "saburra": "branca_fina|branca_espessa|amarela_fina|amarela_espessa|gordurosa|sem_saburra|rachada",

}
Use apenas os valores exatos listados. O campo forma é array (pode ser vazio []).`;
      // Claude diretamente com imagem (funciona com API Anthropic e modelos de visão)

        ]}];
        result = await callClaude(msgs, system, null, MODELS.haiku.id);
      } else if(cfg.gKey){

        const key = cfg.gKey;
        const geminiVisionModels = ["gemini-2.5-flash","gemini-2.0-flash","gemini-2.0-flash-lite"];

          {text:"Analise esta foto de língua segundo os critérios de diagnóstico MTC."}
        ]}],generationConfig:{maxOutputTokens:1000}};
