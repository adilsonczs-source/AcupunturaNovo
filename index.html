    branca_espessa:["branca espessa","espessa branca"],amarela_fina:["amarela fina"],
    amarela_espessa:["amarela","amarela espessa"],gordurosa:["gordurosa","pegajosa","greasy"],
    sem_saburra:["sem saburra","ausente","pouca saburra"],rachada:["rachada","fissura","crack"],
  };
  const FORMA_MAP_L={
    marcas_dentes:["marcas de dentes","dentes"],inchada:["inchada","larga","swollen"],
    fina_pequena:["fina","pequena"],rigida:["rigida","stiff"],tremula:["tremula"],
    ponta_vermelha:["ponta"],bordas_vermelhas:["bordas"],
  };
  const PULSO_CONTRA={fraco:["forte","cheio"],forte:["fraco","vazio","fino"],rapido:["lento"],lento:["rapido"],profundo:["flutuante"],flutuante:["profundo"]};
  const COR_CONTRA={palida:["vermelha","escarlate","roxa"],vermelha:["palida"],vermelha_escarlate:["palida"],normal:["escarlate"]};

  function calcScore(padrao){
    let pts=0, max=0;
    const lng=norm(padrao.lingua), pls=norm(padrao.pulso), sint=norm(padrao.sintomas);

    if(linguaCor){ max+=4; const kws=COR_MAP_L[linguaCor]||[]; const hit=kws.some(k=>lng.includes(norm(k)));
      if(hit) pts+=4; else { const c=COR_CONTRA[linguaCor]||[]; if(c.some(k=>lng.includes(norm(k)))) pts-=2; } }
    if(linguaSaburra){ max+=3; const kws=SABURRA_MAP_L[linguaSaburra]||[]; if(kws.some(k=>lng.includes(norm(k)))) pts+=3; }
    if(linguaUmidade){ max+=1; const kws={seca:["seca"],umida:["umida"],normal:["normal"]}[linguaUmidade]||[];
      if(kws.some(k=>lng.includes(norm(k)))) pts+=1; }
    linguaForma.forEach(f=>{ max+=2; const kws=FORMA_MAP_L[f]||[]; if(kws.some(k=>lng.includes(norm(k)))) pts+=2; });
    pulsoQual.forEach(q=>{ max+=3; const kws=PULSO_MAP_L[q]||[]; const hit=kws.some(k=>pls.includes(norm(k)));
      if(hit) pts+=3; else { const c=PULSO_CONTRA[q]||[]; if(c.some(k=>pls.includes(norm(k)))) pts-=1; } });
    // Posições do pulso
    Object.entries(pulsoPos).forEach(([pos,val])=>{
      if(!val) return;
      const pn=norm(padrao.nome), po=norm(padrao.orgao);
      const POS_ORG={cun_esq:["coração","pc","pericardio"],guan_esq:["fígado","figado","vesícula","vesicula"],
        chi_esq:["rim","bexiga"],cun_dir:["pulmão","pulmao","cólon","colon"],
        guan_dir:["baço","baco","estômago","estomago"],chi_dir:["rim","intestino"]};
      const orgs=POS_ORG[pos]||[];
      if(orgs.some(o=>po.includes(norm(o)))){ max+=2; if(norm(val).includes("fraco")||norm(val).includes("vazio")){
        if(padrao.tipo==="def") pts+=2; } else if(norm(val).includes("forte")||norm(val).includes("cheio")){
        if(padrao.tipo==="exc") pts+=2; } }
    });
    if(sintomas.trim()){ const words=norm(sintomas).split(/[\s,;]+/).filter(w=>w.length>3);
      words.forEach(w=>{ max+=1; if(sint.includes(w)||norm(padrao.nome).includes(w)) pts+=1; }); }
    if(queixa.trim()){ const words=norm(queixa).split(/[\s,;]+/).filter(w=>w.length>2);
      words.forEach(w=>{ max+=0.5; if(sint.includes(w)||norm(padrao.nome).includes(w)||norm(padrao.orgao).includes(w)) pts+=0.5; }); }
    if(max===0) return 0;
    return Math.max(0, Math.min(100, Math.round((pts/max)*100)));
  }

  function executarDiagnostico(){
    const hasDados = linguaCor||linguaSaburra||pulsoQual.length||sintomas.trim()||queixa.trim();
    if(!hasDados) return;
    const scored = PADROES_TCM
      .map(p=>({...p, score:calcScore(p)}))
      .filter(p=>p.score>0)
      .sort((a,b)=>b.score-a.score)
      .slice(0,12);
    setResultado(scored);
    setPadraoSel(null); setPrescricao(null);
    setEtapa(3);
  }

  function gerarPrescricaoLocal(padrao){

    const freq = padrao.tipo==="def" ? "2× por semana" : "3× por semana (fase aguda)";
    const ciclo = padrao.tipo==="def" ? "15–20 sessões" : "8–12 sessões";
    return { tec, exList, tungList, freq, ciclo };
  }

Língua: ${padrao.lingua} | Pulso: ${padrao.pulso}
Pontos-base: ${padrao.pontos}
EX sugeridos: ${exStr}
Sugestões Tung: ${tungStr}
Técnica geral: ${local.tec.geral} | Retenção: ${local.tec.retencao}
Queixa principal do paciente: ${queixa||"não informada"}
Sintomas: ${sintomas||"não informados"}

Elabore uma PRESCRIÇÃO CLÍNICA COMPLETA com:
1. Lista de pontos (com lateralidade, profundidade e técnica ponto a ponto)
2. Moxa detalhada se indicada

6. Orientações ao paciente (dieta, estilo de vida, qi gong se aplicável)
Seja direto e prático — linguagem de prontuário clínico.`;

    },
    guan_esq:{
      orgao:"Fígado / Vesícula Biliar",lado:"Esquerdo — dedo médio",
      fraco:"Def. Sangue ou Yin do Fígado → olhos secos, câimbras, menstruo escasso",
      forte:"Excesso do Fígado → irritabilidade, cefaleia temporal, olhos vermelhos",

    },
    chi_esq:{
      orgao:"Rim / Bexiga",lado:"Esquerdo — dedo anelar",
      fraco:"Def. Yang do Rim → lombar, frio, urina clara, cansaço",
      forte:"Calor na Bexiga → disúria, urina amarela escura",
      fino:"Def. Yin do Rim → lombar, calor à tarde, suor noturno",
      corda:"Estagnação no Jiao Inferior → dor hipogástrica",
      escorregadio:"Umidade no Jiao Inferior → leucorreia, edema pélvico",
      ausente:"Def. grave do Rim — alarme clínico",
    },
    cun_dir:{
      orgao:"Pulmão / Intestino Grosso",lado:"Direito — dedo indicador",
      fraco:"Def. Qi do Pulmão → cansaço ao falar, voz baixa, resfriados frequentes",
      forte:"Calor ou Excesso no Pulmão → febre, tosse seca, sede",
      fino:"Def. Yin do Pulmão → tosse seca, voz rouca, calor à tarde",
      corda:"Invasão de Vento-Frio no Pulmão → tosse com catarro, febre/frio",
      escorregadio:"Fleuma no Pulmão → catarro abundante, chiado",
      ausente:"Def. grave do Pulmão",
    },
    guan_dir:{
      orgao:"Baço / Estômago",lado:"Direito — dedo médio",
      fraco:"Def. Qi ou Yang do Baço → digestão lenta, fezes moles, marcas de dentes",
      forte:"Calor no Estômago → fome excessiva, gengivas, hálito",
      fino:"Def. Sangue do Baço → cansaço, distensão, palidez",
      corda:"Estagnação/Invasão do Baço pelo Fígado → gases, dor ao estresse",
      escorregadio:"Fleuma-Umidade no Baço → náusea, sensação de peso, catarro",
      ausente:"Def. grave do Baço/Estômago",
    },
    chi_dir:{
      orgao:"Rim / Intestino Delgado",lado:"Direito — dedo anelar",
      fraco:"Def. Yang do Rim (lado direito reforça) → lombar, frio extremidades",
      forte:"Calor no ID → diarreia com ardência, urina escura",
      fino:"Def. Yin do Rim (chi bilateral fino = Def. Yin grave)",
      corda:"Dor no ID ou estagnação no Jiao Inferior",
      escorregadio:"Umidade-Calor no ID → fezes pastosas com odor, distensão",
      ausente:"Def. Yang grave do Rim",
    },
  };

  // Dados para lógica reversa (sensação → órgão/qualidade)
  const PULSO_SENSACOES=[
    {v:"fraco_geral",l:"💨 Fraco / quase não sinto",
     desc:"Pulso difícil de encontrar, sem força",
     interpreta:"Deficiência de Qi, Yang ou Sangue. Quanto mais fraco, mais grave a deficiência.",
     sugestoes:[{pos:"cun_esq",qual:"fraco"},{pos:"guan_dir",qual:"fraco"},{pos:"chi_esq",qual:"fraco"}],
     qualGeral:"fraco"},
    {v:"forte_tenso",l:"🔴 Forte / tenso / com resistência",
     desc:"Pulso empurra os dedos, difícil de comprimir",
     interpreta:"Excesso, Estagnação ou Calor. Em corda = Fígado. Forte = Calor ou Excesso.",
     sugestoes:[{pos:"guan_esq",qual:"corda"},{pos:"guan_dir",qual:"forte"}],
     qualGeral:"corda"},
    {v:"muito_rapido",l:"⚡ Acelerado / batendo rápido",
     desc:"Mais de 5 batimentos por respiração",
     interpreta:"Calor — interno ou externo. Quanto mais rápido + fino, mais grave o Calor.",
     sugestoes:[{pos:"cun_esq",qual:"forte"},{pos:"guan_esq",qual:"forte"}],
     qualGeral:"rapido"},
    {v:"lento_pesado",l:"🐢 Lento / pesado / profundo",
     desc:"Menos de 4 batimentos por respiração, só perceptível com pressão",
     interpreta:"Frio ou Def. Yang. Profundo = interior. Lento = Frio ou Def. Yang.",
     sugestoes:[{pos:"chi_esq",qual:"fraco"},{pos:"guan_dir",qual:"fraco"},{pos:"chi_dir",qual:"fraco"}],
     qualGeral:"lento"},
    {v:"escorregadio_rolante",l:"🫧 Escorregadio / rolante / perolas",
     desc:"Sensação de esferas rolando sob os dedos",
     interpreta:"Fleuma ou Umidade. Comum em gestantes e quadros de catarro/obesidade.",
     sugestoes:[{pos:"guan_dir",qual:"escorregadio"},{pos:"cun_dir",qual:"escorregadio"}],
     qualGeral:"escorregadio"},
    {v:"fino_fio",l:"🪡 Fino como fio / difícil achar",
     desc:"Presente mas muito estreito, quase imperceptível",
     interpreta:"Def. de Sangue ou Yin. Fino + rápido = Def. Yin grave.",
     sugestoes:[{pos:"guan_esq",qual:"fino"},{pos:"chi_esq",qual:"fino"},{pos:"cun_esq",qual:"fino"}],
     qualGeral:"fino"},
    {v:"irregular_pausas",l:"💔 Irregular / com pausas",
     desc:"Ritmo irregular, às vezes para ou muda força",
     interpreta:"Estase de Sangue, Def. do Coração ou emoções acumuladas.",
     sugestoes:[{pos:"cun_esq",qual:"fraco"}],
     qualGeral:"irregular"},
  ];

  function aplicarSensacao(sensacao){
    // Aplica qualidade geral
    if(sensacao.qualGeral && !pulsoQual.includes(sensacao.qualGeral)){
      setPulsoQual(prev=>[...prev, sensacao.qualGeral]);
    }
    // Aplica sugestões de posição
    const novasPos={...pulsoPos};
    sensacao.sugestoes.forEach(s=>{ if(!novasPos[s.pos]) novasPos[s.pos]=s.qual; });
    setPulsoPos(novasPos);
    setPulsoSensacaoDedo(sensacao.v);
    setPulsoModoReverso(false);
  }

  // Melhoria 3: sugestão automática do pulso geral para posições
  function sugerirPosicoesAutomaticas(){
    const novas={...pulsoPos};
    let aplicou=false;
    const SUGESTAO_AUTO={
      corda:{guan_esq:"corda"},
      fraco:{cun_esq:"fraco",guan_dir:"fraco",chi_esq:"fraco"},
      fino:{guan_esq:"fino",chi_esq:"fino"},
      escorregadio:{guan_dir:"escorregadio",cun_dir:"escorregadio"},
      rapido:{cun_esq:"forte",guan_esq:"forte"},
      lento:{chi_esq:"fraco",guan_dir:"fraco"},
      flutuante:{cun_dir:"forte"},
      rugoso:{guan_esq:"corda"},
    };
    pulsoQual.forEach(q=>{
      const sug=SUGESTAO_AUTO[q]||{};
      Object.entries(sug).forEach(([pos,val])=>{ if(!novas[pos]){novas[pos]=val;aplicou=true;} });
    });
    if(aplicou) setPulsoPos(novas);
    return aplicou;
  }

  function EtapaPulso(){
    const [sugestaoAplicada, setSugestaoAplicada] = useState(false);

    function handleSugerir(){
      const ok=sugerirPosicoesAutomaticas();
      setSugestaoAplicada(ok);
      setTimeout(()=>setSugestaoAplicada(false),2500);
    }

    return(
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>

        {pulsoModoReverso ? (

                  <button key={s.v} onClick={()=>aplicarSensacao(s)}
                    style={{background:sel?"#7c3aed22":"var(--bg2)",
                      border:"1px solid "+(sel?"#7c3aed":"var(--bg3)"),
                      borderRadius:8,padding:"8px 10px",cursor:"pointer",textAlign:"left"}}>
                    <div style={{color:sel?"#c4b5fd":"var(--t1)",fontSize:12,fontWeight:700,marginBottom:2}}>

                    </div>

                    <div style={{color:sel?"#a78bfa":"var(--t4)",fontSize:9,fontStyle:"italic"}}>{s.interpreta}</div>

          </div>
        ) : (

            {/* ── Qualidade geral ── */}
            <div style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",marginBottom:8,gap:6}}>
                <span style={{color:"var(--t2)",fontSize:12,fontWeight:700}}>
                  Qualidade geral do pulso
                </span>
                <span style={{fontSize:9,fontWeight:400,color:"var(--t4)"}}>(múltipla)</span>
                {/* Botão lógica reversa */}
                <button onClick={()=>setPulsoModoReverso(true)}
                  style={{marginLeft:"auto",background:"#7c3aed22",border:"1px solid #7c3aed",
                    borderRadius:6,color:"#c4b5fd",padding:"2px 8px",fontSize:9,fontWeight:700,cursor:"pointer"}}>
                  🔍 O que sinto?
                </button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {PULSO_DEF.map(p=>{const on=pulsoQual.includes(p.v);return(
                  <button key={p.v} onClick={()=>toggleArr(pulsoQual,setPulsoQual,p.v)}
                    style={{background:on?"#1f6feb22":"var(--bg2)",
                      border:"1px solid "+(on?"#1f6feb":"var(--bg3)"),
                      borderRadius:6,color:on?"#58a6ff":"var(--t2)",
                      padding:"5px 10px",fontSize:11,fontWeight:on?700:400,cursor:"pointer"}}>
                    {on?"● ":""}{p.l} <span style={{fontSize:9,opacity:0.6}}>— {p.desc}</span>
                  </button>
                );})}
              </div>

              {/* ── MELHORIA 3: Sugestão automática ── */}
              {pulsoQual.length>0&&(
                <div style={{marginTop:8,paddingTop:7,borderTop:"1px solid var(--bg2)",display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={handleSugerir}
                    style={{background:"#238636",border:"none",borderRadius:6,color:"#fff",
                      padding:"4px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                    ✨ Sugerir posições
                  </button>
                  <span style={{fontSize:9,color:sugestaoAplicada?"#3fb950":"var(--t4)"}}>
                    {sugestaoAplicada?"✓ Posições sugeridas aplicadas!":"Preenche as posições prováveis automaticamente"}
                  </span>
                </div>
              )}
            </div>

            {/* ── Posições individuais ── */}
            <div style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
              <div style={{color:"var(--t2)",fontSize:12,fontWeight:700,marginBottom:6}}>

              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {PULSO_POSICOES.map(p=>{
                  const guiaAberto=pulsoGuiaPos===p.key;
                  const guia=PULSO_GUIA[p.key]||{};
                  const valAtual=pulsoPos[p.key]||"";
                  return(
                    <div key={p.key} style={{background:"var(--bg2)",borderRadius:8,padding:"7px 9px"}}>

                      <div style={{display:"flex",alignItems:"center",marginBottom:4,gap:4}}>
                        <span style={{color:"var(--t3)",fontSize:10,fontWeight:700}}>{p.label}</span>

                        {/* ── MELHORIA 1: botão guia ── */}
                        <button onClick={()=>setPulsoGuiaPos(guiaAberto?null:p.key)}

                            border:guiaAberto?"1px solid #1f6feb":"1px solid var(--bg3)",

                                {k==="fraco"?"Fraco/Vazio":k==="forte"?"Forte/Cheio":k==="fino"?"Fino":
                                 k==="corda"?"Em corda":k==="escorregadio"?"Escorregadio":"Ausente"}:

                      <select value={valAtual} onChange={e=>setPulsoPos(prev=>({...prev,[p.key]:e.target.value}))}

            Próximo: Sintomas →
          </button>
        </div>
      </div>
    );
  }

  // ─── ETAPA 2: SINTOMAS ──────────────────────────────────────────────────
  function EtapaSintomas(){

      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        {/* Queixa resumida (read-only) */}
        {queixa.trim()&&(

  }

  // ─── ETAPA 3: RESULTADO + PRESCRIÇÃO ───────────────────────────────────

        </div>

        {/* Top 3 em destaque */}
        {top3.map((p,i)=>{
          const isSel = padraoSel?.nome===p.nome;

            <div key={i} onClick={()=>{setPadraoSel(isSel?null:p);setPrescricao(null);}}

  function SegundaOpiniaoTab(){
    const [diagInput, setDiagInput] = useState("");
    const [soQueixa, setSoQueixa] = useState("");
    const [soResult, setSoResult] = useState(null);
    const [soLoading, setSoLoading] = useState(false);

    // Busca local nos padrões pelo nome digitado
    function buscarPadraoLocal(texto){
      const n = (t)=>t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      const q = n(texto);
      const words = q.split(/[\s,+]+/).filter(w=>w.length>2);
      return PADROES_TCM
        .map(p=>{
          const pn = n(p.nome)+" "+n(p.orgao)+" "+n(p.sintomas);
          const score = words.reduce((s,w)=>s+(pn.includes(w)?1:0),0);
          return {...p, score};
        })
        .filter(p=>p.score>0)
        .sort((a,b)=>b.score-a.score)
        .slice(0,5);
    }

    function gerarLocal(){
      if(!diagInput.trim()) return;
      const encontrados = buscarPadraoLocal(diagInput);
      if(encontrados.length>0){
        setSoResult({tipo:"local", padroes: encontrados});
      } else {
        setSoResult({tipo:"nenhum"});
      }
    }

    async function gerarIA(){
      if(!diagInput.trim()) return;
      if(!cfg.hasKey()){ alert("Configure uma chave de API (🔑) primeiro."); return; }
      setSoLoading(true); setSoResult(null);
      const txt = `Diagnóstico MTC já estabelecido: "${diagInput}"
${soQueixa.trim()?`Queixa principal do paciente: ${soQueixa}`:""}

Gere um PROTOCOLO CLÍNICO COMPLETO para este padrão:
1. Pontos-base principais (com meridiano, número e técnica de inserção)
2. Pontos de reforço
3. Técnica: tonificação / dispersão / neutro
4. Moxa: indicada / contraindicada / obrigatória (com justificativa)
5. Eletroestimulação se pertinente (frequência e pares)
6. Frequência de sessões e número de ciclos
7. Um ponto Tung complementar se pertinente
8. Alerta: contra-indicações e cuidados de segurança
9. Orientação ao paciente (estilo de vida, dieta, qi gong se aplicável)
Seja direto — formato de prontuário clínico.`;
      onSendToChat(txt);
      setSoLoading(false);
    }

    const SUGESTOES_RAPIDAS = [
      "Deficiência de Yin do Rim","Deficiência de Yang do Rim",
      "Estagnação de Qi do Fígado","Umidade-Calor no Baço-Estômago",

          padding:"10px 12px",marginBottom:12}}>
          <div style={{color:"#c4b5fd",fontSize:12,fontWeight:700,marginBottom:4}}>
            💬 Segunda Opinião — Diagnóstico já conhecido
          </div>
          <div style={{color:"var(--t3)",fontSize:10,lineHeight:1.5}}>
            Você já chegou ao diagnóstico MTC. Digite abaixo e receba o protocolo de pontos, técnica e dosimetria instantaneamente.
          </div>
        </div>

        {/* Campo principal */}
        <div style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:10,
          padding:"10px 12px",marginBottom:10}}>
          <div style={{color:"var(--t2)",fontSize:12,fontWeight:700,marginBottom:7}}>
            Diagnóstico MTC
          </div>
          <textarea value={diagInput} onChange={e=>setDiagInput(e.target.value)} rows={3}
            placeholder='Ex: "Deficiência de Yang do Rim + Estagnação de Qi do Fígado"'
            style={{width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:8,
              padding:"9px 10px",fontSize:12,color:"var(--t1)",outline:"none",
              resize:"none",boxSizing:"border-box",lineHeight:1.5}}/>
        </div>

        {/* Queixa opcional */}

          padding:"10px 12px",marginBottom:10}}>

            Queixa do paciente <span style={{fontSize:9,fontWeight:400,color:"var(--t4)"}}>(opcional — enriquece a IA)</span>
          </div>
          <input value={soQueixa} onChange={e=>setSoQueixa(e.target.value)}

                    disabled={!cfg.hasKey()}
                    style={{width:"100%",background:cfg.hasKey()?"#12082e":"var(--bg3)",
                      border:"1px solid "+(cfg.hasKey()?"#7c3aed":"var(--bg3)"),
                      borderRadius:8,color:cfg.hasKey()?"#c4b5fd":"var(--t4)",
                      padding:"8px",fontSize:11,fontWeight:700,cursor:cfg.hasKey()?"pointer":"default"}}>
                    🤖 Refinar com IA →
                  </button>

              );

          </div>
        )}
        {soResult?.tipo==="nenhum"&&(
          <div style={{background:"#1a0808",border:"1px solid #da3633",borderRadius:10,
            padding:"12px",textAlign:"center"}}>
            <div style={{color:"#f87171",fontSize:12,fontWeight:700,marginBottom:4}}>
              Padrão não encontrado na base local
            </div>

  return(

const SYS_LINGUA = `Você é um especialista em Medicina Tradicional Chinesa (MTC) com foco em diagnóstico pela língua (舌診 shé zhěn). Analise a imagem da língua fornecida e produza um laudo clínico completo em português, estruturado em Markdown.

IMPORTANTE: Este é um apoio clínico — sempre oriente o praticante a confirmar com exame presencial.

Estruture OBRIGATORIAMENTE assim:

## 👅 Laudo — Diagnóstico pela Língua

### 🔬 Achados Objetivos
Descreva o que vê na imagem (cor do corpo, saburra, umidade, forma, bordas, marcas de dentes, rachaduras, manchas, vasos sublinguais se visíveis).

| Parâmetro | Achado | Significado TCM |

| Cor do corpo | (ex: pálida/vermelha/roxa/azulada) | (ex: Deficiência de Sangue / Calor...) |
| Saburra | (ex: fina branca/amarela espessa/ausente) | (ex: Vento-Frio / Calor-Umidade...) |
| Umidade | (ex: seca/úmida/pegajosa) | (ex: Deficiência de Yin / Umidade...) |
| Forma | (ex: inchada/fina/tremida) | (ex: Deficiência de Qi de Baço / Vento...) |
| Marcas de dentes | (sim/não) | (ex: Deficiência de Qi de Baço, Umidade) |
| Rachaduras | (localização e padrão) | (ex: Deficiência de Yin do Rim/Coração) |
| Bordas | (ex: vermelhas/normais/manchas) | (ex: Estagnação do Qi do Fígado / Calor) |

### 🩺 Padrões Prováveis
Liste em ordem de probabilidade (1º mais provável):

3. *(se aplicável)* **[Nome do Padrão]**

### 🪡 Pontos Sugeridos

### ⚠️ Limitações da Análise

function LinguaFotoTab({ onSendToChat, onChipClick, onGoToPront }) {
  const [pacAtivo] = usePacAtivo();
  const [imgSrc, setImgSrc] = useState(null);       // base64 da foto
  const [imgFile, setImgFile] = useState(null);      // file object
  const [result, setResult] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [camMode, setCamMode] = useState(false);     // usar câmera
  const fileRef = useRef(null);
  const camRef = useRef(null);
  const streamRef = useRef(null);
  const resultRef = useRef(null);

  useEffect(() => {
    if (result && resultRef.current) {
      resultRef.current.scrollIntoView({ behavior: "smooth" });
    }
  }, [result]);

  // Para a câmera ao sair
  useEffect(() => {
    return () => stopCam();
  }, []);

  function stopCam() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setCamMode(false);
  }

  async function startCam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      streamRef.current = stream;
      setCamMode(true);
      setTimeout(() => {
        if (camRef.current) camRef.current.srcObject = stream;
      }, 100);
    } catch(e) {
      setErr("Câmera não disponível: " + e.message);
    }
  }

  function captureFromCam() {
    if (!camRef.current) return;
    const canvas = document.createElement("canvas");
    canvas.width = camRef.current.videoWidth;
    canvas.height = camRef.current.videoHeight;
    canvas.getContext("2d").drawImage(camRef.current, 0, 0);
    const b64 = canvas.toDataURL("image/jpeg", 0.9);
    setImgSrc(b64);
    stopCam();
    setResult(""); setErr("");
  }

  function handleFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImgFile(file);
    const reader = new FileReader();
    reader.onload = ev => {
      setImgSrc(ev.target.result);
      setResult(""); setErr("");
    };
    reader.readAsDataURL(file);
  }

  async function analisar() {
    if (!imgSrc) return;
    if (!cfg.hasKey()) { setErr("Configure uma chave de API (🔑) primeiro."); return; }
    setErr(""); setResult(""); setBusy(true);

    try {
      const b64 = imgSrc.includes(",") ? imgSrc.split(",")[1] : imgSrc;
      const mtype = imgSrc.startsWith("data:image/png") ? "image/png" : "image/jpeg";

      // Monta mensagem multimodal
      const messages = [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mtype, data: b64 } },
          { type: "text", text: "Analise esta imagem da língua do paciente e gere o laudo TCM completo conforme as instruções." }
        ]
      }];

      // Prefere Anthropic Claude para visão; fallback para Gemini
      const m = getModel();
      let finalResult = "";
      const onChunk = p => { finalResult = p; setResult(p); };

      if (cfg.aKey) {
        // Claude direto — suporta imagem nativamente
        const modelId = m.provider === "claude" ? m.id : MODELS.haiku.id;
        await callClaude(messages, SYS_LINGUA, onChunk, modelId);
      } else if (cfg.gKey) {
        // Gemini direto — monta payload nativo com imagem
        const key = cfg.gKey;
        const geminiModels = ["gemini-2.5-flash","gemini-2.0-flash","gemini-2.0-flash-lite"];
        const gBody = {
          system_instruction: { parts: [{ text: SYS_LINGUA }] },
          contents: [{ role: "user", parts: [
            { inline_data: { mime_type: mtype, data: b64 } },
            { text: "Analise esta imagem da língua do paciente e gere o laudo TCM completo conforme as instruções." }
          ]}],
          generationConfig: { maxOutputTokens: 8000 }
        };
        let gErr = null;
        for (const mid of geminiModels) {
          try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${mid}:generateContent?key=${key}`,
              { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(gBody) });
            if (!r.ok) { const et = await r.text(); gErr = new Error("Gemini "+r.status+": "+et.slice(0,120)); continue; }
            const d = await r.json();
            finalResult = d.candidates?.[0]?.content?.parts?.[0]?.text || "";
            if (finalResult) { setResult(finalResult); break; }
          } catch(e) { gErr = e; }
        }
        if (!finalResult && gErr) throw gErr;
      } else {
        throw new Error("NO_KEY");
      }
      setResult(finalResult);
    } catch(e) {
      setErr(e.message === "NO_KEY"
        ? "⚠️ Configure uma chave API no botão 🔑"
        : "❌ " + e.message);
    }
    setBusy(false);
  }

  function sendToChat() {
    if (!result) return;
    onSendToChat("Baseado neste diagnóstico pela língua, quero aprofundar:\n\n" + result);
  }

  const hasImg = !!imgSrc;

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, minHeight:0, overflow:"hidden" }}>

      <PacAtivoBanner onGoToPront={onGoToPront}/>

      {/* Header */}
      <div style={{ padding:"8px 12px", background:"var(--bg1)", borderBottom:"1px solid var(--bg2)", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
          <span style={{ background:"#0d2d4f", border:"1px solid #58a6ff", color:"#58a6ff",
            borderRadius:6, padding:"3px 10px", fontSize:12, fontWeight:700 }}>📸 Análise de Língua</span>
          <span style={{ color:"var(--t3)", fontSize:11 }}>IA · Diagnóstico TCM por Foto</span>
        </div>

        {/* Botões de entrada */}
        {!camMode && (
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <button onClick={() => fileRef.current?.click()}
              style={{ background:"var(--bg2)", border:"1px solid var(--bg3)", borderRadius:8,
                color:"var(--t2)", padding:"7px 12px", fontSize:12, fontWeight:700, cursor:"pointer",
                display:"flex", alignItems:"center", gap:5 }}>
              🖼️ Carregar Foto
            </button>
            <button onClick={startCam}
              style={{ background:"#0d2d4f", border:"1px solid #1f6feb", borderRadius:8,
                color:"#58a6ff", padding:"7px 12px", fontSize:12, fontWeight:700, cursor:"pointer",
                display:"flex", alignItems:"center", gap:5 }}>
              📷 Usar Câmera
            </button>
            {hasImg && (
              <button onClick={analisar} disabled={busy}
                style={{ background:busy?"var(--bg3)":"#1f6feb", border:"none", borderRadius:8,
                  color:busy?"var(--t4)":"#fff", padding:"7px 16px", fontSize:12, fontWeight:700,
                  cursor:busy?"default":"pointer", marginLeft:"auto",
                  display:"flex", alignItems:"center", gap:5 }}>
                {busy ? "⏳ Analisando..." : "🔍 Analisar"}
              </button>
            )}
          </div>
        )}
        <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleFileChange}/>
      </div>

      {/* Corpo */}
      <div style={{ flex:1, overflowY:"auto", padding:"10px 12px", display:"flex", flexDirection:"column", gap:10 }}>

        {/* CÂMERA AO VIVO */}
        {camMode && (
          <div style={{ background:"var(--bg1)", border:"1px solid var(--bg3)", borderRadius:12,
            overflow:"hidden", position:"relative" }}>
            <video ref={camRef} autoPlay playsInline muted
              style={{ width:"100%", display:"block", maxHeight:320, objectFit:"cover", background:"#000" }}/>
            <div style={{ position:"absolute", bottom:12, left:0, right:0,
              display:"flex", justifyContent:"center", gap:10 }}>
              <button onClick={captureFromCam}
                style={{ background:"#fff", border:"3px solid #58a6ff", borderRadius:"50%",
                  width:60, height:60, fontSize:24, cursor:"pointer", boxShadow:"0 2px 12px #0008",
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                📸
              </button>
              <button onClick={stopCam}
                style={{ background:"#da3633", border:"none", borderRadius:8, color:"#fff",
                  padding:"10px 16px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {/* GUIA DE COMO FOTOGRAFAR */}
        {!hasImg && !camMode && (
          <div style={{ background:"var(--bg1)", border:"1px solid var(--bg2)", borderRadius:12, padding:"14px" }}>
            <div style={{ color:"var(--t2)", fontSize:13, fontWeight:700, marginBottom:10 }}>
              📋 Como obter uma boa foto da língua
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[
                ["💡","Iluminação","Use luz natural ou boa iluminação artificial branca. Evite luz amarela."],
                ["👄","Posição","Paciente com boca aberta, língua projetada para frente sem forçar."],
                ["📐","Ângulo","Foto de frente, ligeiramente de cima. Capture corpo, bordas e saburra."],
                ["🚫","Evitar","Não fotografar após café, chá colorido ou alimentos que mancham a língua."],
                ["⏰","Horário","Preferencialmente pela manhã, antes do café."],
              ].map(([icon, tit, txt]) => (
                <div key={tit} style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                  <span style={{ fontSize:16, flexShrink:0 }}>{icon}</span>
                  <div>
                    <span style={{ color:"var(--t1)", fontWeight:700, fontSize:12 }}>{tit}: </span>
                    <span style={{ color:"var(--t3)", fontSize:12 }}>{txt}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PREVIEW DA FOTO */}
        {hasImg && !camMode && (
          <div style={{ position:"relative", borderRadius:12, overflow:"hidden",
            border:"2px solid #1f6feb", background:"#000" }}>
            <img src={imgSrc} alt="Língua" style={{ width:"100%", display:"block",
              maxHeight:280, objectFit:"contain" }}/>
            <button onClick={() => { setImgSrc(null); setResult(""); setErr(""); }}
              style={{ position:"absolute", top:8, right:8, background:"rgba(0,0,0,0.7)",
                border:"none", borderRadius:6, color:"#fff", padding:"4px 8px",
                fontSize:12, cursor:"pointer" }}>
              ✕ Remover
            </button>
          </div>
        )}

        {/* ERRO */}
        {err && (
          <div style={{ background:"#1a0808", border:"1px solid #da3633", borderRadius:10,
            padding:"10px 12px", color:"#f87171", fontSize:12 }}>
            {err}
          </div>
        )}

        {/* LOADING */}
        {busy && !result && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8,
            padding:20, color:"var(--t3)", fontSize:13 }}>
            <div className="spin" style={{ fontSize:28 }}>⚙️</div>
            <div>Analisando língua com IA...</div>
            <div style={{ fontSize:11, color:"var(--t4)" }}>Isso pode levar alguns segundos</div>
          </div>
        )}

        {/* RESULTADO */}
        {result && (
          <div ref={resultRef}>
            {/* Badge do diagnóstico */}
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <span style={{ background:"#0d2d4f", border:"1px solid #58a6ff", color:"#58a6ff",
                borderRadius:6, padding:"3px 10px", fontSize:11, fontWeight:700 }}>
                ✓ Laudo gerado
              </span>
              {!busy && (
                <>
                  <button onClick={sendToChat}
                    style={{ background:"var(--bg2)", border:"1px solid var(--bg3)", borderRadius:6,
                      color:"var(--t2)", padding:"3px 9px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                    🤖 Aprofundar no Chat
                  </button>
                  <button onClick={() => { setImgSrc(null); setResult(""); setErr(""); }}
                    style={{ marginLeft:"auto", background:"transparent", border:"none",
                      color:"var(--t4)", fontSize:11, cursor:"pointer" }}>
                    Nova análise
                  </button>
                </>
              )}
            </div>

            {/* Conteúdo do laudo */}
            <div style={{ background:"var(--bg1)", border:"1px solid var(--bg2)",
              borderRadius:12, padding:"12px" }}>
              <Md text={result} onChipClick={onChipClick}/>
            </div>

            {/* Salvar como favorito */}
            {!busy && (
              <div style={{ marginTop:8, display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                <FavButton content={result} type="lingua"
                  title={"Língua: " + result.slice(0,60).replace(/[#*|]/g,"").trim()}
                  onSaved={() => {}}/>
                <PdfProntButtons
                  titulo={"Análise de Língua"}
                  subtitulo={new Date().toLocaleDateString("pt-BR")}
                  conteudo={result} tipo="lingua" compact={false}/>
              </div>
            )}

            {/* Salvar no Prontuário do Paciente Ativo */}
            {!busy && (
              <div style={{marginTop:8}}>
                <BtnSalvarProntuario
                  diagnostico={result}
                  fonte="Foto Língua"
                  onGoToPront={onGoToPront}
                />
              </div>
            )}

            {/* Aviso clínico */}
            <div style={{ marginTop:8, background:"#1a1500", border:"1px solid #6b4a00",
              borderRadius:8, padding:"8px 11px", fontSize:11, color:"#d4a843",
              display:"flex", gap:7, alignItems:"flex-start" }}>
              <span style={{ fontSize:14, flexShrink:0 }}>⚠️</span>
              <span>Este laudo é um auxílio clínico gerado por IA. Confirme sempre com exame presencial e demais métodos diagnósticos TCM (pulso, anamnese).</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

      subTabs:[{id:"agulha",label:"Agulhamento",emoji:"🪡"},{id:"ea",label:"Eletro",emoji:"⚡"}] },
    { id:"paciente_group",emoji:"🩺", label:"Paciente", cor:"#58a6ff",
      subTabs:[{id:"pront",label:"Prontuário",emoji:"📋"},{id:"dq",label:"Anamnese",emoji:"十"},{id:"constit",label:"Constituição",emoji:"🧬"},{id:"clinica",label:"Língua/Pulso",emoji:"👅"},{id:"linguafoto",label:"Foto Língua",emoji:"📸"},{id:"sint",label:"Sintomas",emoji:"🔎"}] },
    { id:"protocolo_group",emoji:"💊",label:"Protocolo",cor:"#3fb950",
      subTabs:[{id:"diag",label:"Diagnose",emoji:"🔍"},{id:"dxoc",label:"Dx Ocidental",emoji:"🏥"},{id:"proto",label:"Protocolos",emoji:"💊"}] },
    { id:"tools_group",  emoji:"🤖", label:"Ferramentas",cor:"#9d7eed",
      subTabs:[{id:"chat",label:"Chat IA",emoji:"🤖"},{id:"favs",label:"Salvos",emoji:"★"},{id:"guia",label:"Guia",emoji:"🗺️"}] },
  ];

  // Qual grupo está ativo baseado na aba atual
  const activeGroup = NAV_GROUPS.find(g=>g.subTabs.some(s=>s.id===tab)) || NAV_GROUPS[0];

  // Ao mudar de aba externamente, fechar submenu
  useEffect(()=>{ setOpenGroup(null); },[tab]);

  const chipClick=(sig,num)=>{
    const ns=normSig(sig);
    const mer=MERIDIANOS.find(m=>m.sigla===ns||m.id===ns||m.sigla===sig||m.id===sig);
    if(mer){ setCurrentMer(mer); setCurrentPt(sig+"-"+num); }
    setPointModal({sig, num, ns});
  };

  // Cor da aba ativa
  function tabColor(id){
    const g=NAV_GROUPS.find(gr=>gr.subTabs.some(s=>s.id===id));
    return g?g.cor:"var(--acc)";
  }

  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,position:"relative"}}>
      {/* ── TOP BAR (mais compacta, apenas título + controles) ── */}
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",
        background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <span style={{fontSize:16}}>☯️</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:"var(--t1)",fontWeight:700,fontSize:13,lineHeight:1.1}}>Biblioteca de Acupuntura</div>
          <div style={{color:"var(--t4)",fontSize:9}}>Ednéa · Paulo Renato · Deadman · Tung 董</div>
        </div>
        {/* Mu/Shu button */}
        <button onClick={()=>setShowMuShu(true)} title="Pontos Mu e Shu Dorsais"
          style={{background:"var(--bg2)",border:"none",borderRadius:6,color:"var(--t3)",padding:"4px 7px",fontSize:15}}>
          🗺️
        </button>
        {/* Model selector */}
        <select value={cfg.model} onChange={e=>{window._MODEL=e.target.value;localStorage.setItem("acu_model",e.target.value);tick(n=>n+1);}}
          style={{background:"var(--bg2)",border:"1px solid var(--bg3)",borderRadius:6,color:"var(--t2)",
            padding:"3px 5px",fontSize:10,outline:"none",maxWidth:82}}>
          {Object.entries(MODELS).map(([k,m])=><option key={k} value={k}>{m.label}</option>)}
        </select>
        {/* API button */}
        <button onClick={()=>setShowApi(true)}
          style={{background:cfg.hasKey()?"#0d4429":"var(--bg2)",border:"1px solid "+(cfg.hasKey()?"#238636":"var(--bg3)"),
            borderRadius:6,color:cfg.hasKey()?"#3fb950":"var(--t3)",padding:"4px 7px",fontSize:12,fontWeight:700}}>
          🔑
        </button>
        <button onClick={toggleTheme}
          style={{background:"var(--bg2)",border:"none",borderRadius:6,color:"var(--t3)",padding:"4px 7px",fontSize:12}}>
          🌙
        </button>
      </div>

      {/* Paciente Ativo — aparece quando há paciente selecionado e aba é de Paciente/Protocolo */}
      {pacAtivo && ["dq","clinica","linguafoto","sint","diag","dxoc","proto"].includes(tab) && (
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px",
          background:"#0d2818",borderBottom:"1px solid #2ea04340",flexShrink:0,fontSize:12}}>
          <span style={{fontSize:13}}>{pacAtivo.sexo==="M"?"👨":pacAtivo.sexo==="F"?"👩":"🧑"}</span>
          <span style={{color:"#3fb950",fontWeight:700}}>Paciente:</span>
          <span style={{color:"#58a6ff",fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pacAtivo.nome}</span>
          <button onClick={()=>setTab("pront")}
            style={{background:"#1f6feb22",border:"1px solid #1f6feb55",borderRadius:5,color:"#58a6ff",
              fontSize:11,padding:"2px 8px",cursor:"pointer",flexShrink:0}}>📋</button>
          <button onClick={()=>setPacAtivo(null)}
            style={{background:"none",border:"1px solid #444",borderRadius:5,color:"var(--t4)",
              fontSize:11,padding:"2px 6px",cursor:"pointer",flexShrink:0}}>✕</button>
        </div>
      )}

      {/* ── SUBTABS DA ABA ATIVA (se grupo tem > 1) ── */}
      {activeGroup.subTabs.length > 1 && (
        <div style={{display:"flex",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",
          padding:"4px 10px",gap:4,flexShrink:0,overflowX:"auto"}}>
          {activeGroup.subTabs.map(s=>{
            const isActive=tab===s.id;
            return(
              <button key={s.id} onClick={()=>setTab(s.id)}
                style={{background:isActive?"var(--bg2)":"transparent",
                  border:"none",borderBottom:isActive?`2px solid ${activeGroup.cor}`:"2px solid transparent",
                  borderRadius:"4px 4px 0 0",color:isActive?activeGroup.cor:"var(--t3)",
                  padding:"4px 12px",fontSize:12,fontWeight:isActive?700:400,
                  whiteSpace:"nowrap",cursor:"pointer",display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                <span style={{fontSize:14}}>{s.emoji}</span>
                {s.label}
              </button>
            );
          })}
        </div>
      )}

      {/* Content */}
      <div style={{flex:1,display:"flex",minHeight:0,overflow:"hidden"}}>
        {tab==="atlas"&&<AtlasTab pdfs={pdfs} pdfReady={pdfReady}
          onLoadPdf={async(id,file)=>{try{const doc=await loadPdfDoc(file);setPdfs(p=>({...p,[id]:doc}));}catch(e){alert("Erro ao carregar PDF: "+e.message);}}}
          onPointClick={handlePointClick}
          onSendToChat={q=>{setChatQuery(q);setTab("chat");}}/>}
        {tab==="tung"&&<TungTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} hasTungPdf={!!pdfs["tung"]} onGoToAtlas={()=>setTab("atlas")} onOpenPdf={(tungPontoId)=>{ if(pdfs["tung"]){setPrevTab(tab);setPdfOverlay({sig:tungPontoId,num:0,tungPontoId,livroId:"tung"});}else{setTab("atlas");}}}/>}
        {tab==="agulha"&&<AgulhaTab onChipClick={chipClick}/>}
        {tab==="ea"&&<EATab onChipClick={chipClick}/>}
        {tab==="pront"&&<ProntuarioTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onGoToConstit={()=>setTab("constit")} onGoToPront={()=>setTab("pront")}/>}
        {tab==="dq"&&<DezPerguntasTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onGoToPront={()=>setTab("pront")}/>}
        {tab==="constit"&&<ConstitTab
          onSendToChat={q=>{setChatQuery(q);setTab("chat");}}
          onSendToDiag={hints=>{setPrefillDiag(hints);setTab("diag");}}
          onGoToPront={()=>setTab("pront")}
        />}
        {tab==="sint"&&<SintomasTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onChipClick={chipClick} onGoToPront={()=>setTab("pront")}
          onRefinarDiag={(prefill)=>{setDiagPrefill(prefill);setTab("diag");}}/>}
        {tab==="diag"&&<DiagTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onChipClick={chipClick} onGoToPront={()=>setTab("pront")}
          prefill={diagPrefill} onPrefillConsumed={()=>setDiagPrefill(null)}
          constitHints={prefillDiag} onConstitHintsConsumed={()=>setPrefillDiag(null)}/>}
        {tab==="dxoc"&&<DxOcidentalTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onChipClick={chipClick} onGoToPront={()=>setTab("pront")}/>}
        {tab==="proto"&&<ProtocolosTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onChipClick={chipClick} onGoToPront={()=>setTab("pront")}/>}
        {tab==="clinica"&&<ClinicaTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onChipClick={chipClick} onGoToPront={()=>setTab("pront")}/>}
        {tab==="linguafoto"&&<LinguaFotoTab onSendToChat={q=>{setChatQuery(q);setTab("chat");}} onChipClick={chipClick} onGoToPront={()=>setTab("pront")}/>}
        {tab==="chat"&&<ChatTab pdfs={pdfs} currentPages={pages} activeLivroId={activeLivro}
          currentMer={currentMer} currentPt={currentPt} onChipClick={chipClick}
          autoQuery={chatQuery} onAutoQueryDone={()=>setChatQuery(null)}
          persistMsgs={chatMsgs} onPersistMsgs={setChatMsgs}
          persistFavId={chatFavId} onPersistFavId={setChatFavId}/>}
        {tab==="favs"&&<FavoritesTab
          onChipClick={chipClick}
          onSendToChat={(content,title)=>{
            setChatQuery(content);
            setTab("chat");
          }}
        />}
        {tab==="guia"&&<GuiaTab onGoTo={(t)=>setTab(t)}/>}
      </div>

      {/* ── BARRA DE NAVEGAÇÃO INFERIOR ── */}
      <div style={{display:"flex",background:"var(--bg1)",borderTop:"1px solid var(--bg2)",
        flexShrink:0,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV_GROUPS.map(g=>{
          const isGroupActive = g.subTabs.some(s=>s.id===tab);
          const activeSubTab = g.subTabs.find(s=>s.id===tab);
          return(
            <button key={g.id}
              onClick={()=>{
                if(g.subTabs.length===1){
                  setTab(g.subTabs[0].id);
                } else if(isGroupActive){
                  // já no grupo — abre submenu overlay para trocar sub-aba
                  setOpenGroup(openGroup===g.id?null:g.id);
                } else {
                  // vai para primeira sub-aba do grupo
                  setTab(g.subTabs[0].id);
                }
              }}
              style={{flex:1,background:"transparent",border:"none",
                padding:"7px 2px 5px",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                borderTop:isGroupActive?`2px solid ${g.cor}`:"2px solid transparent",
                transition:"border-color .15s"}}>
              <span style={{fontSize:20,lineHeight:1}}>{isGroupActive&&activeSubTab?activeSubTab.emoji:g.emoji}</span>
              <span style={{fontSize:9,color:isGroupActive?g.cor:"var(--t4)",fontWeight:isGroupActive?700:400,
                lineHeight:1,textAlign:"center",maxWidth:56,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {isGroupActive&&activeSubTab?activeSubTab.label:g.label}
              </span>
              {g.subTabs.length>1&&(
                <span style={{fontSize:7,color:isGroupActive?g.cor:"var(--t4)",lineHeight:0.8}}>
                  {isGroupActive?"▲":"▾"}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* ── SUBMENU OVERLAY (aparece acima da nav bar ao clicar no grupo ativo) ── */}
      {openGroup&&(()=>{
        const g=NAV_GROUPS.find(x=>x.id===openGroup);
        if(!g) return null;
        return(
          <>
            <div onClick={()=>setOpenGroup(null)}
              style={{position:"fixed",inset:0,zIndex:199,background:"transparent"}}/>
            <div style={{position:"fixed",bottom:52,left:0,right:0,
              background:"var(--bg1)",borderTop:"2px solid "+g.cor,
              boxShadow:"0 -4px 24px #000a",zIndex:200,padding:"10px 12px 8px",
              display:"flex",gap:8}}>
              {g.subTabs.map(s=>{
                const isAct=tab===s.id;
                return(
                  <button key={s.id} onClick={()=>{setTab(s.id);setOpenGroup(null);}}
                    style={{flex:1,background:isAct?"var(--bg2)":"var(--bg0)",
                      border:`1px solid ${isAct?g.cor:"var(--bg3)"}`,borderRadius:10,
                      padding:"10px 6px",cursor:"pointer",display:"flex",flexDirection:"column",
                      alignItems:"center",gap:5}}>
                    <span style={{fontSize:22}}>{s.emoji}</span>
                    <span style={{fontSize:11,color:isAct?g.cor:"var(--t2)",fontWeight:isAct?700:400,
                      lineHeight:1.2,textAlign:"center"}}>{s.label}</span>
                    {isAct&&<span style={{width:6,height:6,borderRadius:"50%",background:g.cor,display:"block"}}/>}
                  </button>
                );
              })}
            </div>
          </>
        );
      })()}

      {/* Modals */}
      {showApi&&<ApiModal onClose={()=>{setShowApi(false);tick(n=>n+1);}}/>}
      {showMuShu&&<MuShuModal onClose={()=>setShowMuShu(false)} onChipClick={chipClick}/>}
      {pdfOverlay&&<PdfOverlay pdfs={pdfs} sig={pdfOverlay.sig} num={pdfOverlay.num} livroId={pdfOverlay.livroId} tungPontoId={pdfOverlay.tungPontoId} onClose={()=>{ setPdfOverlay(null); if(prevTab) setTab(prevTab); setPrevTab(null); }}/>}
      {pointModal&&<PointQuickModal
        sig={pointModal.sig} num={pointModal.num}
        pdfs={pdfs}
        onClose={()=>setPointModal(null)}
        onOpenPdf={(livroId)=>{ setPrevTab(tab); setPointModal(null); setPdfOverlay({sig:pointModal.ns||normSig(pointModal.sig)||pointModal.sig, num:pointModal.num, livroId}); }}
        onOpenChat={()=>{ setChatQuery(`Me explique o ponto ${pointModal.sig}-${pointModal.num}: localização, funções, indicações e técnica.`); setTab("chat"); }}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
