function getNeedleTech(sig, num){
  // Normaliza chaves para o mapa
  const aliases = { B:"B", Ba:"Ba", C:"C", Du:"VG", E:"E", F:"F", IG:"IG", ID:"ID",
    P:"P", Pc:"Pc", R:"R", Ren:"VC", SJ:"SJ", TA:"SJ", VB:"VB", VG:"VG", VC:"VC" };
  const s = aliases[sig] || sig;
  return NEEDLE_TECH[`${s}-${num}`] || null;
}

// ═══════════════════════════════════════════════════════════════════════════
// MOTOR LOCAL COMPARTILHADO (sem IA) — diagnóstico · SOAP · plano · protocolo
// Reaproveita PADROES_TCM, COMBINACOES_CLINICAS, NEEDLE_TECH, PONTOS_FAMOSOS,
// PONTOS_TUNG, getTecnica/getEXSugeridos/getTungSugeridos.
// ═══════════════════════════════════════════════════════════════════════════
function _nl(s){ return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
const _PT_RE = /(VC|VG|IG|ID|VB|SJ|PC|TR|TW|BP|SP|Ren|Du|EX|HN|LE|UE|P|E|C|R|F|B)(\d{1,3})/gi;

function parsePontosArr(str){
  const out=[]; if(!str) return out;
  let m; _PT_RE.lastIndex=0;
  while((m=_PT_RE.exec(str))!==null){ out.push({sig:m[1], num:parseInt(m[2]), raw:m[1]+m[2]}); }
  const seen=new Set();
  return out.filter(p=>{ const k=p.raw.toUpperCase(); if(seen.has(k)) return false; seen.add(k); return true; });
}

function nomePontoTCM(sig,num){
  const ns=normSig(sig);
  const e=PONTOS_FAMOSOS.find(p=>normSig(p[0])===ns && p[1]===num);
  return e ? {pinyin:e[2], pt:e[3], func:e[4], ind:e[5]} : null;
}

// Ordem clínica de inserção: extremidades distais(1) → membros prox.(2) → linha média(3) → cabeça/Ashi(4)
function _ordemPonto(sig,num){
  const ns=normSig(sig);
  if(ns==="Ren"||ns==="Du") return 3;
  const distMao={IG:[1,5],P:[7,11],C:[5,9],ID:[1,8],Pc:[6,9],SJ:[1,6]};
  const distPe={E:[40,45],Ba:[1,9],B:[57,67],R:[1,7],VB:[38,44],F:[1,6]};
  if(distMao[ns]&&num>=distMao[ns][0]&&num<=distMao[ns][1]) return 1;
  if(distPe[ns]&&num>=distPe[ns][0]&&num<=distPe[ns][1]) return 1;
  if(["IG","P","C","ID","Pc","SJ","E","Ba","B","R","VB","F"].includes(ns)) return 2;
  return 4;
}

function prescricaoLocalDe(padrao){
  return {
    tec: getTecnica(padrao),
    exList: getEXSugeridos(padrao),
    tungList: getTungSugeridos(padrao),
    freq: padrao.tipo==="def" ? "2× por semana" : "3× por semana (fase aguda)",
    ciclo: padrao.tipo==="def" ? "15–20 sessões" : "8–12 sessões",
  };
}

// Pontua PADROES_TCM contra os campos livres de uma sessão
function matchPadroesSessao({queixa="",sintomas="",lingua="",pulso="",extra=""}, limite=5){
  const blob=_nl([queixa,sintomas,extra].join(" "));
  const words=blob.split(/[\s,;.\/+]+/).filter(w=>w.length>3);
  const lngW=_nl(lingua).split(/[\s,;]+/).filter(w=>w.length>3);
  const plsW=_nl(pulso).split(/[\s,;]+/).filter(w=>w.length>3);
  if(words.length===0 && lngW.length===0 && plsW.length===0) return [];
  return PADROES_TCM.map(p=>{
    const sint=_nl(p.sintomas), nome=_nl(p.nome), org=_nl(p.orgao), lng=_nl(p.lingua), pls=_nl(p.pulso);
    let score=0;
    words.forEach(w=>{ if(nome.includes(w)) score+=3; if(sint.includes(w)) score+=2; if(org.includes(w)) score+=1; });
    lngW.forEach(w=>{ if(lng.includes(w)) score+=2; });
    plsW.forEach(w=>{ if(pls.includes(w)) score+=2; });
    return {...p, score};
  }).filter(p=>p.score>0).sort((a,b)=>b.score-a.score).slice(0,limite);
}

// Pontua COMBINACOES_CLINICAS contra uma condição (texto livre)
function matchCombinacoesCond(cond,limite=3){
  const q=_nl(cond);
  const words=q.split(/[\s,;.\/+]+/).filter(w=>w.length>3);
  if(words.length===0) return [];
  return COMBINACOES_CLINICAS.map(c=>{
    const blob=_nl(c.nome+" "+(c.cat||"")+" "+c.indicacoes);
    let score=words.reduce((s,w)=>s+(blob.includes(w)?1:0),0);
    if(_nl(c.nome).includes(q)) score+=4;
    return {...c, score};
  }).filter(c=>c.score>0).sort((a,b)=>b.score-a.score).slice(0,limite);
}

// Tabela markdown de pontos a partir de uma string "P9+B13+VC6"
function _tabelaPontos(pontosStr, metodoGeral){
  const pts=parsePontosArr(pontosStr);
  if(!pts.length) return "";
  let t="| Ponto | Nome | Função | Profund. | Direção |\n|---|---|---|---|---|\n";
  pts.forEach(p=>{
    const ns=normSig(p.sig), info=nomePontoTCM(p.sig,p.num), nt=getNeedleTech(ns,p.num);
    const nome=info?info.pt:"—";
    const func=info?info.func.split(/\s+/).slice(0,4).join(" "):"—";
    t+=`| ${p.raw} | ${nome} | ${func} | ${nt?nt[0]:"0,5–1 cun"} | ${nt?nt[1]:"Perpendicular"} |\n`;
  });
  return t;
}

function _seqAgulhamento(pontosStr){
  const pts=parsePontosArr(pontosStr);
  if(!pts.length) return "";
  const seq=[...pts].sort((a,b)=>_ordemPonto(a.sig,a.num)-_ordemPonto(b.sig,b.num));
  return seq.map((p,i)=>`${i+1}. ${p.raw}`).join(" → ");
}

// ── Protocolo local a partir de um PADRÃO TCM ──────────────────────────────
function protocoloLocalMd(padrao, modoEA){
  const tipoTxt=padrao.tipo==="def"?"Deficiência":padrao.tipo==="exc"?"Excesso":"Misto";
  const pre=prescricaoLocalDe(padrao);
  const tec=pre.tec;
  let md=`## ${modoEA?"⚡ Protocolo EA":"🪡 Protocolo"} — ${padrao.nome}\n`;
  md+=`**Padrão:** ${padrao.orgao} · ${tipoTxt}\n\n`;
  md+=`**Língua esperada:** ${padrao.lingua} | **Pulso esperado:** ${padrao.pulso}\n\n`;
  md+=`### Pontos-base\n${_tabelaPontos(padrao.pontos, tec.geral)}\n`;
  md+=`### Técnica e dosimetria\n`;
  md+=`- **Método geral:** ${tec.geral}\n- **Retenção:** ${tec.retencao}\n`;
  md+=`- **Frequência:** ${pre.freq} · **Ciclo:** ${pre.ciclo}\n`;
  if(tec.moxa) md+=`- **Moxa:** ${tec.moxa.nivel}\n`;
  if(modoEA){
    md+=`- **Eletroestimulação:** ${tec.eletro||(padrao.tipo==="def"?"2 Hz (tonificação)":"2/100 Hz densa-dispersa")} · 20–30 min\n`;
  } else if(tec.eletro){
    md+=`- **Eletro (se pertinente):** ${tec.eletro}\n`;
  }
  if(tec.sangria) md+=`- **Sangria:** indicada conforme nota\n`;
  if(pre.exList.length){
    md+=`\n### Pontos extras (EX)\n`+pre.exList.slice(0,4).map(e=>`- **${e.pt}** (${e.nome}): ${e.ind}`).join("\n")+"\n";
  }
  if(pre.tungList.length){
    md+=`\n### Tung complementares\n`+pre.tungList.slice(0,3).map(t=>`- **${t.id}** (${t.n}): ${t.r}`).join("\n")+"\n";
  }
  md+=`\n### Sequência de agulhamento\n${_seqAgulhamento(padrao.pontos)}\n`;
  md+=`\n### Nota clínica\n${padrao.nota}\n`;
  if(padrao.etiologia) md+=`\n**Etiologia:** ${padrao.etiologia}\n`;
  if(padrao.prog) md+=`\n**Prognóstico:** ${padrao.prog}\n`;
  md+=`\n> Protocolo gerado da base local. Refine com IA para detalhamento ponto a ponto.`;
  return md;
}

// ── Protocolo local por CONDIÇÃO (combinações + padrão) — p/ ProtoPane ─────
function protocoloPorCondicaoMd(cond, modoEA){
  const combos=matchCombinacoesCond(cond,2);
  const padroes=matchPadroesSessao({queixa:cond, sintomas:cond}, 1);
  if(!combos.length && !padroes.length) return null;
  let md=`## ${modoEA?"⚡ Protocolo EA":"🪡 Protocolo"} — ${cond}\n`;
  md+=`> Base local (combinações validadas + padrões TCM). Refine com IA se precisar de tabela completa.\n`;
  combos.forEach(c=>{
    md+=`\n### ${c.nome}${c.cat?" · "+c.cat:""}\n`;
    md+=`**Indicações:** ${c.indicacoes}\n\n`;
    md+=_tabelaPontos(c.pontos, modoEA?"Dispersão/2-100Hz":"Conforme padrão");
    if(modoEA) md+=`\n*EA:* conectar pares locais homolaterais · 2 Hz (crônico) ou 2/100 Hz (dor) · 20–30 min\n`;
    md+=`\n**Sequência:** ${_seqAgulhamento(c.pontos)}\n`;
    md+=`\n**Nota:** ${c.nota}\n`;
  });
  if(padroes.length){
    const p=padroes[0];
    md+=`\n---\n### Padrão TCM provável: ${p.nome} (${p.orgao})\n`;
    md+=`- **Pontos-base:** ${p.pontos}\n- **Técnica:** ${getTecnica(p).geral}\n- **Língua/Pulso:** ${p.lingua} / ${p.pulso}\n`;
  }
  return md;
}

// ── Diagnóstico local (markdown) a partir de campos da sessão ──────────────
function diagnosticoLocalMd(campos){
  const padroes=matchPadroesSessao(campos, 3);
  if(!padroes.length){
    return `## 🧠 Diagnóstico MTC (base local)\n\nNenhum padrão da base local casou com os dados informados. Detalhe mais a queixa, sintomas, língua e pulso — ou use a IA para análise aberta.`;
  }
  const maxScore=padroes[0].score||1;
  let md=`## 🧠 Diagnóstico MTC (base local)\n> Hipóteses ordenadas por compatibilidade com a base de ${PADROES_TCM.length} padrões. Confirme com julgamento clínico.\n`;
  padroes.forEach((p,i)=>{
    const tipoTxt=p.tipo==="def"?"Deficiência":p.tipo==="exc"?"Excesso":"Misto";
    const compat=Math.round((p.score/maxScore)*100);
    const tec=getTecnica(p);
    md+=`\n### ${i+1}. ${p.nome} — ${p.orgao} (${tipoTxt}) · compat. ${compat}%\n`;
    md+=`- **Sintomas-chave:** ${p.sintomas}\n`;
    md+=`- **Língua esperada:** ${p.lingua} | **Pulso esperado:** ${p.pulso}\n`;
    md+=`- **Pontos-base:** ${p.pontos}\n`;
    md+=`- **Técnica:** ${tec.geral}${tec.moxa?" · Moxa "+tec.moxa.nivel:""}\n`;
    if(p.etiologia) md+=`- **Etiologia:** ${p.etiologia}\n`;
    if(p.prog) md+=`- **Prognóstico:** ${p.prog}\n`;
    md+=`- **Nota:** ${p.nota}\n`;
  });
  return md;
}

function soapLocalMd({pac, sess, pontosSel, tecnica, padrao}){
  const idade = pac && pac.dob ? (new Date().getFullYear()-new Date(pac.dob).getFullYear())+" anos" : "não informada";
  let md=`# SOAP Note — ${pac?pac.nome:"Paciente"}\n`;
  md+=`Sexo: ${pac&&pac.sexo?pac.sexo:"—"} | Idade: ${idade} | Data: ${(sess.data||"").replace("T"," ")}\n\n`;
  md+=`## S — Subjetivo\n- **Queixa principal:** ${sess.queixa||"não informado"}\n- **Sintomas relatados:** ${sess.sintomas||"não informado"}\n`;
  if(sess.outros) md+=`- **Histórico/outros:** ${sess.outros}\n`;
  md+=`\n## O — Objetivo\n- **Língua:** ${sess.lingua||"não avaliada"}\n- **Pulso:** ${sess.pulso||"não avaliado"}\n`;
  md+=`\n## A — Avaliação (Diagnóstico MTC)\n`;
  if(padrao){
    const tipoTxt=padrao.tipo==="def"?"Deficiência":padrao.tipo==="exc"?"Excesso":"Misto";
    md+=`- **Padrão provável:** ${padrao.nome} (${padrao.orgao} · ${tipoTxt})\n`;
    if(padrao.etiologia) md+=`- **Etiologia provável:** ${padrao.etiologia}\n`;
    md+=`- **Correlação língua/pulso esperados:** ${padrao.lingua} / ${padrao.pulso}\n`;
  } else {
    md+=`- Padrão a definir (nenhuma correspondência forte na base local).\n`;
  }
  if(pontosSel) md+=`- **Pontos selecionados:** ${pontosSel}\n`;
  if(tecnica) md+=`- **Técnica adotada:** ${tecnica}\n`;
  md+=`\n## P — Plano\n`;
  if(padrao){
    const pre=prescricaoLocalDe(padrao);
    md+=`- **Pontos sugeridos:** ${pontosSel||padrao.pontos}\n`;
    md+=`- **Técnica:** ${pre.tec.geral} · Retenção ${pre.tec.retencao}\n`;
    if(pre.tec.moxa) md+=`- **Moxa:** ${pre.tec.moxa.nivel}\n`;
    md+=`- **Frequência:** ${pre.freq} · **Ciclo:** ${pre.ciclo}\n`;
    if(padrao.prog) md+=`- **Prognóstico:** ${padrao.prog}\n`;
  } else {
    md+=`- ${pontosSel?"Pontos: "+pontosSel+". ":""}Definir conduta após fechar o padrão MTC.\n`;
  }
  md+=`- **Reavaliação:** próxima sessão (evolução da queixa e achados de língua/pulso).\n`;
  return md;
}

// ── Plano de sessão local (markdown) ───────────────────────────────────────
function planoSessaoLocalMd({padrao, pontosIncluidos, moxaObs, eaObs, nSessoes}){
  const tipoTxt=padrao.tipo==="def"?"Deficiência":padrao.tipo==="exc"?"Excesso":"Misto";
  const tec=getTecnica(padrao);
  const linhas=pontosIncluidos.map(r=>{
    const p=parsePontosArr(r.pt)[0]||{sig:r.pt,num:0,raw:r.pt};
    const ns=normSig(p.sig), info=nomePontoTCM(p.sig,p.num), nt=getNeedleTech(ns,p.num);
    const lateral=(ns==="Ren"||ns==="Du")?"Central":"Bilateral";
    return {raw:p.raw, sig:p.sig, num:p.num, nome:info?info.pt:"—",
      func:info?info.func.split(/\s+/).slice(0,4).join(" "):(r.obs||"—"),
      prof:nt?nt[0]:"0,5–1 cun", dir:nt?nt[1]:"Perpendicular", tecnica:r.tecnica, lateral};
  });
  let md=`# Plano de Sessão — ${padrao.nome}\n**Padrão:** ${padrao.orgao} · ${tipoTxt}\n\n`;
  md+=`## 📋 Prescrição da Sessão\n`;
  md+=`| Ponto | Nome | Função | Profund. | Direção | Técnica | Lateral. |\n|---|---|---|---|---|---|---|\n`;
  linhas.forEach(l=>{ md+=`| ${l.raw} | ${l.nome} | ${l.func} | ${l.prof} | ${l.dir} | ${l.tecnica} | ${l.lateral} |\n`; });
  const seq=[...linhas].sort((a,b)=>_ordemPonto(a.sig,a.num)-_ordemPonto(b.sig,b.num));
  md+=`\n## 🪡 Sequência de Agulhamento\n`;
  md+=seq.map((l,i)=>`${i+1}. ${l.raw} (${l.lateral}) — ${l.tecnica}`).join("\n");
  md+=`\n\n*Regra:* distais antes de locais; ${padrao.tipo==="def"?"tonificar inferior→superior":"dispersar superior→inferior"}; retenção ${tec.retencao}.\n`;
  md+=`\n## 🔥 Moxa\n${moxaObs||(tec.moxa?tec.moxa.nivel:"Não indicada")}\n`;
  md+=`\n## ⚡ Eletroestimulação\n${eaObs||tec.eletro||"Avaliar pertinência"}\n`;
  md+=`\n## 📅 Plano de Tratamento\n- **Sessões:** ${nSessoes||(padrao.tipo==="def"?"15–20 sessões":"8–12 sessões")}\n- **Frequência:** ${padrao.tipo==="def"?"1–2× por semana":"2–3× por semana na fase aguda"}\n- **Reavaliar** após 8–10 sessões; reduzir frequência conforme melhora.\n`;
  if(padrao.prog) md+=`- **Prognóstico:** ${padrao.prog}\n`;
  if(padrao.etiologia) md+=`\n## 🌿 Orientações ao Paciente\nAjustar fatores etiológicos: ${padrao.etiologia}\n`;
  md+=`\n> Plano gerado da base local. Refine com IA para detalhamento adicional.`;
  return md;
}

// ── Lookup local de ponto p/ o chat (função/indicação; Tung c/ localização) ─
function lookupPontoChat(txt){
  const low=_nl(txt);
  const isLoc=/(onde fica|localiz|como localiz|onde esta|onde encontr|anatomia|profundidade)/.test(low);
  const isInfo=/(o que e|para que serve|funcao|funç|indica|serve|sobre o ponto|me fale|explica|qual a funcao|pra que)/.test(low) || /^[a-z]{1,3}\s?\d{1,3}\s*\??$/.test(low.trim());
  // Ponto Tung (ex.: 22.05) — temos localização local
  const tungM=txt.match(/\b(\d{2,3}\.\d{2})\b/);
  if(tungM && (isLoc||isInfo)){
    const tp=(typeof PONTOS_TUNG!=="undefined") && PONTOS_TUNG.find(p=>p.id===tungM[1]);
    if(tp){
      let md=`### 董 Tung ${tp.id} — ${tp.pinyin||tp.nome||""}\n`;
      if(tp.nome_pt) md+=`**${tp.nome_pt}**\n\n`;
      if(tp.localizacao) md+=`**Localização:** ${tp.localizacao}\n\n`;
      const ind=Array.isArray(tp.indicacoes)?tp.indicacoes.join(", "):tp.indicacoes;
      if(ind) md+=`**Indicações:** ${ind}\n`;
      if(tp.combinar) md+=`\n**Combinar:** ${tp.combinar}\n`;
      md+=`\n*(resposta da base local Tung — toque no chip ou pergunte mais para a IA aprofundar)*`;
      return md;
    }
  }
  // Ponto padrão (P, IG, E, BP...) — temos função/indicação, mas NÃO localização local
  if(!isInfo) return null;
  _PT_RE.lastIndex=0;
  const m=_PT_RE.exec(txt);
  if(!m) return null;
  // se a pergunta é só de localização de ponto padrão, deixa a IA + atlas responderem
  if(isLoc && !isInfo) return null;
  const sig=m[1], num=parseInt(m[2]);
  const info=nomePontoTCM(sig,num);
  if(!info) return null;
  const ns=normSig(sig);
  const mer=MERIDIANOS.find(me=>me.sigla===ns||me.id===ns);
  const nt=getNeedleTech(ns,num);
  let md=`### 📍 ${sig}${num} — ${info.pinyin} (${info.pt})\n`;
  if(mer) md+=`**Meridiano:** ${mer.nome} · Elemento ${mer.elem}\n\n`;
  md+=`**Funções:** ${info.func}\n\n`;
  md+=`**Indicações:** ${info.ind}\n`;
  if(nt) md+=`\n**Agulhamento:** ${nt[0]} · ${nt[1]}${nt[2]?" · "+nt[2]:""}\n`;
  if(isLoc) md+=`\nℹ️ Para a **localização anatômica detalhada** (3 níveis) com imagem, pergunte "onde fica ${sig}${num}" usando a IA, ou toque no chip para abrir o atlas.`;
  else md+=`\n*(resposta rápida da base local — pergunte mais para a IA aprofundar ou ver localização no atlas)*`;
  return md;
}

function ApiModal({onClose}){
  const [aK,setAK]=useState(cfg.aKey);

  const [model,setModel]=useState(cfg.model);
  const [ok,setOk]=useState(false);

  function save(){
    cfg.save(aK.trim(),gK.trim(),model);
    setOk(true); setTimeout(()=>{setOk(false);onClose();},700);

  const inp={width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:8,

      <div style={{color:"var(--t3)",fontSize:11,fontWeight:600,marginBottom:6}}>MODELO PADRÃO</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {Object.entries(MODELS).map(([k,m])=>(
          <button key={k} onClick={()=>setModel(k)}
            style={{background:model===k?"var(--acc)":"var(--bg2)",border:"1px solid "+(model===k?"var(--acc)":"var(--bg3)"),
              borderRadius:6,color:model===k?"#fff":"var(--t2)",padding:"4px 10px",fontSize:11,fontWeight:600}}>
            {m.label}
          </button>

      </div>

      <div style={{background:"#0a1f0f",border:"1px solid #2e7d32",borderRadius:10,padding:"10px",marginBottom:12}}>
        <div style={{color:"#81c995",fontSize:12,fontWeight:700,marginBottom:2}}>🆓 Google Gemini — gratuito</div>
        <div style={{color:"#4caf50",fontSize:11,marginBottom:8}}>aistudio.google.com/apikey · Sem cartão · Funciona sozinha</div>

      <div style={{display:"flex",gap:8,marginTop:4}}>

          borderRadius:8,color:"#fff",padding:10,fontSize:13,fontWeight:700}}>
          {ok?"✓ Salvo!":"Salvar"}

        <button onClick={()=>{cfg.save("","",cfg.model);setAK("");setGK("");}}
          style={{background:"var(--red)",border:"none",borderRadius:8,color:"#fff",padding:"10px 14px",fontSize:13}}>
          Limpar
        </button>
      </div>
      <div style={{color:"var(--t4)",fontSize:11,marginTop:8,textAlign:"center"}}>Chaves salvas apenas no navegador</div>
    </Modal>
  );
}

// ─── PDF VIEWER ──────────────────────────────────────────────────────────────
function PdfViewer({pdfDoc,page,total,livro,onPage,onSendImg}){
  const [src,setSrc]=useState(null);
  const [loading,setLoading]=useState(false);
  const isMounted=useRef(true);
  useEffect(()=>{isMounted.current=true;return()=>{isMounted.current=false;};},[]);

  useEffect(()=>{
    if(!pdfDoc) return;
    setSrc(null);setLoading(true);
    renderPage(pdfDoc,Math.min(page,total),2.0).then(img=>{if(isMounted.current){setSrc(img);setLoading(false);}}).catch(()=>setLoading(false));
  },[pdfDoc,page]);

  if(!pdfDoc) return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"var(--t3)"}}>
      <div style={{fontSize:36}}>📖</div>
      <div style={{fontSize:13}}>Nenhum PDF carregado</div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",width:"100%",height:"100%"}}>
      {/* Nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",
        background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <button onClick={()=>onPage(Math.max(1,page-1))} disabled={page<=1}
          style={{background:"var(--bg2)",border:"none",borderRadius:6,color:page<=1?"var(--t4)":"var(--t1)",
            padding:"4px 10px",fontSize:13,fontWeight:700}}>‹</button>
        <span style={{color:"var(--t3)",fontSize:12}}>{page} / {total}</span>
        <button onClick={()=>onPage(Math.min(total,page+1))} disabled={page>=total}
          style={{background:"var(--bg2)",border:"none",borderRadius:6,color:page>=total?"var(--t4)":"var(--t1)",
            padding:"4px 10px",fontSize:13,fontWeight:700}}>›</button>
        {onSendImg&&<button onClick={async()=>{const img=await renderPage(pdfDoc,page);onSendImg(img);}}
          style={{background:"var(--acc)",border:"none",borderRadius:6,color:"#fff",padding:"4px 8px",fontSize:11,fontWeight:700}}>
          🤖 IA
        </button>}
      </div>
      {/* Image — scroll vertical, nunca corta horizontal */}
      <div style={{flex:1,overflow:"auto",background:"var(--bg0)"}}>
        {loading
          ?<div style={{padding:20,textAlign:"center",color:"var(--t3)"}}>⏳ Carregando...</div>
          :<img src={src} style={{display:"block",width:"100%",height:"auto"}} alt="PDF"/>}
      </div>
    </div>
  );
}

// ─── PDF OVERLAY MODAL ───────────────────────────────────────────────────────
function PdfOverlay({pdfs,sig,num,livroId:initLivroId,onClose,tungPontoId}){
  // Modo Tung: livroId fixo em "tung", sig = tungPontoId
  const isTungMode = !!tungPontoId;
  const livroId = isTungMode ? "tung" :
    (initLivroId && pdfs[initLivroId] ? initLivroId :
    (Object.keys(pdfs).find(k=>{const p=getPage(k,sig,num);return p>1;})||Object.keys(pdfs)[0]||"ednea"));
  const [lid,setLid]=useState(livroId);
  const livro=LIVROS.find(l=>l.id===lid);
  const startPage = isTungMode ? (TUNG_PDF_PAGES[tungPontoId]||1) : getPage(lid,sig,num);
  const [page,setPage]=useState(startPage);
  const pdfDoc=pdfs[lid];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:2500,
      display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",
        background:"var(--bg1)",borderBottom:"1px solid var(--bg2)"}}>
        {isTungMode ? (
          // Modo Tung: mostra apenas o livro Tung e label do ponto
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:"#9d7eed",color:"#fff",borderRadius:6,
              padding:"4px 10px",fontSize:12,fontWeight:700}}>董 Alex Costa</span>
            <span style={{color:"#c4b5fd",fontSize:12,fontWeight:700}}>Tung {tungPontoId}</span>
          </div>
        ) : (
          LIVROS.filter(l=>pdfs[l.id]).map(l=>(
            <button key={l.id} onClick={()=>{setLid(l.id);setPage(getPage(l.id,sig,num));}}
              style={{background:lid===l.id?l.cor:"var(--bg2)",border:"none",borderRadius:6,
                color:lid===l.id?"#fff":"var(--t2)",padding:"4px 10px",fontSize:12,fontWeight:600}}>
              {l.emoji} {l.autor.split(" ")[0]}
            </button>
          ))
        )}
        {!isTungMode&&<button onClick={()=>{
          const WHO_MAP={P:"LU",IG:"LI",E:"ST",Ba:"SP",C:"HT",ID:"SI",B:"BL",R:"KI",Pc:"PC",SJ:"TE",VB:"GB",F:"LR",Ren:"CV",Du:"GV",VG:"GV",VC:"CV",EX:"EX"};
          const code=WHO_MAP[sig]||sig.toUpperCase();
          const q=encodeURIComponent(`site:meandqi.com ${code}-${num}`);
          window.open(`https://www.google.com/search?q=${q}&tbm=isch`,"_blank");
        }}
          style={{background:"#1a472a",border:"1px solid #2ea043",borderRadius:6,
            color:"#3fb950",padding:"4px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
          📍 Localização
        </button>}
        <div style={{flex:1}}/>
        {!isTungMode&&<span style={{color:"var(--t3)",fontSize:12,fontWeight:700}}>{sig}-{num}</span>}
        <button onClick={onClose} style={{background:"var(--bg2)",border:"none",borderRadius:6,
          color:"var(--t1)",padding:"4px 10px",fontSize:13,fontWeight:700}}>✕</button>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        <PdfViewer pdfDoc={pdfDoc} page={page} total={livro?.total||1} livro={livro} onPage={setPage}/>
      </div>
    </div>
  );
}

// ─── SMART SEARCH COMPONENT ───────────────────────────────────────────────────
function SmartSearch({onSelectPoint, onSendToChat}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const [results,setResults]=useState([]);
  const inputRef=useRef(null);
  const dropRef=useRef(null);

  // Close on outside click
  useEffect(()=>{
    function handler(e){
      if(dropRef.current&&!dropRef.current.contains(e.target)&&
         inputRef.current&&!inputRef.current.contains(e.target)){
        setOpen(false);
      }
    }
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[]);

  function search(val){
    setQ(val);
    if(!val.trim()){ setResults([]); setOpen(false); return; }
    const v=val.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const res=[];

    // 1. Ponto exato: E-36, IG4, B 23 etc
    const mPt=val.trim().toUpperCase().match(/^([A-ZÁÉÍÓÚÂÊÔÃÕa-záéíóúâêôãõ]{1,3}(?:EN|U|en|u)?)-?\s*(\d{1,3})$/);
    if(mPt){
      const sig=mPt[1].toUpperCase();
      const num=parseInt(mPt[2]);
      const ns=normSig(sig)||sig;
      const mer2=MERIDIANOS.find(x=>x.sigla===ns||x.sigla.toUpperCase()===ns||x.id===ns);
      if(mer2&&num>=1&&num<=mer2.pts){
        const pf=PONTOS_FAMOSOS.find(p=>p[0]===mer2.sigla&&p[1]===num);
        res.push({type:"ponto",mer:mer2,num,label:`${mer2.sigla}-${num}`,
          sub:pf?`${pf[2]} · ${pf[3]}`:`${mer2.nome}`,score:100});
      }
    }

    // 2. Busca em pontos famosos (nome, funções, indicações)
    const ptMatches=[];
    for(const [sig,num,pinyin,port,funcs,indics] of PONTOS_FAMOSOS){
      const hay=[sig+num,sig+"-"+num,pinyin,port,funcs,indics].join(" ").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(hay.includes(v)){
        const mer2=MERIDIANOS.find(x=>x.sigla===sig);
        if(mer2) ptMatches.push({type:"ponto",mer:mer2,num,
          label:`${sig}-${num} · ${pinyin}`,sub:port,score:hay.indexOf(v)===0?90:50});
      }
    }
    // Sort by score, limit to 5
    ptMatches.sort((a,b)=>b.score-a.score);
    res.push(...ptMatches.slice(0,5));

    // 3. Busca em meridianos
    for(const m of MERIDIANOS){
      const hay=(m.nome+" "+m.sigla+" "+m.elem).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(hay.includes(v)&&!res.find(r=>r.type==="meridiano"&&r.mer.id===m.id)){
        res.push({type:"meridiano",mer:m,label:m.nome,sub:`${m.elem} · ${m.pts} pontos`,score:60});
      }
    }

    // 4. Busca em sintomas / condições
    for(const s of SINTOMAS_INDEX){
      const hay=(s.kw.join(" ")+" "+s.label).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
      if(hay.includes(v)){
        res.push({type:"sintoma",label:s.label,send:s.send,score:40});
      }
    }

    // 5. Busca em pontos Tung
    const tungMatches=[];
    for(const pt of PONTOS_TUNG){
      const hay=[pt.id,pt.pinyin,pt.hanzi,pt.nome_pt,pt.indicacoes.join(" "),pt.area_reacao||"",pt.canal_mtc||"",pt.notas||""]
        .join(" ").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(hay.includes(v)){
        tungMatches.push({type:"tung",pt,label:`Tung ${pt.id} · ${pt.pinyin}`,
          sub:pt.nome_pt,score:hay.indexOf(v)===0?85:45});
      }
    }
    tungMatches.sort((a,b)=>b.score-a.score);
    res.push(...tungMatches.slice(0,3));

    // 6. Busca nas combinações clínicas
    for(const c of COMBINACOES_CLINICAS){
      const hay=(c.nome+" "+c.indicacoes+" "+c.cat).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(hay.includes(v)){
        res.push({type:"combo",label:c.nome,sub:c.indicacoes.slice(0,60)+"…",pontos:c.pontos,score:35});
        if(res.filter(r=>r.type==="combo").length>=3) break;
      }
    }

    // Deduplicate pontos
    const seen=new Set();
    const deduped=res.filter(r=>{
      if(r.type==="ponto"){
        const k=r.mer.sigla+r.num;
        if(seen.has(k)) return false;
        seen.add(k); return true;
      }
      return true;
    });

    setResults(deduped.slice(0,12));
    setOpen(deduped.length>0);
  }

  function selectResult(r){
    setQ(""); setOpen(false);
    if(r.type==="ponto"){ onSelectPoint(r.mer,r.num); }
    else if(r.type==="tung"){ onSendToChat(`Explique o ponto Tung ${r.pt.id} — ${r.pt.pinyin} "${r.pt.nome_pt}": localização, indicações, mecanismo de ação e combinações.`); }
    else if(r.type==="meridiano"){ onSelectPoint(r.mer,null); }
    else if(r.type==="sintoma"||r.type==="combo"){
      onSendToChat(r.send||(r.type==="combo"?`Explique a combinação: ${r.label} (${r.pontos})`:""));
    }
  }

  const typeIcon={ponto:"📍",meridiano:"〰️",sintoma:"🩺",combo:"🔗",tung:"董"};
  const typeColor={ponto:"var(--acc)",meridiano:"#7EC8E3",sintoma:"#3fb950",combo:"#d4a843",tung:"#a78bfa"};

  return(
    <div style={{position:"relative"}} ref={dropRef}>
      <div style={{display:"flex",gap:3,alignItems:"center",
        background:"var(--bg0)",border:"1px solid "+(open?"var(--acc)":"var(--bg3)"),
        borderRadius:7,padding:"4px 6px",transition:"border-color .15s"}}>
        <span style={{fontSize:11,color:"var(--t4)",flexShrink:0}}>🔍</span>
        <input ref={inputRef} value={q}
          onChange={e=>search(e.target.value)}
          onFocus={()=>q&&results.length&&setOpen(true)}
          onKeyDown={e=>{
            if(e.key==="Enter"&&results.length>0){selectResult(results[0]);}
            if(e.key==="Escape"){setOpen(false);}
          }}
          placeholder="Ponto, sintoma, dor..."
          style={{flex:1,background:"transparent",border:"none",outline:"none",
            fontSize:11,color:"var(--t1)",minWidth:0}}/>
        {q&&<button onClick={()=>{setQ("");setResults([]);setOpen(false);}}
          style={{background:"none",border:"none",color:"var(--t4)",fontSize:12,padding:0,lineHeight:1}}>✕</button>}
      </div>
      {open&&results.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:1000,
          background:"var(--bg1)",border:"1px solid var(--bg3)",borderRadius:8,
          boxShadow:"0 8px 24px rgba(0,0,0,0.5)",maxHeight:260,overflowY:"auto"}}>
          {results.map((r,i)=>(
            <div key={i} onClick={()=>selectResult(r)}
              style={{display:"flex",alignItems:"center",gap:7,padding:"7px 9px",
                cursor:"pointer",borderBottom:i<results.length-1?"1px solid var(--bg2)":"none",
                background:"transparent"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--bg2)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:13,flexShrink:0}}>{typeIcon[r.type]}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"var(--t1)",fontSize:11,fontWeight:600,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.label}</div>
                {r.sub&&<div style={{color:"var(--t3)",fontSize:10,whiteSpace:"nowrap",
                  overflow:"hidden",textOverflow:"ellipsis"}}>{r.sub}</div>}
              </div>
              <span style={{fontSize:9,color:typeColor[r.type],fontWeight:700,flexShrink:0,
                textTransform:"uppercase",opacity:0.8}}>
                {r.type==="ponto"?"PT":r.type==="meridiano"?"MER":r.type==="sintoma"?"🩺":r.type==="tung"?"董":"COMB"}
              </span>
            </div>
          ))}
          {(results.some(r=>r.type==="sintoma"||r.type==="combo"))&&(
            <div style={{padding:"5px 9px",borderTop:"1px solid var(--bg2)",
              color:"var(--t4)",fontSize:10,textAlign:"center"}}>
              🤖 Itens 🩺/🔗 abrem no Chat
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── ATLAS TAB ───────────────────────────────────────────────────────────────
function AtlasTab({pdfs,pdfReady,onLoadPdf,onPointClick,onSendToChat}){
  const [mer,setMer]=useState(null);
  const [pt,setPt]=useState(null);
  const [lid,setLid]=useState("ednea");
  const [page,setPage]=useState(1);
  const livro=LIVROS.find(l=>l.id===lid);

  function selectPoint(m,n){
    if(!m) return;
    setMer(m);
    if(n!==null&&n!==undefined){ setPt(n); const pg=getPage(lid,m.sigla,n); setPage(pg>1?pg:page); }
    else { setMer(m); setPt(null); }
    if(n&&onPointClick) onPointClick(m,n);
  }

  return(
    <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:160,borderRight:"1px solid var(--bg2)",display:"flex",flexDirection:"column",
        background:"var(--bg1)",flexShrink:0}}>
        {/* Smart search */}
        <div style={{padding:"8px 8px 4px",borderBottom:"1px solid var(--bg2)"}}>
          <SmartSearch onSelectPoint={selectPoint} onSendToChat={onSendToChat}/>
        </div>
        {/* Meridians list */}
        <div style={{flex:1,overflowY:"auto"}}>
          {MERIDIANOS.map(m=>(
            <div key={m.id} onClick={()=>setMer(mer?.id===m.id?null:m)}
              style={{padding:"8px 10px",cursor:"pointer",borderBottom:"1px solid var(--bg2)",
                background:mer?.id===m.id?"var(--bg2)":"transparent",
                borderLeft:mer?.id===m.id?"3px solid "+m.cor:"3px solid transparent"}}>
              <div style={{color:m.cor,fontSize:12,fontWeight:700}}>{m.sigla} · {m.nome}</div>
              <div style={{color:"var(--t4)",fontSize:10}}>{m.elem} · {m.pts}pts</div>
            </div>
          ))}
        </div>
        {/* Page input */}
        <div style={{padding:"6px 8px",borderTop:"1px solid var(--bg2)"}}>
          <input value={page} onChange={e=>setPage(parseInt(e.target.value)||1)}
            type="number" min={1} max={livro?.total||1}
            placeholder="Pág..." style={{width:"100%",background:"var(--bg0)",border:"1px solid var(--bg3)",
              borderRadius:6,padding:"5px 7px",fontSize:11,color:"var(--t1)",outline:"none"}}/>
        </div>
      </div>

      {/* Main area */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
        {/* Book tabs */}
        <div style={{display:"flex",gap:4,padding:"6px 8px",background:"var(--bg1)",
          borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
          {LIVROS.map(l=>(
            <button key={l.id} onClick={()=>setLid(l.id)}
              style={{background:lid===l.id?l.cor+"22":"var(--bg2)",
                border:"1px solid "+(lid===l.id?l.cor:"var(--bg3)"),
                borderRadius:6,color:lid===l.id?l.cor:"var(--t3)",
                padding:"4px 8px",fontSize:11,fontWeight:lid===l.id?700:400}}>
              {l.emoji} {l.autor.split(" ")[0]}
            </button>
          ))}
          {/* Load PDF */}
          {!pdfs[lid]&&(
            <label style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4,
              background:pdfReady?"var(--bg2)":"var(--bg3)",border:"1px solid var(--bg3)",borderRadius:6,
              color:pdfReady?"var(--t2)":"var(--t4)",padding:"4px 8px",fontSize:11,
              cursor:pdfReady?"pointer":"wait",opacity:pdfReady?1:0.6}}>
              {pdfReady?"📂 Carregar PDF":"⏳ Aguarde..."}
              {pdfReady&&<input type="file" accept=".pdf" style={{display:"none"}}
                onChange={e=>e.target.files[0]&&onLoadPdf(lid,e.target.files[0])}/>}
            </label>
          )}
          {/* Botão localização - visível quando ponto selecionado */}
          {mer&&pt&&(
            <button onClick={()=>{
              const WHO_MAP={P:"LU",IG:"LI",E:"ST",Ba:"SP",C:"HT",ID:"SI",B:"BL",R:"KI",Pc:"PC",SJ:"TE",VB:"GB",F:"LR",Ren:"CV",Du:"GV",VG:"GV",VC:"CV",EX:"EX"};
              const code=WHO_MAP[mer.sigla]||mer.sigla.toUpperCase();
              const q=encodeURIComponent(`site:meandqi.com ${code}-${pt}`);
              window.open(`https://www.google.com/search?q=${q}&tbm=isch`,"_blank");
            }}
              style={{marginLeft:pdfs[lid]?"auto":"4px",background:"#1a472a",border:"1px solid #2ea043",
                borderRadius:6,color:"#3fb950",padding:"4px 8px",fontSize:11,fontWeight:600,
                cursor:"pointer",whiteSpace:"nowrap"}}>
              📍 {mer.sigla}-{pt}
            </button>
          )}
        </div>

        {/* Points chips (when meridian selected) */}
        {mer&&(
          <div style={{padding:"6px 8px",background:"var(--bg0)",borderBottom:"1px solid var(--bg2)",
            display:"flex",flexWrap:"wrap",gap:4,maxHeight:72,overflowY:"auto",flexShrink:0}}>
            {Array.from({length:mer.pts},(_,i)=>i+1).map(n=>(
              <span key={n} className="chip" onClick={()=>selectPoint(mer,n)}
                style={{background:pt===n&&mer?"var(--acc)":"var(--bg2)",
                  color:pt===n&&mer?"#fff":"var(--t2)",border:"1px solid var(--bg3)"}}>
                {mer.sigla}-{n}
              </span>
            ))}
          </div>
        )}

        {/* Foto do Atlas (Ednea) — aparece quando um ponto e selecionado */}
        {mer&&pt&&photoOf(mer.sigla,pt)&&(
          <div style={{padding:"8px",background:"var(--bg0)",borderBottom:"1px solid var(--bg2)",flexShrink:0,textAlign:"center"}}>
            <img loading="lazy" src={photoOf(mer.sigla,pt)} alt={"Localizacao "+mer.sigla+"-"+pt}
              style={{maxWidth:"100%",maxHeight:240,borderRadius:8,objectFit:"contain",border:"1px solid var(--bg3)"}}/>
            <div style={{color:"var(--t4)",fontSize:10,marginTop:4}}>📷 Atlas dos Pontos · Ednéa Martins</div>
          </div>
        )}

        {/* PDF Viewer */}
        <div style={{flex:1,overflow:"hidden"}}>
          <PdfViewer pdfDoc={pdfs[lid]} page={page} total={livro?.total||1}
            livro={livro} onPage={setPage}/>
        </div>
      </div>
    </div>
  );
}

// Encontra as melhores opções para uma pergunta
function getOptionsForQuestion(question){
  const q = question.toLowerCase();
  for(const entry of DIAG_OPTIONS_MAP){
    if(entry.keys[0]==="__fallback__") continue;
    if(entry.keys.some(k=>q.includes(k))){
      return entry.opts;
    }
  }
  return DIAG_OPTIONS_MAP[DIAG_OPTIONS_MAP.length-1].opts; // fallback
}

// Extrai perguntas da seção de afunilamento diagnóstico (🔍 Para precisar...)
function parseDiagnosticSection(text){
  if(!text) return [];
  // Detecta a seção de afunilamento
  const secMatch = text.match(/(?:🔍|##|###)[^\n]*(?:precisar|diagnóstico|me diga|perguntas)[^\n]*/i);
  if(!secMatch) return parseLegacyQuickOptions(text);

  const secStart = text.indexOf(secMatch[0]);
  const section = text.slice(secStart);
  const lines = section.split("\n");
  const questions = [];

  for(const line of lines){
    const l = line.trim();
    // Pula linha de cabeçalho da seção
    if(/^[#*🔍]/.test(l) && questions.length===0) continue;
    // Coleta linhas com "?" (perguntas de afunilamento)
    if(l.includes("?") && l.length > 8 && !l.startsWith("|")){
      // Remove marcadores de lista e formatação
      const clean = l.replace(/^[-*•\d.)\s]+/,"").replace(/\*\*/g,"").trim();
      if(clean.length > 6){
        questions.push({
          question: clean,
          options: getOptionsForQuestion(clean)
        });
      }
    }
  }
  return questions;
}

// Versão legada: extrai perguntas com listas "- opção" abaixo
function parseLegacyQuickOptions(text){
  if(!text) return [];
  const lines = text.split("\n");
  const groups = [];
  let current = null;
  for(let i=0;i<lines.length;i++){
    const l = lines[i].trim();
    if(l.endsWith("?") && l.length > 4 && !l.startsWith("|")){
      if(current&&current.options.length>0) groups.push(current);
      current = { question: l.replace(/^[*#>\d.\-\s]+/,"").trim(), options:[] };
    } else if(current && /^[-*•]\s+.{3,}/.test(l)){
      const opt = l.replace(/^[-*•]\s+/,"").trim();
      if(opt.length>2 && opt.length<120) current.options.push(opt);
    } else if(current && l==="" ){
      // blank line OK
    } else if(current && current.options.length>0 && l.length>0 && !l.startsWith("-") && !l.startsWith("*")){
      groups.push(current);
      current=null;
    }
  }
  if(current&&current.options.length>0) groups.push(current);
  return groups.filter(g=>g.options.length>=2);
}

// Função principal usada pelo chat
function parseQuickOptions(text){
  return parseDiagnosticSection(text);
}

function QuickOptions({groups, onSelect, disabled}){
  const [selected, setSelected] = useState({}); // {qIdx: optIdx selecionados (Set)}

    if(disabled) return;

    return groups.map((g,qi)=>{
      const sel = selected[qi]||new Set();
      if(sel.size===0) return null;

      // Para pergunta com múltipla seleção, lista as opções
      return `${g.question.replace(/\?.*$/,"?")}\n→ ${selArr.join(", ")}`;
    }).filter(Boolean).join("\n\n");
  }

  const hasAny = groups.some((_,qi)=>(selected[qi]||new Set()).size>0);
  const totalAnswered = groups.filter((_,qi)=>(selected[qi]||new Set()).size>0).length;

  return(

        </span>
      </div>

        const selSet = selected[qi]||new Set();
        const answered = selSet.size>0;
        return(
          <div key={qi} style={{
            background:"var(--bg1)",
            border:"1px solid "+(answered?"var(--acc)":"var(--bg2)"),
            borderRadius:10,padding:"8px 10px",
            transition:"border-color .2s"
          }}>
            {/* Pergunta */}
            <div style={{color:answered?"var(--acc)":"var(--t2)",fontSize:12,fontWeight:600,
              marginBottom:7,lineHeight:1.4,display:"flex",gap:5,alignItems:"flex-start"}}>

              <span>{g.question}</span>
            </div>
            {/* Chips de opções */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {g.options.map(opt=>{
                const isSel = selSet.has(opt);
                return(
                  <button key={opt} onClick={()=>toggle(qi,opt)} disabled={disabled}
                    style={{
                      background:isSel?"var(--acc)":"var(--bg2)",
                      border:"1.5px solid "+(isSel?"var(--acc)":"var(--bg3)"),
                      borderRadius:20,
                      color:isSel?"#fff":"var(--t2)",

                      cursor:disabled?"default":"pointer",
                      transition:"all .15s",
                      fontWeight:isSel?700:400,
                      lineHeight:1.4,
                    }}>
                    {isSel?"✓ ":""}{opt}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* Botão enviar */}
      <button onClick={()=>{ onSelect(buildAnswer()); setSelected({}); }}
        disabled={!hasAny||disabled}
        style={{
          background:hasAny&&!disabled?"var(--acc)":"var(--bg2)",
          border:"none",borderRadius:8,

          transition:"all .2s"
        }}>
        {hasAny ? `Enviar respostas (${totalAnswered}) ↑` : "Marque ao menos uma opção"}
      </button>
    </div>
  );
}

                  {i===msgs.length-1&&(()=>{

function ProtoPane({sys,fewShotU,fewShotA,promptFn,accentColor,accentBorder,accentText,label,onChipClick,modo}){
  const [cat,setCat]=useState("dor");
  const [input,setInput]=useState("");
  const [result,setResult]=useState("");
  const [busy,setBusy]=useState(false);
  const [isLocal,setIsLocal]=useState(false);
  const [lastCond,setLastCond]=useState("");
  const resultRef=useRef(null);

  useEffect(()=>{ if(result&&resultRef.current) resultRef.current.scrollIntoView({behavior:"smooth"}); },[result]);

  async function gerar(cond, forceIA){
    if(!cond||busy) return;
    setLastCond(cond);
    // Local primeiro (sem IA), salvo refino explícito
    if(!forceIA){
      try{
        const md=protocoloPorCondicaoMd(cond, modo==="ea");
        if(md){ setResult(md); setIsLocal(true); return; }
      }catch(_){}
    }
    setResult(""); setIsLocal(false); setBusy(true);
    try{
      let final="";
      await callAI(
        [{role:"user",content:fewShotU},{role:"assistant",content:fewShotA},{role:"user",content:promptFn(cond)}],
        sys,
        (p)=>{final=p; setResult(p);}
      );
      setResult(final);
    }catch(e){
      setResult(e.message==="NO_KEY"?"⚠️ Configure uma chave API no botão 🔑 (Gemini grátis em aistudio.google.com/apikey)": "❌ Erro: "+e.message);
    }
    setBusy(false);
  }

  const catObj=CATEGORIAS.find(c=>c.id===cat);
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
      <div style={{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{background:accentColor,border:"1px solid "+accentBorder,color:accentText,
            borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>{label}</span>
          <span style={{color:"var(--t3)",fontSize:11}}>Protocolos Clínicos</span>
        </div>
        <div style={{display:"flex",gap:6}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!busy&&input.trim()) gerar(input.trim()); }}
            placeholder="Digite uma condição..."
            style={{flex:1,background:"var(--bg0)",border:"1px solid var(--bg3)",borderRadius:8,
              padding:"7px 10px",fontSize:13,color:"var(--t1)",outline:"none"}}/>
          <button onClick={()=>gerar(input.trim())} disabled={busy||!input.trim()}
            style={{background:busy||!input.trim()?"var(--bg2)":accentColor,
              border:"1px solid "+(busy||!input.trim()?"var(--bg3)":accentBorder),
              borderRadius:8,color:busy||!input.trim()?"var(--t4)":accentText,
              padding:"7px 14px",fontSize:13,fontWeight:700}}>
            {busy?"⏳":"Gerar"}
          </button>
        </div>
        <div style={{display:"flex",gap:4,marginTop:8,overflowX:"auto",paddingBottom:2}}>
          {CATEGORIAS.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)}
              style={{background:cat===c.id?accentColor:"var(--bg2)",
                border:"1px solid "+(cat===c.id?accentBorder:"transparent"),
                borderRadius:6,color:cat===c.id?accentText:"var(--t3)",
                padding:"3px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>
              {c.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        {!busy&&!result&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
            {catObj?.items.map(item=>(
              <button key={item} onClick={()=>gerar(item)}
                style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:8,
                  color:"var(--t2)",padding:"6px 10px",fontSize:12,cursor:"pointer"}}>
                🏥 {item}
              </button>
            ))}
          </div>
        )}
        {busy&&!result&&<div style={{color:"var(--t3)",fontSize:13}}>⏳ Gerando protocolo...</div>}
        {result&&<div ref={resultRef}>
          {isLocal&&(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <span style={{background:"#0a1f35",border:"1px solid #1f6feb",color:"#58a6ff",
                borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:700}}>📋 Base local · sem IA</span>
              <button onClick={()=>gerar(lastCond,true)} disabled={busy||!cfg.hasKey()}
                style={{background:cfg.hasKey()?"#12082e":"var(--bg3)",
                  border:"1px solid "+(cfg.hasKey()?"#7c3aed":"var(--bg3)"),borderRadius:7,
                  color:cfg.hasKey()?"#c4b5fd":"var(--t4)",padding:"5px 12px",fontSize:11,
                  fontWeight:700,cursor:cfg.hasKey()?"pointer":"default"}}>
                🤖 Refinar com IA
              </button>
            </div>
          )}
          <Md text={result} onChipClick={onChipClick}/>
          {!busy&&<div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
            <FavButton content={result} type="proto"
              title={input.trim()||lastCond||result.slice(0,60).replace(/[#*]/g,"").trim()}
              onSaved={()=>{}}/>
            <PdfProntButtons
              titulo={input.trim()||lastCond||result.slice(0,60).replace(/[#*]/g,"").trim()}
              conteudo={result} tipo="proto"
              subtitulo={label} compact={false}/>
          </div>}
        </div>}
      </div>
    </div>
  );
}

// ─── BTN SALVAR CHAT NO PRONTUÁRIO ───────────────────────────────────────────
function BtnSalvarChat({msgContent, msgIndex, allMsgs}){
  const [pacAtivo, setPacAtivoState] = useState(()=>window._getPacAtivo ? window._getPacAtivo() : null);
  const [salvo, setSalvo] = useState(false);

  useEffect(()=>{
    const handler = (e) => { setPacAtivoState(e.detail); setSalvo(false); };
    window.addEventListener("pacAtivoChanged", handler);
    return () => window.removeEventListener("pacAtivoChanged", handler);
  },[]);

  // Reset salvo quando o conteúdo muda (nova mensagem)
  useEffect(()=>{ setSalvo(false); },[msgContent]);

  if (!pacAtivo) return null;

  function handleSalvar(){
    const fn = window._salvarNoProntuarioAtivo;
    if (!fn) { alert("Erro: função de prontuário não disponível."); return; }

    // Monta contexto: busca a pergunta do usuário que precedeu esta resposta
    let queixa = "";
    if(msgIndex > 0){
      for(let k = msgIndex-1; k >= 0; k--){
        if(allMsgs[k].role === "user"){ queixa = allMsgs[k].content || ""; break; }
      }
    }

    const ok = fn({
      queixa: queixa,
      diagnostico: msgContent,
      fonte: "Chat IA",
    });
    if(ok) setSalvo(true);
    else alert("Erro: selecione um paciente ativo no Prontuário.");
  }

  if(salvo){
    return (
      <span style={{fontSize:11,color:"#3fb950",display:"flex",alignItems:"center",gap:3,
        background:"#0d2818",border:"1px solid #2ea04360",borderRadius:6,padding:"3px 9px"}}>
        ✅ Salvo — <strong style={{color:"#58a6ff"}}>{pacAtivo.nome}</strong>
      </span>
    );
  }

  return (
    <button onClick={handleSalvar}
      title={`Salvar resposta no prontuário de ${pacAtivo.nome}`}
      style={{background:"#0d2818",border:"1px solid #2ea04380",borderRadius:6,
        color:"#3fb950",padding:"3px 9px",fontSize:11,fontWeight:700,
        cursor:"pointer",display:"flex",alignItems:"center",gap:4,
        transition:"all .15s"}}>
      📋 {pacAtivo.nome}
    </button>
  );
}

// ─── FAV BUTTON ──────────────────────────────────────────────────────────────
// favId: ID estável para rastrear sessão de chat (passado de fora)
// onFavId: callback para atualizar o ID salvo no componente pai
function FavButton({content,title,type,onSaved,label,favId,onFavId}){
  const [savedId,setSavedId]=useState(()=>{
    if(favId!==undefined) return favId;
    return getFavId(content);
  });
  const saved = savedId!==null && savedId!==undefined;
  const suffix = label ? " "+label : "";

  function toggle(){
    if(saved){
      removeFav(savedId);
      setSavedId(null);
      if(onFavId) onFavId(null);
      if(onSaved) onSaved();
    } else {
      const id = addFav(title,content,type);
      setSavedId(id);
      if(onFavId) onFavId(id);
      if(onSaved) onSaved();
    }
  }

  // Sincroniza quando favId externo muda (ex: conversa limpa)
  useEffect(()=>{
    if(favId!==undefined) setSavedId(favId);
  },[favId]);

  return(
    <button onClick={toggle}
      title={saved?"Remover dos favoritos":"Salvar como favorito"}
      style={{alignSelf:"flex-start",background:saved?"#2d1f00":"var(--bg2)",
        border:"1px solid "+(saved?"#d4a843":"var(--bg3)"),
        borderRadius:6,color:saved?"#d4a843":"var(--t4)",
        padding:"3px 9px",fontSize:12,display:"flex",alignItems:"center",gap:4,
        transition:"all .15s",cursor:"pointer"}}>
      {saved?("★ Salvo"+suffix):("☆ Favoritar"+suffix)}
    </button>
  );
}

<script type="text/babel">

const {useState,useEffect,useRef,useMemo,useCallback}=React;

// ─── INDEXEDDB — PRONTUÁRIO ───────────────────────────────────────────────────
// Armazenamento ilimitado (gigabytes) vs. ~5 MB do localStorage.
// API síncrona mantida para compatibilidade: cache em memória + flush async.
const DB_NAME  = "acuponto_db";
const DB_VER   = 1;
const STORE_PAC = "pacientes"; // cada registro = 1 paciente completo (com sessoes[])
const PRONT_KEY = "acu_prontuario"; // mantido só para migração

let _dbReady = null; // Promise que resolve o objeto IDBDatabase
let _memCache = null; // cache síncrono em memória

function _openDB() {
  if (_dbReady) return _dbReady;
  _dbReady = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_PAC)) {
        db.createObjectStore(STORE_PAC, { keyPath: "id" });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
  return _dbReady;
}

async function _idbGetAll() {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE_PAC, "readonly");
    const req = tx.objectStore(STORE_PAC).getAll();
    req.onsuccess = e => resolve(e.target.result || []);
    req.onerror   = e => reject(e.target.error);
  });
}

async function _idbPutAll(lista) {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx    = db.transaction(STORE_PAC, "readwrite");
    const store = tx.objectStore(STORE_PAC);
    // Limpa e regrava tudo (simples, compatível com lógica existente)
    store.clear();
    lista.forEach(p => store.put(p));
    tx.oncomplete = resolve;
    tx.onerror    = e => reject(e.target.error);
  });
}

async function _idbDelete(id) {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_PAC, "readwrite");
    tx.objectStore(STORE_PAC).delete(id);
    tx.oncomplete = resolve;
    tx.onerror    = e => reject(e.target.error);
  });
}

// Migra dados antigos do localStorage para IndexedDB (roda uma vez)
async function _migrateFromLocalStorage() {
  try {
    const raw = localStorage.getItem(PRONT_KEY);
    if (!raw) return;
    const lista = JSON.parse(raw);
    if (!lista || !lista.length) return;
    await _idbPutAll(lista);
    localStorage.removeItem(PRONT_KEY);
    console.log("[AcuPonto] Migração localStorage → IndexedDB: " + lista.length + " paciente(s).");
  } catch(e) {
    console.warn("[AcuPonto] Migração falhou:", e);
  }
}

// Solicita armazenamento persistente — impede o navegador de apagar o IndexedDB
async function _requestPersist() {
  try {
    if (navigator.storage && navigator.storage.persist) {
      const ja = await navigator.storage.persisted();
      if (!ja) {
        const ok = await navigator.storage.persist();
        console.log("[AcuPonto] Armazenamento persistente:", ok ? "concedido ✅" : "negado ⚠️");
      } else {
        console.log("[AcuPonto] Armazenamento já é persistente ✅");
      }
    }
  } catch(e) { console.warn("[AcuPonto] persist() falhou:", e); }
}

// Inicializa: abre DB, migra dados antigos, popula cache
async function _initDB() {
  _requestPersist();
  await _migrateFromLocalStorage();
  _memCache = await _idbGetAll();
  // Ordena por mais recente primeiro (compatível com comportamento anterior)
  _memCache.sort((a,b) => (b.criado||"").localeCompare(a.criado||""));
  window.dispatchEvent(new CustomEvent("prontuarioReady"));
}
_initDB().catch(e => console.error("[AcuPonto] Erro ao iniciar DB:", e));

// ─── API SÍNCRONA (usa cache em memória) ─────────────────────────────────────
function loadProntuario() {
  return _memCache ? [..._memCache] : [];
}
function saveProntuario(lista) {
  // Proteção crítica: se o DB ainda não inicializou, _memCache é null e a lista
  // completa não foi carregada. Gravar agora apagaria todos os pacientes existentes
  // (pois _idbPutAll faz clear+rewrite). Bloqueia até o cache estar pronto.
  if (_memCache === null) {
    console.warn("[AcuPonto] saveProntuario bloqueado: aguarde o DB inicializar (evita perda de dados).");
    return;
  }
  _memCache = [...lista];
  _idbPutAll(lista).catch(e => console.error("[AcuPonto] Erro ao salvar no IndexedDB:", e));
}

window._loadProntuario = loadProntuario;
window._saveProntuario = saveProntuario;

// ─── PACIENTE ATIVO GLOBAL ───────────────────────────────────────────────────
// Paciente ativo permanece em localStorage (são apenas 4 campos, sem impacto)
const PAC_ATIVO_KEY = "acu_pac_ativo";
function getPacAtivo() {
  try { return JSON.parse(localStorage.getItem(PAC_ATIVO_KEY)||"null"); } catch { return null; }
}
function setPacAtivoStorage(pac) {
  if (pac) localStorage.setItem(PAC_ATIVO_KEY, JSON.stringify({id:pac.id,nome:pac.nome,sexo:pac.sexo||"",dob:pac.dob||""}));
  else localStorage.removeItem(PAC_ATIVO_KEY);
  window.dispatchEvent(new CustomEvent("pacAtivoChanged", {detail: pac}));
}
window._getPacAtivo = getPacAtivo;
window._setPacAtivo = setPacAtivoStorage;

function usePacAtivo() {
  const [pacAtivo, setPacAtivoState] = React.useState(getPacAtivo);
  React.useEffect(()=>{
    const handler = (e) => setPacAtivoState(e.detail);
    window.addEventListener("pacAtivoChanged", handler);
    return () => window.removeEventListener("pacAtivoChanged", handler);
  }, []);
  return [pacAtivo, (pac) => { setPacAtivoStorage(pac); setPacAtivoState(pac); }];
}

function salvarNoProntuarioAtivo({queixa, sintomas, lingua, pulso, outros, diagnostico, pontos, tecnica, fonte}) {
  const pac = getPacAtivo();
  if (!pac) return false;
  const lista = loadProntuario();
  const p = lista.find(x=>x.id===pac.id);
  if (!p) return false;
  p.sessoes = p.sessoes || [];
  p.sessoes.unshift({
    id: Date.now(),
    data: new Date().toISOString().slice(0,16),
    queixa: queixa||"",
    sintomas: sintomas||"",
    lingua: lingua||"",
    pulso: pulso||"",
    outros: outros||fonte||"",
    pontos: pontos||"",
    tecnica: tecnica||"",
    diagnostico: diagnostico||"",
    soap: "",
  });
  saveProntuario(lista);
  return true;
}
window._salvarNoProntuarioAtivo = salvarNoProntuarioAtivo;

      <button onClick={()=>setPacAtivo(null)}

function ProntuarioTab({ onSendToChat, onGoToConstit }) {
  const [view, setView] = useState("list"); // "list" | "perfil" | "sessao" | "nova_sessao"
  const [pacientes, setPacientes] = useState(loadProntuario);
  const [dbReady, setDbReady] = useState(()=> _memCache !== null);
  const [pacSel, setPacSel] = useState(null); // paciente selecionado
  const [pacAtivo, setPacAtivo] = usePacAtivo(); // paciente ativo global
  const [sessSel, setSessSel] = useState(null); // sessão selecionada para visualizar
  const [excluirMenuSess, setExcluirMenuSess] = useState(null); // id da sessão com menu aberto
  const [busca, setBusca] = useState("");

  // Aguarda IndexedDB ficar pronto e carrega pacientes
  useEffect(()=>{
    if (_memCache !== null) { setPacientes(loadProntuario()); setDbReady(true); return; }
    function onReady() { setPacientes(loadProntuario()); setDbReady(true); }
    window.addEventListener("prontuarioReady", onReady, {once:true});
    return ()=> window.removeEventListener("prontuarioReady", onReady);
  },[]);

  // Fecha menu de exclusão ao clicar fora
  useEffect(()=>{
    if(!excluirMenuSess) return;
    function handler(e){
      if(!e.target.closest("[data-excmenu]")) setExcluirMenuSess(null);
    }
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[excluirMenuSess]);

  // Formulário novo paciente
  const [formPac, setFormPac] = useState({ nome:"", dob:"", sexo:"", obs:"" });
  const [showNovoPac, setShowNovoPac] = useState(false);

  // Formulário nova sessão
  const [formSess, setFormSess] = useState({
    data: new Date().toISOString().slice(0,16),
    queixa:"", sintomas:"", lingua:"", pulso:"", outros:""
  });
  const [diagResult, setDiagResult] = useState("");
  const [diagLoading, setDiagLoading] = useState(false);
  const [diagErr, setDiagErr] = useState("");
  const [editandoDiag, setEditandoDiag] = useState(false);
  const [diagEditado, setDiagEditado] = useState("");
  // SOAP Note
  const [soapResult, setSoapResult] = useState("");
  const [soapLoading, setSoapLoading] = useState(false);
  const [soapEditando, setSoapEditando] = useState(false);
  const [soapEditado, setSoapEditado] = useState("");
  // Pontos e técnica
  const [pontosSel, setPontosSel] = useState("");
  const [tecnica, setTecnica] = useState("");

  function refresh() { setPacientes(loadProntuario()); }

  // ─── Backup / Restauração do prontuário ──────────────────────────────────
  const fileImportRef = useRef(null);

  function exportarProntuario() {
    const lista = loadProntuario();
    if (!lista.length) { alert("Nenhum paciente para exportar."); return; }
    const blob = new Blob([JSON.stringify(lista, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const hoje = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `prontuario_backup_${hoje}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }

  function importarProntuario(e) {
    const file = e.target.files?.[0];
    e.target.value = ""; // permite reimportar o mesmo arquivo
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const importados = JSON.parse(reader.result);
        if (!Array.isArray(importados)) throw new Error("formato inválido");
        const atual = loadProntuario();
        const porId = new Map(atual.map(p=>[String(p.id), p]));
        let novos=0, atualizados=0;
        importados.forEach(p=>{
          if (!p || p.id===undefined) return;
          if (porId.has(String(p.id))) atualizados++; else novos++;
          porId.set(String(p.id), p);
        });
        const merged = [...porId.values()].sort((a,b)=>(b.criado||"").localeCompare(a.criado||""));
        saveProntuario(merged);
        refresh();
        alert(`Backup restaurado ✅\n${novos} novo(s), ${atualizados} atualizado(s).\nTotal: ${merged.length} paciente(s).`);
      } catch(err) {
        alert("Erro ao importar: arquivo inválido ou corrompido.");
        console.error("[AcuPonto] Import falhou:", err);
      }
    };
    reader.readAsText(file);
  }

  function salvarPaciente() {
    if (!formPac.nome.trim()) return;
    const lista = loadProntuario();
    lista.unshift({
      id: Date.now(),
      nome: formPac.nome.trim(),
      dob: formPac.dob,
      sexo: formPac.sexo,
      obs: formPac.obs,
      sessoes: [],
      criado: new Date().toISOString()
    });
    saveProntuario(lista);
    setFormPac({ nome:"", dob:"", sexo:"", obs:"" });
    setShowNovoPac(false);
    refresh();
  }

  function excluirPaciente(id) {
    if (!confirm("Excluir paciente e todo o histórico?")) return;
    saveProntuario(loadProntuario().filter(p=>p.id!==id));
    setPacSel(null);
    setView("list");
    refresh();
  }

  function abrirPerfil(pac) {
    setPacSel(pac);
    setView("perfil");
  }

  function abrirNovaSessao(pac) {
    setPacSel(pac);
    setDiagResult(""); setDiagErr(""); setEditandoDiag(false);
    setSoapResult(""); setSoapEditando(false); setSoapEditado("");
    setPontosSel(""); setTecnica("");
    setFormSess({ data: new Date().toISOString().slice(0,16), queixa:"", sintomas:"", lingua:"", pulso:"", outros:"" });
    setView("nova_sessao");
  }

  async function gerarDiagnostico() {
    if (!formSess.queixa.trim() && !formSess.sintomas.trim()) {
      setDiagErr("Informe ao menos a queixa principal ou sintomas.");
      return;
    }
    if (!cfg.hasKey()) { setDiagErr("Configure uma chave de API (🔑) primeiro."); return; }
    setDiagLoading(true); setDiagErr(""); setDiagResult("");
    const pac = pacSel;
    const idade = pac.dob ? (new Date().getFullYear() - new Date(pac.dob).getFullYear()) + " anos" : "não informada";
    const prompt = [
      `**Paciente:** ${pac.nome}`,
      `**Sexo:** ${pac.sexo||"não informado"} | **Idade:** ${idade}`,
      pac.obs ? `**Histórico geral:** ${pac.obs}` : "",
      `**Queixa principal:** ${formSess.queixa||"não informado"}`,
      `**Sintomas:** ${formSess.sintomas||"não informado"}`,
      formSess.lingua ? `**Língua:** ${formSess.lingua}` : "",
      formSess.pulso  ? `**Pulso:** ${formSess.pulso}` : "",
      formSess.outros ? `**Outros dados:** ${formSess.outros}` : "",
    ].filter(Boolean).join("\n");

    try {
      let acc = "";
      await callAI([{role:"user",content:prompt}], SYS_PRONT, chunk => {
        acc += chunk; setDiagResult(acc);
      });
      setDiagResult(acc);
    } catch(e) {
      setDiagErr(e.message||"Erro ao gerar diagnóstico.");
    } finally {
      setDiagLoading(false);
    }
  }

  // Diagnóstico local (sem IA) — casa os campos da sessão com PADROES_TCM
  function gerarDiagnosticoLocal() {
    if (!formSess.queixa.trim() && !formSess.sintomas.trim() && !formSess.lingua.trim() && !formSess.pulso.trim()) {
      setDiagErr("Informe queixa, sintomas, língua ou pulso para a busca local.");
      return;

    setDiagErr(""); setEditandoDiag(false);
    const md = diagnosticoLocalMd({
      queixa: formSess.queixa, sintomas: formSess.sintomas,
      lingua: formSess.lingua, pulso: formSess.pulso, extra: formSess.outros,
    });
    setDiagResult(md);
  }

  // SOAP Note local (sem IA) — monta a partir dos campos + padrão casado
  function gerarSoapLocal() {
    const padroes = matchPadroesSessao({
      queixa: formSess.queixa, sintomas: formSess.sintomas,

    }, 1);
