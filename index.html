      pac: pacSel, sess: formSess, pontosSel, tecnica,
      padrao: padroes[0] || null,
    });
    setSoapResult(md);
  }

  function salvarSessao() {
    const diag = editandoDiag ? diagEditado : diagResult;
    const soap = soapEditando ? soapEditado : soapResult;
    const lista = loadProntuario();
    const pac = lista.find(p=>p.id===pacSel.id);
    if (!pac) return;
    pac.sessoes = pac.sessoes || [];
    pac.sessoes.unshift({
      id: Date.now(),
      data: formSess.data,
      queixa: formSess.queixa,
      sintomas: formSess.sintomas,
      lingua: formSess.lingua,
      pulso: formSess.pulso,
      outros: formSess.outros,
      pontos: pontosSel,
      tecnica: tecnica,
      diagnostico: diag,
      soap: soap,
    });
    saveProntuario(lista);
    refresh();
    setPacSel(lista.find(p=>p.id===pacSel.id));
    setView("perfil");
  }

  function excluirSessao(pacId, sessId) {
    if (!confirm("Excluir esta sessão inteira?")) return;
    const lista = loadProntuario();
    const pac = lista.find(p=>p.id===pacId);
    if (pac) pac.sessoes = (pac.sessoes||[]).filter(s=>s.id!==sessId);
    saveProntuario(lista);
    setExcluirMenuSess(null);
    refresh();
    setPacSel(lista.find(p=>p.id===pacId));
    setSessSel(null);
    setView("perfil");
  }

  function excluirCamposSessao(pacId, sessId, campos) {
    // campos: array de chaves a limpar, ex: ["diagnostico","soap","pontos","tecnica"] ou ["queixa","sintomas","lingua","pulso","outros"]
    const lista = loadProntuario();
    const pac = lista.find(p=>p.id===pacId);
    if (pac) {
      const sess = (pac.sessoes||[]).find(s=>s.id===sessId);
      if (sess) campos.forEach(c=>{ sess[c]=""; });
    }
    saveProntuario(lista);
    setExcluirMenuSess(null);
    refresh();
    setPacSel(lista.find(p=>p.id===pacId));
  }

  function excluirCamposTodasSessoes(pacId, campos) {
    const lista = loadProntuario();
    const pac = lista.find(p=>p.id===pacId);
    if (pac) {
      (pac.sessoes||[]).forEach(sess=>{ campos.forEach(c=>{ sess[c]=""; }); });
    }
    saveProntuario(lista);
    setExcluirMenuSess(null);
    refresh();
    setPacSel(lista.find(p=>p.id===pacId));
  }

  const pacFiltrados = useMemo(()=>{
    const b = busca.toLowerCase();
    return pacientes.filter(p=>!b||p.nome.toLowerCase().includes(b));
  },[pacientes,busca]);

  // ── Estilos ──────────────────────────────────────────────────────────────
  const S = {
    page:   { flex:1, display:"flex", flexDirection:"column", minHeight:0, overflow:"hidden", background:"var(--bg0)" },
    head:   { display:"flex", alignItems:"center", gap:8, padding:"10px 12px 8px", background:"var(--bg1)", borderBottom:"1px solid var(--bg2)", flexShrink:0 },
    body:   { flex:1, overflowY:"auto", padding:"10px 12px" },
    card:   { background:"var(--bg1)", border:"1px solid var(--bg2)", borderRadius:10, padding:"12px", marginBottom:10, cursor:"pointer" },
    btn:    (c)=>({ background:c||"var(--acc)", border:"none", borderRadius:8, color:"#fff", padding:"9px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }),
    btnSm:  (c)=>({ background:c||"var(--bg2)", border:"1px solid var(--bg3)", borderRadius:6, color:"var(--t2)", padding:"5px 10px", fontSize:12, cursor:"pointer" }),
    inp:    { width:"100%", background:"var(--bg2)", border:"1px solid var(--bg3)", borderRadius:8, color:"var(--t1)", padding:"8px 10px", fontSize:13, outline:"none", marginBottom:8 },
    label:  { fontSize:11, color:"var(--t3)", marginBottom:3, display:"block" },
    row:    { display:"flex", gap:8, alignItems:"center" },
    badge:  (c)=>({ background:c+"22", color:c, borderRadius:4, padding:"2px 7px", fontSize:11, fontWeight:700 }),
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // Aguarda IndexedDB (normalmente < 100ms)
  if (!dbReady) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,gap:10,color:"var(--t2)"}}>
      <span style={{fontSize:24}}>⏳</span>
      <span style={{fontSize:13}}>Carregando prontuários…</span>
    </div>
  );

  // LISTA DE PACIENTES
  // ═══════════════════════════════════════════════════════════════════════════
  if (view === "list") return (
    <div style={S.page}>
      <div style={S.head}>
        <span style={{fontSize:18}}>📋</span>
        <span style={{flex:1,fontWeight:700,fontSize:14,color:"var(--t1)"}}>Prontuários</span>
        <button onClick={()=>setShowNovoPac(true)} style={S.btn("#238636")}>+ Paciente</button>
      </div>

      {/* Busca */}
      <div style={{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <input placeholder="🔍 Buscar paciente..." value={busca} onChange={e=>setBusca(e.target.value)}
          style={{...S.inp,marginBottom:0}}/>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <button onClick={exportarProntuario} style={{...S.btnSm(),flex:1}} title="Salvar cópia de segurança de todos os pacientes">
            ⬇️ Backup
          </button>
          <button onClick={()=>fileImportRef.current?.click()} style={{...S.btnSm(),flex:1}} title="Restaurar pacientes de um arquivo de backup">
            ⬆️ Restaurar
          </button>
          <input ref={fileImportRef} type="file" accept="application/json,.json"
            onChange={importarProntuario} style={{display:"none"}}/>
        </div>
      </div>

      <div style={S.body}>
        {pacFiltrados.length===0 && (
          <div style={{textAlign:"center",color:"var(--t4)",padding:"40px 20px"}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontSize:14,marginBottom:6}}>Nenhum paciente cadastrado</div>
            <div style={{fontSize:12}}>Toque em "+ Paciente" para começar</div>
          </div>
        )}
        {pacFiltrados.map(p=>{
          const eAtivo = pacAtivo && pacAtivo.id === p.id;
          return (
          <div key={p.id} style={{...S.card, border: eAtivo?"1px solid #2ea04366":"1px solid var(--bg2)",
            background: eAtivo?"#0d2818":"var(--bg1)"}}>
            <div style={S.row} onClick={()=>abrirPerfil(p)}>
              <div style={{width:38,height:38,borderRadius:"50%",background:eAtivo?"#2ea04333":"#1f6feb22",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                {p.sexo==="M"?"👨":p.sexo==="F"?"👩":"🧑"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color: eAtivo?"#3fb950":"var(--t1)",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {eAtivo && <span style={{fontSize:11,marginRight:4}}>✓</span>}{p.nome}
                </div>
                <div style={{fontSize:11,color:"var(--t3)"}}>
                  {p.dob ? new Date(p.dob).toLocaleDateString("pt-BR") : "Sem data de nasc."}
                  {" · "}{(p.sessoes||[]).length} sessão(ões)
                  {eAtivo && <span style={{color:"#3fb950",marginLeft:6,fontWeight:700}}>● ativo</span>}
                </div>
              </div>
              <span style={{color:"var(--t4)",fontSize:18}}>›</span>
            </div>
            <div style={{marginTop:8,display:"flex",gap:6}}>
              <button onClick={(e)=>{e.stopPropagation(); setPacAtivo(eAtivo?null:p);}}
                style={{flex:1,background:eAtivo?"#2ea04333":"#1f6feb22",border:`1px solid ${eAtivo?"#2ea043":"#1f6feb"}`,
                  borderRadius:6,color:eAtivo?"#3fb950":"#58a6ff",fontSize:12,fontWeight:700,
                  padding:"5px 10px",cursor:"pointer"}}>
                {eAtivo?"✓ Ativo (remover)":"Ativar para consulta"}
              </button>
              <button onClick={(e)=>{e.stopPropagation(); abrirNovaSessao(p); if(!eAtivo) setPacAtivo(p);}}
                style={{background:"#238636",border:"none",borderRadius:6,color:"#fff",
                  fontSize:12,fontWeight:700,padding:"5px 10px",cursor:"pointer"}}>
                + Sessão
              </button>
            </div>
          </div>
          );
        })}
      </div>

      {/* Modal novo paciente */}
      {showNovoPac && (
        <div style={{position:"fixed",inset:0,background:"#000a",zIndex:300,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"var(--bg1)",borderRadius:"16px 16px 0 0",padding:"20px 16px",width:"100%",
            maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -4px 32px #000a"}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:14,color:"var(--t1)"}}>Novo Paciente</div>
            <label style={S.label}>Nome completo *</label>
            <input value={formPac.nome} onChange={e=>setFormPac(f=>({...f,nome:e.target.value}))}
              placeholder="Nome do paciente" style={S.inp}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <label style={S.label}>Data de nascimento</label>
                <input type="date" value={formPac.dob} onChange={e=>setFormPac(f=>({...f,dob:e.target.value}))} style={S.inp}/>
              </div>
              <div>
                <label style={S.label}>Sexo</label>
                <select value={formPac.sexo} onChange={e=>setFormPac(f=>({...f,sexo:e.target.value}))}
                  style={{...S.inp,marginBottom:0}}>
                  <option value="">—</option>
                  <option value="F">Feminino</option>
                  <option value="M">Masculino</option>
                  <option value="O">Outro</option>
                </select>
              </div>
            </div>
            <label style={S.label}>Observações / Histórico geral</label>
            <textarea value={formPac.obs} onChange={e=>setFormPac(f=>({...f,obs:e.target.value}))}
              placeholder="Alergias, doenças crônicas, medicações em uso..." rows={3}
              style={{...S.inp,resize:"vertical"}}/>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={()=>setShowNovoPac(false)} style={{...S.btn("var(--bg3)"),flex:1,color:"var(--t2)"}}>Cancelar</button>
              <button onClick={salvarPaciente} style={{...S.btn("#238636"),flex:2}}
                disabled={!formPac.nome.trim()}>Salvar Paciente</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  // ═══════════════════════════════════════════════════════════════════════════
  // PERFIL DO PACIENTE
  // ═══════════════════════════════════════════════════════════════════════════
  if (view === "perfil") {
    const pac = pacientes.find(p=>p.id===pacSel?.id) || pacSel;
    const sessoes = pac?.sessoes || [];
    return (
      <div style={S.page}>
        <div style={S.head}>
          <button onClick={()=>setView("list")} style={{background:"none",border:"none",color:"var(--acc)",fontSize:20,cursor:"pointer",padding:"0 4px"}}>‹</button>
          <div style={{width:34,height:34,borderRadius:"50%",background:"#1f6feb22",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
            {pac?.sexo==="M"?"👨":pac?.sexo==="F"?"👩":"🧑"}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pac?.nome}</div>
            <div style={{fontSize:10,color:"var(--t3)"}}>
              {pac?.dob?new Date(pac.dob).toLocaleDateString("pt-BR"):"—"} · {sessoes.length} sessão(ões)
            </div>
          </div>
          <button onClick={()=>{
              const sessoes2 = pac?.sessoes||[];
              const txt = `# Prontuário — ${pac?.nome}\n\n**Nascimento:** ${pac?.dob?new Date(pac.dob).toLocaleDateString("pt-BR"):"—"} · **Sexo:** ${pac?.sexo||"—"}\n\n${pac?.obs?`**Observações:** ${pac.obs}\n\n`:""}`
                + sessoes2.map((s,i)=>{
                  const num = sessoes2.length-i;
                  const dt = new Date(s.data).toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"});
                  let bloco = `---\n## Sessão ${num} · ${dt}\n\n`;
                  if(s.queixa)     bloco += `**Queixa:** ${s.queixa}\n`;
                  if(s.sintomas)   bloco += `**Sintomas:** ${s.sintomas}\n`;
                  if(s.outros)     bloco += `**Outros:** ${s.outros}\n`;
                  if(s.lingua)     bloco += `**Língua:** ${s.lingua}\n`;
                  if(s.pulso)      bloco += `**Pulso:** ${s.pulso}\n`;
                  if(s.pontos)     bloco += `**Pontos:** ${s.pontos}\n`;
                  if(s.tecnica)    bloco += `**Técnica:** ${s.tecnica}\n`;
                  if(s.diagnostico) bloco += `\n### Diagnóstico MTC\n${s.diagnostico}\n`;
                  if(s.soap)       bloco += `\n### SOAP Note\n${s.soap}\n`;
                  return bloco;
                }).join("\n");
              gerarPDF({titulo:"Prontuário — "+pac?.nome, subtitulo:sessoes2.length+" sessão(ões)", tipo:"pront", conteudo:txt, paciente:pac?.nome});
            }} title="Exportar PDF completo do Prontuário"
            style={{background:"none",border:"none",color:"#e8a87c",fontSize:18,cursor:"pointer",padding:"4px"}}>📄</button>
          <button onClick={()=>{
              const sessoes2 = pac?.sessoes||[];
              const linhas = sessoes2.map((s,i)=>{
                const partes=[];
                if(s.queixa) partes.push(`**Queixa:** ${s.queixa}`);
                if(s.diagnostico) partes.push(`**Diagnóstico:** ${s.diagnostico}`);
                if(s.pontos) partes.push(`**Pontos:** ${s.pontos}`);
                if(s.tecnica) partes.push(`**Técnica:** ${s.tecnica}`);
                return partes.length?`### ${new Date(s.data).toLocaleDateString("pt-BR")} — Sessão ${sessoes2.length-i}\n\n${partes.join("\n")}`:"";
              }).filter(Boolean).join("\n\n---\n\n");
              const txt = `# Resumo Clínico — ${pac?.nome}\n\n${linhas||"Sem sessões registradas."}`;
              gerarPDF({titulo:"Resumo Clínico — "+pac?.nome, subtitulo:"Queixa · Diagnóstico · Tratamento", tipo:"pront", conteudo:txt, paciente:pac?.nome});
            }} title="Exportar PDF resumido (Queixa / Diagnóstico / Tratamento)"
            style={{background:"none",border:"none",color:"#58a6ff",fontSize:18,cursor:"pointer",padding:"4px"}}>📋</button>
          <button onClick={()=>excluirPaciente(pac?.id)} style={{background:"none",border:"none",color:"var(--red)",fontSize:18,cursor:"pointer",padding:"4px"}}>🗑️</button>
        </div>

        {pac?.obs && (
          <div style={{padding:"8px 12px",background:"#1f6feb11",borderBottom:"1px solid var(--bg2)",
            fontSize:12,color:"var(--t2)",flexShrink:0}}>
            <span style={{fontWeight:700,color:"var(--t3)"}}>📝 </span>{pac.obs}
          </div>
        )}

        <div style={S.body}>
          {/* Constituição salva do paciente */}
          {(()=>{
            const constitData = loadConst();
            if (!constitData) return (
              onGoToConstit ? (
                <div onClick={onGoToConstit} style={{background:"#0d2818",border:"1px dashed #3fb95066",
                  borderRadius:10,padding:"10px 12px",marginBottom:12,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>🧬</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#3fb950"}}>Avaliar Constituição TCM</div>
                    <div style={{fontSize:11,color:"var(--t4)"}}>Toque para fazer a avaliação das 9 Constituições</div>
                  </div>
                  <span style={{color:"var(--t4)",fontSize:16}}>›</span>
                </div>
              ) : null
            );
            const princ = CONSTITUICOES.find(c=>c.id===constitData.principal);
            const sec   = constitData.secundaria ? CONSTITUICOES.find(c=>c.id===constitData.secundaria) : null;
            if (!princ) return (
              <div onClick={()=>{ localStorage.removeItem(CONST_KEY); if(onGoToConstit) onGoToConstit(); }}
                style={{background:"#1a0a0a",border:"1px solid #da3633",borderRadius:10,
                  padding:"12px",marginBottom:12,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>⚠️</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#f85149"}}>Avaliação desatualizada</div>
                  <div style={{fontSize:11,color:"var(--t4)",marginTop:2}}>Toque para refazer a avaliação</div>
                </div>
                <span style={{color:"#f85149",fontSize:16}}>›</span>
              </div>
            );
            return (
              <div onClick={onGoToConstit||undefined}
                style={{background:"#0d2818",border:"1px solid #3fb950",borderRadius:10,
                  padding:"12px",marginBottom:12,cursor:onGoToConstit?"pointer":"default"}}>
                <div style={{display:"flex",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#3fb950",flex:1}}>🧬 Perfil Constitucional</div>
                  {onGoToConstit && <span style={{fontSize:11,color:"#3fb950",opacity:0.7}}>Ver detalhes ›</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:sec?8:0}}>
                  <div style={{width:38,height:38,borderRadius:"50%",flexShrink:0,
                    background:princ.cor+"33",border:"2px solid "+princ.cor+"66",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                    {princ.emoji}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>{princ.nome}</div>
                    <div style={{fontSize:10,color:princ.cor,fontWeight:600,marginTop:1}}>
                      Principal · {constitData.scores?.[princ.id]||0}%
                    </div>
                  </div>
                </div>
                {sec && (
                  <div style={{display:"flex",alignItems:"center",gap:10,
                    borderTop:"1px solid #1a3a22",paddingTop:8}}>
                    <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,
                      background:sec.cor+"22",border:"1px solid "+sec.cor+"44",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
                      {sec.emoji}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"var(--t2)"}}>{sec.nome}</div>
                      <div style={{fontSize:10,color:sec.cor}}>Secundária · {constitData.scores?.[sec.id]||0}%</div>
                    </div>
                  </div>
                )}
                <div style={{fontSize:11,color:"#7ee787",marginTop:8,lineHeight:1.6,
                  fontFamily:"monospace",background:"#0a1f10",borderRadius:6,padding:"6px 8px"}}>
                  {princ.pontos_chave}
                </div>
                <div style={{fontSize:10,color:"var(--t4)",marginTop:6,textAlign:"right"}}>
                  Avaliado em {new Date(constitData.data).toLocaleDateString("pt-BR")}
                </div>
              </div>
            );
          })()}

          <button onClick={()=>abrirNovaSessao(pac)}
            style={{...S.btn("#1f6feb"),width:"100%",marginBottom:14,fontSize:14,
              display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span>➕</span> Nova Sessão
          </button>

          {/* Evolução língua/pulso */}
          {sessoes.filter(s=>s.lingua||s.pulso).length>=2 && (
            <div style={{background:"var(--bg1)",border:"1px solid var(--bg2)",borderRadius:10,
              padding:"10px 12px",marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",marginBottom:8,
                textTransform:"uppercase",letterSpacing:1}}>📈 Evolução Língua / Pulso</div>
              {[...sessoes].reverse().filter(s=>s.lingua||s.pulso).slice(-6).map((s,i,arr)=>(
                <div key={s.id} style={{display:"flex",gap:8,alignItems:"flex-start",
                  borderBottom:i<arr.length-1?"1px solid var(--bg2)":"none",
                  paddingBottom:6,marginBottom:6}}>
                  <div style={{fontSize:10,color:"var(--t4)",whiteSpace:"nowrap",minWidth:50,paddingTop:2}}>
                    {new Date(s.data).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}
                  </div>
                  <div style={{flex:1,fontSize:11}}>
                    {s.lingua&&<div style={{color:"var(--t2)"}}><span style={{color:"var(--t4)"}}>👅 </span>{s.lingua}</div>}
                    {s.pulso&&<div style={{color:"var(--t2)",marginTop:2}}><span style={{color:"var(--t4)"}}>🫀 </span>{s.pulso}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {sessoes.length===0 && (
            <div style={{textAlign:"center",color:"var(--t4)",padding:"30px 0",fontSize:13}}>
              Nenhuma sessão registrada ainda.
            </div>
          )}

          {sessoes.map((s,i)=>(
            <div key={s.id} style={{...S.card,cursor:"default"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={S.badge("#238636")}>#{sessoes.length-i}</span>
                <span style={{fontWeight:700,fontSize:13,color:"var(--t1)",flex:1}}>
                  {new Date(s.data).toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"})}
                </span>
                <button onClick={()=>{
                  const num = sessoes.length-i;
                  const dt = new Date(s.data).toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"});
                  let txt = `# Sessão ${num} — ${pac.nome}\n\n`;
                  txt += `**Data:** ${dt}\n`;
                  if(s.queixa)     txt += `**Queixa:** ${s.queixa}\n`;
                  if(s.sintomas)   txt += `**Sintomas:** ${s.sintomas}\n`;
                  if(s.outros)     txt += `**Outros:** ${s.outros}\n`;
                  if(s.lingua)     txt += `**Língua:** ${s.lingua}\n`;
                  if(s.pulso)      txt += `**Pulso:** ${s.pulso}\n`;
                  if(s.pontos)     txt += `\n**Pontos:** ${s.pontos}\n`;
                  if(s.tecnica)    txt += `**Técnica:** ${s.tecnica}\n`;
                  if(s.diagnostico) txt += `\n---\n### Diagnóstico MTC\n${s.diagnostico}\n`;
                  if(s.soap)       txt += `\n---\n### SOAP Note\n${s.soap}\n`;
                  gerarPDF({titulo:`Sessão ${num} — ${pac.nome}`,subtitulo:s.queixa||dt,tipo:"diag",conteudo:txt,paciente:pac.nome,data:dt});
                }} style={{background:"none",border:"none",color:"#6B9FD4",fontSize:13,cursor:"pointer",padding:"2px 4px"}}
                title="PDF desta sessão">🖨️</button>
                <div style={{position:"relative"}} data-excmenu="1">
                  <button onClick={()=>setExcluirMenuSess(excluirMenuSess===s.id?null:s.id)}
                    style={{background:"none",border:"none",color:"var(--red)",fontSize:14,cursor:"pointer",padding:"2px"}}
                    title="Opções de exclusão">🗑️</button>
                  {excluirMenuSess===s.id && (
                    <div style={{
                      position:"absolute",right:0,top:"100%",zIndex:999,
                      background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:8,
                      boxShadow:"0 4px 16px rgba(0,0,0,0.4)",minWidth:220,padding:"6px 0"
                    }}>
                      <div style={{fontSize:10,color:"var(--t4)",padding:"4px 12px 6px",borderBottom:"1px solid var(--bg2)",fontWeight:700,letterSpacing:.5}}>
                        EXCLUIR DA SESSÃO #{sessoes.length-i}
                      </div>
                      <button onClick={()=>{
                        if(!confirm("Excluir o atendimento realizado (diagnóstico, SOAP, pontos) desta sessão?")) return;
                        excluirCamposSessao(pac.id,s.id,["diagnostico","soap","pontos","tecnica"]);
                      }} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",
                        color:"var(--t2)",fontSize:12,padding:"8px 12px",cursor:"pointer"}}>
                        🩺 Atendimento desta sessão
                      </button>
                      <button onClick={()=>{
                        if(!confirm("Excluir a queixa/sintomas desta sessão?")) return;
                        excluirCamposSessao(pac.id,s.id,["queixa","sintomas","lingua","pulso","outros"]);
                      }} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",
                        color:"var(--t2)",fontSize:12,padding:"8px 12px",cursor:"pointer"}}>
                        📝 Queixa desta sessão
                      </button>
                      <div style={{borderTop:"1px solid var(--bg2)",margin:"4px 0"}}/>
                      <button onClick={()=>{
                        if(!confirm("Excluir o atendimento realizado (diagnóstico, SOAP, pontos) de TODAS as sessões deste paciente?")) return;
                        excluirCamposTodasSessoes(pac.id,["diagnostico","soap","pontos","tecnica"]);
                      }} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",
                        color:"#e6a700",fontSize:12,padding:"8px 12px",cursor:"pointer"}}>
                        🩺 Atendimento de todas as sessões
                      </button>
                      <button onClick={()=>{
                        if(!confirm("Excluir a queixa/sintomas de TODAS as sessões deste paciente?")) return;
                        excluirCamposTodasSessoes(pac.id,["queixa","sintomas","lingua","pulso","outros"]);
                      }} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",
                        color:"#e6a700",fontSize:12,padding:"8px 12px",cursor:"pointer"}}>
                        📝 Queixa de todas as sessões
                      </button>
                      <div style={{borderTop:"1px solid var(--bg2)",margin:"4px 0"}}/>
                      <button onClick={()=>excluirSessao(pac.id,s.id)}
                        style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",
                          color:"var(--red)",fontSize:12,padding:"8px 12px",cursor:"pointer",fontWeight:700}}>
                        🗑️ Excluir sessão inteira
                      </button>
                      <button onClick={()=>setExcluirMenuSess(null)}
                        style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",
                          color:"var(--t4)",fontSize:11,padding:"6px 12px",cursor:"pointer"}}>
                        ✕ Cancelar
                      </button>
                    </div>
                  )}
                </div>
              </div>
              {s.queixa && <div style={{fontSize:12,color:"var(--t2)",marginBottom:4}}><b>Queixa:</b> {s.queixa}</div>}
              {s.sintomas && <div style={{fontSize:12,color:"var(--t3)",marginBottom:4}}><b>Sintomas:</b> {s.sintomas}</div>}
              {s.lingua && <div style={{fontSize:12,color:"var(--t3)",marginBottom:2}}><b>Língua:</b> {s.lingua}</div>}
              {s.pulso  && <div style={{fontSize:12,color:"var(--t3)",marginBottom:4}}><b>Pulso:</b> {s.pulso}</div>}
              {s.diagnostico && (
                <div style={{marginTop:8}}>
                  <button onClick={()=>setSessSel(sessSel?.id===s.id?null:s)}
                    style={{...S.btnSm("#0d4429"),color:"#3fb950",border:"1px solid #238636",
                      width:"100%",fontSize:12}}>
                    {sessSel?.id===s.id?"▲ Ocultar diagnóstico":"▼ Ver diagnóstico MTC"}
                  </button>
                  {sessSel?.id===s.id && (
                    <div style={{marginTop:8,background:"var(--bg0)",borderRadius:8,padding:"10px",
                      fontSize:12,lineHeight:1.7}} className="md">
                      <Md text={s.diagnostico}/>
                      <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                        <button onClick={()=>onSendToChat&&onSendToChat(
                          `Analise e discuta o seguinte diagnóstico MTC do paciente ${pac.nome}:\n\n${s.diagnostico}`
                        )} style={{...S.btnSm("#0d1f3c"),color:"var(--acc)",border:"1px solid var(--acc)",fontSize:11}}>
                          💬 Discutir no Chat
                        </button>
                        <button onClick={()=>gerarPDF({
                          titulo:"Diagnóstico MTC",
                          subtitulo:s.queixa||"Consulta",
                          tipo:"diag",
                          conteudo:s.diagnostico,
                          paciente:pac.nome,
                          data:new Date(s.data).toLocaleString("pt-BR"),
                        })} style={{...S.btnSm(),fontSize:11,borderColor:"#6B9FD4",color:"#6B9FD4"}}>
                          🖨️ PDF
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {s.soap && (
                <div style={{marginTop:6}}>
                  <button onClick={()=>setSessSel(sessSel?.id===s.id+"soap"?null:{id:s.id+"soap"})}
                    style={{...S.btnSm("#0d1f3c"),color:"#58a6ff",border:"1px solid #1f6feb",width:"100%",fontSize:12}}>
                    {sessSel?.id===s.id+"soap"?"▲ Ocultar SOAP Note":"📋 Ver SOAP Note"}
                  </button>
                  {sessSel?.id===s.id+"soap" && (
                    <div style={{marginTop:8,background:"#0d1f3c",borderRadius:8,padding:"10px",
                      fontSize:11,lineHeight:1.8,fontFamily:"monospace",color:"#cdd9e5",
                      border:"1px solid #1f6feb",whiteSpace:"pre-wrap"}}>
                      {s.soap}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // NOVA SESSÃO
  // ═══════════════════════════════════════════════════════════════════════════
  if (view === "nova_sessao") {
    const pac = pacSel;
    const podeGerar = (formSess.queixa.trim()||formSess.sintomas.trim()) && cfg.hasKey();
    const podeSalvar = diagResult || diagEditado;
    return (
      <div style={S.page}>
        <div style={S.head}>
          <button onClick={()=>setView("perfil")} style={{background:"none",border:"none",color:"var(--acc)",fontSize:20,cursor:"pointer",padding:"0 4px"}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:"var(--t1)"}}>Nova Sessão</div>
            <div style={{fontSize:10,color:"var(--t3)"}}>{pac?.nome}</div>
          </div>
          {(diagResult||diagEditado) && (
            <button onClick={salvarSessao} style={{...S.btn("#238636"),fontSize:12,padding:"7px 12px"}}>
              💾 Salvar
            </button>
          )}
        </div>

        <div style={{...S.body}}>
          {/* Data/hora */}
          <label style={S.label}>Data e horário da sessão</label>
          <input type="datetime-local" value={formSess.data}
            onChange={e=>setFormSess(f=>({...f,data:e.target.value}))} style={S.inp}/>

          {/* Queixa */}
          <label style={S.label}>Queixa principal *</label>
          <textarea value={formSess.queixa}
            onChange={e=>setFormSess(f=>({...f,queixa:e.target.value}))}
            placeholder="Ex: Lombalgia há 3 meses, piora com frio..." rows={2}
            style={{...S.inp,resize:"vertical"}}/>

          {/* Sintomas */}
          <label style={S.label}>Sintomas associados</label>
          <textarea value={formSess.sintomas}
            onChange={e=>setFormSess(f=>({...f,sintomas:e.target.value}))}
            placeholder="Ex: Fadiga, frio nas extremidades, urina clara e abundante, libido baixa..." rows={3}
            style={{...S.inp,resize:"vertical"}}/>

          {/* Língua/Pulso */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div>
              <label style={S.label}>Língua 👅</label>
              <input value={formSess.lingua} onChange={e=>setFormSess(f=>({...f,lingua:e.target.value}))}
                placeholder="Ex: Pálida, saburra branca" style={{...S.inp,marginBottom:0}}/>
            </div>
            <div>
              <label style={S.label}>Pulso 🫀</label>
              <input value={formSess.pulso} onChange={e=>setFormSess(f=>({...f,pulso:e.target.value}))}
                placeholder="Ex: Profundo, lento" style={{...S.inp,marginBottom:0}}/>
            </div>
          </div>

          {/* Outros */}
          <label style={S.label}>Outros dados clínicos</label>
          <textarea value={formSess.outros}
            onChange={e=>setFormSess(f=>({...f,outros:e.target.value}))}
            placeholder="Histórico relevante, medicamentos, exames, padrão emocional..." rows={2}
            style={{...S.inp,resize:"vertical"}}/>

          {/* Pontos e Técnica */}
          <label style={S.label}>🪡 Pontos selecionados <span style={{fontWeight:400,color:"var(--t4)"}}>(preencha após decidir o protocolo)</span></label>
          <input value={pontosSel} onChange={e=>setPontosSel(e.target.value)}
            placeholder="Ex: E36, BP6, R3, IG4, F3..." style={S.inp}/>
          <label style={S.label}>⚙️ Técnica de tratamento</label>
          <input value={tecnica} onChange={e=>setTecnica(e.target.value)}
            placeholder="Ex: Tonificação + moxa em E36 + eletro 2Hz IG4-IG11" style={S.inp}/>

          {/* Botão gerar */}
          {!diagLoading && !diagResult && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(() => { const podeLocal=formSess.queixa.trim()||formSess.sintomas.trim()||formSess.lingua.trim()||formSess.pulso.trim(); return (
                <button onClick={gerarDiagnosticoLocal} disabled={!podeLocal}
                  style={{...S.btn(podeLocal?"#0a1f35":"var(--bg3)"),width:"100%",
                    border:"1px solid "+(podeLocal?"#1f6feb":"var(--bg3)"),
                    color:podeLocal?"#58a6ff":"var(--t4)",fontSize:14,
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <span>🧠</span> Diagnóstico local (sem IA)
                </button>
              ); })()}
              <button onClick={gerarDiagnostico} disabled={!podeGerar}
                style={{...S.btn(podeGerar?"#7c3aed":"var(--bg3)"),width:"100%",
                  color:podeGerar?"#fff":"var(--t4)",fontSize:14,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span>🤖</span> Gerar Diagnóstico MTC com IA
              </button>
            </div>
          )}

          {!cfg.hasKey() && (
            <div style={{textAlign:"center",fontSize:12,color:"var(--t4)",marginTop:6}}>
              A IA é opcional — o diagnóstico local funciona sem chave de API.
            </div>
          )}

          {diagErr && (
            <div style={{background:"#da363322",border:"1px solid var(--red)",borderRadius:8,
              padding:"10px",fontSize:12,color:"#f85149",marginTop:8}}>{diagErr}</div>
          )}

          {/* Resultado IA */}
          {(diagLoading || diagResult) && (
            <div style={{marginTop:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:13,color:"var(--t1)"}}>
                  {diagLoading?"⏳ Gerando diagnóstico...":"🧠 Diagnóstico MTC gerado"}
                </span>
                {!diagLoading && diagResult && (
                  <button onClick={()=>{ setEditandoDiag(!editandoDiag); setDiagEditado(diagResult); }}
                    style={{...S.btnSm(),fontSize:11,marginLeft:"auto"}}>
                    {editandoDiag?"✕ Cancelar":"✏️ Editar"}
                  </button>
                )}
              </div>

              {editandoDiag ? (
                <textarea value={diagEditado} onChange={e=>setDiagEditado(e.target.value)}
                  rows={20} style={{...S.inp,fontFamily:"monospace",fontSize:12,resize:"vertical"}}/>
              ) : (
                <div style={{background:"var(--bg1)",borderRadius:10,padding:"12px",
                  fontSize:12,lineHeight:1.7,border:"1px solid var(--bg2)"}} className="md">
                  {diagResult ? <Md text={diagResult}/> : (
                    <div style={{color:"var(--t4)",textAlign:"center",padding:"20px 0"}}>
                      <div className="spin" style={{fontSize:24,display:"inline-block"}}>⚙️</div>
                    </div>
                  )}
                </div>
              )}

              {!diagLoading && diagResult && (
                <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                  <button onClick={()=>{ setDiagResult(""); setDiagEditado(""); setEditandoDiag(false); setSoapResult(""); }}
                    style={{...S.btnSm(),fontSize:12}}>🔄 Regerar</button>
                  <button onClick={()=>gerarPDF({
                    titulo:"Diagnóstico MTC",
                    subtitulo:formSess.queixa||"Consulta TCM",
                    tipo:"diag",
                    conteudo: editandoDiag?diagEditado:diagResult,
                    paciente:pacSel?.nome,
                  })} style={{...S.btnSm(),fontSize:12,borderColor:"#6B9FD4",color:"#6B9FD4"}}>🖨️ PDF</button>
                  <button onClick={salvarSessao}
                    style={{...S.btn("#238636"),flex:2,fontSize:13}}>💾 Salvar Sessão</button>
                </div>
              )}
            </div>
          )}

          {/* ── SOAP NOTE ─────────────────────────────────────────── */}
          {diagResult && !soapResult && !soapLoading && (
            <div style={{marginTop:14,padding:"10px 12px",background:"#0d1f3c",
              borderRadius:10,border:"1px solid #1f6feb"}}>
              <div style={{fontSize:12,color:"#58a6ff",fontWeight:700,marginBottom:6}}>📋 SOAP Note TCM</div>
              <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,lineHeight:1.5}}>
                Gere a SOAP Note de prontuário a partir do diagnóstico acima.
                {(pontosSel||tecnica)?" Pontos e técnica serão incluídos no Assessment.":""}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={gerarSoapLocal}
                style={{...S.btn("#0a1f35"),width:"100%",fontSize:13,
                  border:"1px solid #1f6feb",color:"#58a6ff",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span>📋</span> SOAP local (sem IA)
              </button>
              <button onClick={async()=>{
                if(!cfg.hasKey()){ setSoapResult("⚠️ Configure uma chave de API (🔑) para usar a IA, ou use o SOAP local acima."); return; }
                setSoapLoading(true);
                const pac2=pacSel;
                const idade2=pac2.dob?Math.floor((Date.now()-new Date(pac2.dob).getTime())/(365.25*24*3600*1000))+" anos":"não informada";
                const prompt2=[
                  `**Paciente:** ${pac2.nome} | Sexo: ${pac2.sexo||"—"} | Idade: ${idade2}`,
                  `**Queixa principal (S):** ${formSess.queixa||"não informado"}`,
                  `**Sintomas (S):** ${formSess.sintomas||"não informado"}`,
                  formSess.lingua?`**Língua (O):** ${formSess.lingua}`:"",
                  formSess.pulso?`**Pulso (O):** ${formSess.pulso}`:"",
                  formSess.outros?`**Outros dados (O):** ${formSess.outros}`:"",
                  pontosSel?`**Pontos selecionados (A):** ${pontosSel}`:"",
                  tecnica?`**Técnica (A):** ${tecnica}`:"",
                  `
**Diagnóstico MTC (base para o Assessment):**
${editandoDiag?diagEditado:diagResult}`,
                ].filter(Boolean).join("\n");
                try {
                  let acc="";
                  await callAI([{role:"user",content:prompt2}],SYS_SOAP,chunk=>{acc+=chunk;setSoapResult(acc);});
                } catch(e){setSoapResult("Erro: "+e.message);}
                finally{setSoapLoading(false);}
              }} style={{...S.btn("#1f6feb"),width:"100%",fontSize:13,
                display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span>🤖</span> SOAP com IA
              </button>
              </div>
            </div>
          )}
          {soapLoading && (
            <div style={{marginTop:14,background:"#0d1f3c",borderRadius:10,padding:"14px",
              border:"1px solid #1f6feb",textAlign:"center",color:"#58a6ff",fontSize:13}}>
              <div className="spin" style={{display:"inline-block",fontSize:20}}>⚙️</div>
              <span style={{marginLeft:8}}>Gerando SOAP Note...</span>
            </div>
          )}
          {soapResult && !soapLoading && (
            <div style={{marginTop:14,background:"#0d1f3c",borderRadius:10,padding:"14px",
              border:"1px solid #1f6feb"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:13,color:"#58a6ff"}}>📋 SOAP Note gerada</span>
                <button onClick={()=>{setSoapEditando(!soapEditando);setSoapEditado(soapResult);}}
                  style={{...S.btnSm(),fontSize:11,marginLeft:"auto"}}>
                  {soapEditando?"✕ Cancelar":"✏️ Editar"}
                </button>
              </div>
              {soapEditando?(
                <textarea value={soapEditado} onChange={e=>setSoapEditado(e.target.value)}
                  rows={16} style={{...S.inp,fontFamily:"monospace",fontSize:11,resize:"vertical",marginBottom:0}}/>
              ):(
                <div style={{fontSize:11,lineHeight:1.8,color:"#cdd9e5",fontFamily:"monospace",whiteSpace:"pre-wrap"}}>
                  {soapResult}
                </div>
              )}
              <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                <button onClick={()=>setSoapResult("")}
                  style={{...S.btnSm(),fontSize:12}}>🔄 Regerar SOAP</button>
                <button onClick={()=>gerarPDF({
                  titulo:"SOAP Note — "+pacSel?.nome,
                  subtitulo:formSess.queixa||"Consulta TCM",
                  tipo:"pront",
                  conteudo: soapEditando?soapEditado:soapResult,
                  paciente:pacSel?.nome,
                })} style={{...S.btnSm(),fontSize:12,borderColor:"#6B9FD4",color:"#6B9FD4"}}>🖨️ PDF</button>
                <button onClick={salvarSessao}
                  style={{...S.btn("#238636"),flex:2,fontSize:13}}>💾 Salvar com SOAP</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

// ── Componente Principal ─────────────────────────────────────────────────────
function ConstitTab({ onSendToChat, onSendToDiag, onGoToPront }) {
  const [view, setView]         = useState("intro");   // intro | quiz | resultado | historico
  const [resps, setResps]       = useState({});         // {pergId: 0|1|2|3|4}
  const [resultado, setResultado] = useState(null);
  const [salvo, setSalvo]       = useState(loadConst);
  const [detConst, setDetConst] = useState(null);       // constituição expandida
  const [pacAtivo] = usePacAtivo();

  const ESCALA = ["Nunca","Raramente","Às vezes","Frequentemente","Sempre"];

  // Calcular scores
  function calcScores(respostas) {
    const scores = {};
    CONSTITUICOES.forEach(c => scores[c.id] = 0);
    CONST_PERGUNTAS.forEach(p => {
      const val = respostas[p.id] || 0; // 0-4
      if (val >= 2) { // "às vezes" ou mais
        Object.entries(p.pesos).forEach(([cid, peso]) => {
          scores[cid] = (scores[cid]||0) + peso * (val/4);
        });
      }
    });
    // Normalizar para 0-100
    const maxPossivel = {};
    CONST_PUROS.forEach(id => maxPossivel[id] = 0);
    CONST_PERGUNTAS.forEach(p => {
      Object.entries(p.pesos).forEach(([cid, peso]) => {
        maxPossivel[cid] = (maxPossivel[cid]||0) + peso;
      });
    });
    const normalized = {};
    CONSTITUICOES.forEach(c => {
      const max = maxPossivel[c.id] || 1;
      normalized[c.id] = Math.min(100, Math.round((scores[c.id] / max) * 100));
    });
    return normalized;
  }

  const CONST_PUROS = CONSTITUICOES.map(c=>c.id);

  function finalizar() {
    const scores = calcScores(resps);
    // Ping He: inverso da média dos desequilíbrios
    const deseqs = CONSTITUICOES.filter(c=>c.id!=="ping").map(c=>scores[c.id]);
    const mediaDeseq = deseqs.reduce((a,b)=>a+b,0)/deseqs.length;
    scores.ping = Math.max(0, Math.round(100 - mediaDeseq));

    const ordenado = [...CONSTITUICOES].sort((a,b) => scores[b.id]-scores[a.id]);
    const principal = ordenado[0];
    const secundaria = ordenado[1].id !== "ping" && scores[ordenado[1].id] >= 30 ? ordenado[1] : null;

    const res = {
      data: new Date().toISOString(),
      scores,
      principal: principal.id,
      secundaria: secundaria?.id || null,
    };
    setResultado(res);
    saveConst(res);
    setSalvo(res);
    setView("resultado");
  }

  function buildPromptChat(res) {
    const princ = CONSTITUICOES.find(c=>c.id===res.principal);
    const sec   = res.secundaria ? CONSTITUICOES.find(c=>c.id===res.secundaria) : null;
    const top5  = [...CONSTITUICOES].sort((a,b)=>res.scores[b.id]-res.scores[a.id]).slice(0,5);

      `**Constituição Principal:** ${princ.emoji} ${princ.nome} (score: ${res.scores[princ.id]}%)\n` +
      (sec ? `**Constituição Secundária:** ${sec.emoji} ${sec.nome} (score: ${res.scores[sec.id]}%)\n` : "") +
      `\n**Scores completos:**\n` +
      top5.map(c=>`- ${c.emoji} ${c.nome}: ${res.scores[c.id]}%`).join("\n") +

                ◈ Constituição Secundária

                  <div style={{fontSize:11,color:"var(--t3)"}}>{sec.desc}</div>
                </div>
              </div>
              <div style={{height:6,background:"var(--bg2)",borderRadius:3,marginBottom:8}}>

              </div>
              <div style={{fontSize:11,color:"var(--t2)"}}>
                <b style={{color:sec.cor}}>Tendências combinadas: </b>
                {sec.tendencias}
              </div>

          {/* Radar — barras de todas as constituições */}
          <div style={{...S.card, marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>

            </div>

              <div key={c.id} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,alignItems:"center"}}>

                  <span style={{fontSize:11,fontWeight:700,color:c.cor}}>{res.scores[c.id]}%</span>

                </div>

          <div style={{...S.card, background:"#0d1f3c", border:"1px solid #1f6feb"}}>

              <button onClick={()=>onSendToChat&&onSendToChat(buildPromptChat(res))}
                style={{...S.btn("#7c3aed"),fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span>🤖</span> Análise Clínica Completa (Chat IA)
              </button>
              {onSendToDiag && (
                <button onClick={()=>{
                  const princ2=CONSTITUICOES.find(c=>c.id===res.principal);
                  const hints=`Constituição: ${princ2.nome}${sec?` + ${sec.nome}`:""}. Tendências: ${princ2.tendencias}`;
                  onSendToDiag(hints);
                }} style={{...S.btn("#238636"),fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <span>🔍</span> Enviar ao DiagTab
                </button>
              )}
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{
                  const txt = `## Constituição TCM — ${princ.nome}\n\n${princ.emoji} **Score:** ${res.scores[princ.id]}%\n\n**Descrição:** ${princ.desc}\n\n**Tendências:** ${princ.tendencias}\n\n**Tratamento:** ${princ.pontos_chave}\n\n**Alimentação:** ${princ.alimentos}\n\n**Emocional:** ${princ.emocao}`+(sec?`\n\n---\n## Constituição Secundária — ${sec.nome}\n\n${sec.emoji} **Score:** ${res.scores[sec.id]}%\n\n${sec.desc}\n\n**Tendências:** ${sec.tendencias}`:"");
                  gerarPDF({titulo:"Perfil Constitucional TCM",subtitulo:princ.nome+(sec?" + "+sec.nome:""),tipo:"constit",conteudo:txt});
                }} style={{...S.btn("#0d3a3a"),flex:1,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"1px solid #3fb950",color:"#3fb950"}}>
                  🖨️ Gerar PDF
                </button>
                <PdfProntButtons
                  titulo={"Constituição: "+princ.nome}
                  conteudo={`## Constituição TCM — ${princ.nome}\n\n${princ.emoji} **Score:** ${res.scores[princ.id]}%\n\n**Descrição:** ${princ.desc}\n\n**Tendências:** ${princ.tendencias}\n\n**Tratamento:** ${princ.pontos_chave}\n\n**Alimentação:** ${princ.alimentos}\n\n**Emocional:** ${princ.emocao}`+(sec?`\n\n---\n## Constituição Secundária — ${sec.nome}\n\n${sec.desc}`:"") }
                  tipo="constit" compact={false}/>
              </div>
              {/* Salvar no Prontuário do Paciente Ativo */}
              <BtnSalvarProntuario
                diagnostico={`# Perfil Constitucional TCM\n\n**Constituição Principal:** ${princ.emoji} ${princ.nome} · ${res.scores[princ.id]}%\n\n${princ.desc}\n\n**Tendências:** ${princ.tendencias}\n\n**Tratamento:** ${princ.pontos_chave}\n\n**Alimentação:** ${princ.alimentos}\n\n**Emocional:** ${princ.emocao}`+(sec?`\n\n---\n**Constituição Secundária:** ${sec.emoji} ${sec.nome} · ${res.scores[sec.id]}%\n\n${sec.desc}\n\n**Tendências:** ${sec.tendencias}`:"")}
                fonte="Constituição TCM"
                titulo={`Constituição: ${princ.nome}${sec?" + "+sec.nome:""}`}
                onGoToPront={onGoToPront}
              />
            </div>
          </div>

          {/* Nota clínica */}
          <div style={{background:"#161b22",borderRadius:8,padding:"10px 12px",marginTop:10,
            border:"1px solid var(--bg2)"}}>
            <div style={{fontSize:11,color:"var(--t4)",lineHeight:1.6}}>
              ⚠️ <b>Nota:</b> A avaliação constitucional é um instrumento de orientação clínica, não um diagnóstico médico. A constituição pode mudar ao longo do tempo com tratamento, estilo de vida e envelhecimento. Avalie sempre em conjunto com língua, pulso e sintomas atuais.
            </div>
          </div>
          <div style={{height:16}}/>
        </div>
      </div>
    );
  }

  return null;
}

  const COMPARATIVO=[
    {aba:"📋 Prontuário",lingua:"—",pulso:"—",score:"—",api:"Não",c:"#58a6ff"},

    outer:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"},

      </div>

      {/* COMPARATIVO */}
      <div style={s.secTitle}>📊 Comparativo rápido</div>
      <table style={s.table}>
        <thead>
          <tr>
            {["Aba","Língua","Pulso","Score","API"].map(h=>(
              <th key={h} style={s.th}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {COMPARATIVO.map(r=>(
            <tr key={r.aba}>
              <td style={s.td}><span style={s.dot(r.c)}></span>{r.aba}</td>
              <td style={s.td}>{r.lingua}</td>
              <td style={s.td}>{r.pulso}</td>
              <td style={s.td}>{r.score}</td>
              <td style={s.td}>{r.api}</td>
            </tr>
          ))}
        </tbody>
      </table>

    </div>
    </div>
  );
}

function FavoritesTab({onSendToChat,onRunProtocol,onChipClick}){
  const [favs,setFavs]=useState(loadFavs);
  const [expanded,setExpanded]=useState(null);
  const [filter,setFilter]=useState("all");

  // Recarrega favoritos toda vez que a aba é exibida
  useEffect(()=>{ setFavs(loadFavs()); },[]);

  function refresh(){ setFavs(loadFavs()); }

  function del(id){
    removeFav(id);
    setFavs(loadFavs());
    if(expanded===id) setExpanded(null);
  }

  const filtered = filter==="all" ? favs : favs.filter(f=>f.type===filter);

  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
      {/* Header */}
      <div style={{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bg2)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>★ Favoritos</span>
          <span style={{background:"var(--bg2)",border:"1px solid var(--bg3)",borderRadius:10,
            color:"var(--t3)",fontSize:11,padding:"1px 7px"}}>{favs.length}</span>
          {filtered.length>0&&(
            <button onClick={()=>{
              const all = filtered.map((f,i)=>`## ${i+1}. ${f.title||f.type}\n\n${f.date}\n\n${f.content}`).join("\n\n---\n\n");
              gerarPDF({titulo:"Favoritos AcuPonto",subtitulo:`${filtered.length} item(s)`,tipo:"proto",conteudo:all});
            }} style={{marginLeft:"auto",background:"var(--bg2)",border:"1px solid #6B9FD4",borderRadius:6,
              color:"#6B9FD4",padding:"3px 9px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}>
              🖨️ PDF
            </button>
          )}
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[["all","Todos"],["diag","Diagnóstico"],["chat","Chat IA"],["proto","Protocolo"],["constit","Constituição"],["lingua","Língua"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)}
              style={{background:filter===v?"#2d1f00":"var(--bg2)",
                border:"1px solid "+(filter===v?"#d4a843":"transparent"),
                borderRadius:6,color:filter===v?"#d4a843":"var(--t3)",
                padding:"3px 9px",fontSize:11,fontWeight:filter===v?700:400,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
        {filtered.length===0&&(
          <div style={{color:"var(--t4)",fontSize:13,textAlign:"center",marginTop:40}}>
            Nenhum favorito ainda.<br/>
            <span style={{fontSize:11}}>Use ☆ Favoritar nas respostas do Chat ou Protocolo.</span>
          </div>
        )}
        {filtered.map(f=>(
          <div key={f.id} style={{background:"var(--bg1)",border:"1px solid var(--bg2)",
            borderRadius:10,overflow:"hidden"}}>
            {/* Card header — sempre visível */}
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",
              background:"var(--bg2)"}}>
              <span style={{fontSize:13,flexShrink:0,cursor:"pointer"}}
                onClick={()=>setExpanded(expanded===f.id?null:f.id)}>
                {f.type==="proto"?"🏥":f.type==="diag"?"🔍":"🤖"}
              </span>
              <div style={{flex:1,minWidth:0,cursor:"pointer"}}
                onClick={()=>setExpanded(expanded===f.id?null:f.id)}>
                <div style={{color:"var(--t1)",fontSize:12,fontWeight:700,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {f.title||"Sem título"}
                </div>
                <div style={{color:"var(--t4)",fontSize:10}}>{f.date} · {f.type==="proto"?"Protocolo":f.type==="diag"?"Diagnóstico TCM":"Chat IA"}</div>
              </div>
              {/* Botão Abrir no Chat */}
              <button onClick={()=>onSendToChat(f.content,f.title)}
                title="Abrir no Chat"
                style={{background:"transparent",border:"none",borderRadius:6,
                  color:"#58a6ff",padding:"4px 6px",fontSize:15,cursor:"pointer",flexShrink:0}}>
                💬
              </button>
              {/* Botão PDF */}
              <button onClick={()=>gerarPDF({titulo:f.title||f.type,tipo:f.type,conteudo:f.content})}
                title="Gerar PDF"
                style={{background:"transparent",border:"none",borderRadius:6,
                  color:"#6B9FD4",padding:"4px 6px",fontSize:14,cursor:"pointer",flexShrink:0}}>
                🖨️
              </button>
              {/* Botão Excluir — sempre visível */}
              <button onClick={()=>del(f.id)}
                title="Excluir favorito"
                style={{background:"transparent",border:"none",borderRadius:6,
                  color:"#f85149",padding:"4px 6px",fontSize:15,cursor:"pointer",flexShrink:0}}>
                🗑
              </button>
              <span style={{color:"var(--t4)",fontSize:11,cursor:"pointer",paddingLeft:2}}
                onClick={()=>setExpanded(expanded===f.id?null:f.id)}>
                {expanded===f.id?"▲":"▼"}
              </span>
            </div>

            {/* Conteúdo expandido com scroll interno */}
            {expanded===f.id&&(
              <div style={{maxHeight:320,overflowY:"auto",padding:"10px 12px",
                borderTop:"1px solid var(--bg2)"}}>
                <Md text={f.content} onChipClick={onChipClick||(() => {})}/>
                <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                  <PdfProntButtons titulo={f.title||f.type} conteudo={f.content} tipo={f.type} compact={false}/>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}
